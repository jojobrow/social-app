
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Social Prototype Mobile - Homepage</title>
  <style>
    /* Your original CSS content here */
  </style>
</head>
<body>
  <div class="appShell">
    <section class="screen active" id="homeScreen">
      <section class="card">
        <div class="cardBody stack">
          <div class="sectionHeader">
            <div>
              <h3 class="sectionTitle">Direct berichtje voor je feed</h3>
              <div class="sectionText">Typ iets en zet het direct in je contentfeed.</div>
            </div>
          </div>
          <div class="compactComposer">
            <textarea id="homePostInput" class="textarea" placeholder="Typ hier je bericht..."></textarea>
            <div class="actionRow">
              <div id="homePostStatus" class="statusLine"></div>
              <button class="solidBtn" onclick="publishQuickTextPost()">Plaatsen</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Adding the link bar above the feed -->
      <div class="link-bar">
        <input type="url" id="linkInput" class="field" placeholder="Voeg een link toe..." />
        <button class="solidBtn" onclick="handleLinkSubmit(document.getElementById('linkInput').value)">Voeg toe</button>
      </div>

    </section>
  </div>
  <script>
    const blacklistedWords = [
      'sex', 'porn', 'xxx', 'adult', 'gambling', 'explicit', 
      'nude', 'escort', 'fetish', 'gore', 'snuf', 'violence',
      'blood', 'mutilation', 'disturbing', 'gruesome'
    ];

    function containsBlacklistedWords(url) {
      return blacklistedWords.some(word => url.toLowerCase().includes(word));
    }

    async function checkLinkAccessibility(url) {
      try {
        const response = await fetch(url, { method: 'GET', mode: 'no-cors' });
        const headers = response.headers;

        // Check if the site blocks embedding via X-Frame-Options or Content-Security-Policy
        if (headers.get('X-Frame-Options') === 'DENY' || headers.get('Content-Security-Policy')?.includes('frame-ancestors')) {
          console.log('The site blocks embedding via iframe.');
          return { blockedBySite: true, accessible: true }; // The site blocks embedding, but the link is accessible
        }

        if (response.ok) {
          console.log('The link is accessible:', url);
          return { blockedBySite: false, accessible: true }; // The link is accessible
        } else {
          console.log('The link is not accessible:', url, 'Status code:', response.status);
          return { blockedBySite: false, accessible: false }; // The site is not accessible
        }
      } catch (error) {
        console.error('Error opening the link:', url, error);
        return { blockedBySite: false, accessible: false }; // The site is not reachable due to firewall or other issues
      }
    }

    function displayLinkAsText(url) {
      // Display the link as text in the feed (for inaccessible links or sites that block embedding)
      console.log('Displaying link as text:', url);
    }

    function displayLinkAsMedia(url) {
      // Display the media (video/audio) in the feed (if accessible)
      console.log('Displaying link as media:', url);
    }

    async function handleLinkSubmit(url) {
      // First check if the URL is safe (doesn't contain blacklisted words)
      if (containsBlacklistedWords(url)) {
        alert('Deze link bevat ongepaste of gewelddadige inhoud en kan niet gedeeld worden.');
        return;
      }
      
      // Then check if the link is accessible
      const { blockedBySite, accessible } = await checkLinkAccessibility(url);

      if (!accessible) {
        alert('Deze link kan niet worden geopend door firewall- of netwerkbeperkingen.');
        return;
      }

      if (blockedBySite) {
        alert('Deze site blokkeert het insluiten van content, maar de link zal als tekst worden weergegeven.');
        displayLinkAsText(url);
      } else {
        // Continue with processing the link (e.g., displaying media or playing audio)
        displayLinkAsMedia(url);
      }
    }
  </script>
</body>
</html>
