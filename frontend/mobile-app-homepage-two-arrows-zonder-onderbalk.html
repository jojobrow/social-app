<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Social Prototype Mobile</title>
  <style>
    :root {
      --bg: #110a1f;
      --bg-2: #1a1030;
      --bg-3: #251540;
      --panel: rgba(31, 21, 51, 0.86);
      --panel-2: rgba(39, 27, 63, 0.92);
      --panel-3: rgba(49, 34, 78, 0.96);
      --glass: rgba(255,255,255,0.08);
      --line: rgba(255,255,255,0.11);
      --line-strong: rgba(255,255,255,0.18);
      --text: #f7f3ff;
      --text-soft: #d9cdf7;
      --text-dim: #b3a3d8;
      --accent: #9d5cff;
      --accent-2: #cfb1ff;
      --accent-3: #6f3fd1;
      --accent-deep: #5323ad;
      --ok: #8fe0c0;
      --danger: #f0a9c5;
      --shadow: 0 24px 60px rgba(0,0,0,0.30);
      --shadow-soft: 0 16px 36px rgba(0,0,0,0.18);
      --radius: 26px;
      --radius-sm: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 10%, rgba(157,92,255,0.22), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(207,177,255,0.14), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .appShell {
      min-height: 100dvh;
      max-width: 460px;
      margin: 0 auto;
      position: relative;
      background:
        linear-gradient(180deg, rgba(8,7,11,0.58), rgba(18,15,25,0.58)),
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 34%);
      backdrop-filter: blur(20px);
    }

    .screen {
      display: none;
      min-height: 100dvh;
    }

    .screen.active {
      display: block;
    }

    .page {
      padding: calc(var(--safe-top) + 18px) 16px calc(var(--safe-bottom) + 28px);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)),
        linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0)),
        radial-gradient(circle at top right, rgba(241,223,200,0.05), transparent 26%);
      pointer-events: none;
    }

    .cardBody {
      position: relative;
      z-index: 1;
      padding: 16px;
    }

    .topRow,
    .sectionHeader,
    .feedOverlayRow,
    .statRow,
    .actionRow,
    .composerActions,
    .miniRow,
    .bottomActionRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .topRow,
    .sectionHeader {
      align-items: flex-start;
    }

    .pageTitle {
      margin: 0;
      font-size: 30px;
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .pageIntro {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
      max-width: 34ch;
    }


    .pageTitle {
      font-size: 28px;
    }

    .topRow {
      position: sticky;
      top: calc(var(--safe-top) + 8px);
      z-index: 10;
      padding: 14px 16px;
      border-radius: 22px;
      background: rgba(30, 21, 48, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-soft);
    }

    .heroActions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .heroMeta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .heroChip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(17, 10, 31, 0.34);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .profileUploadRow {
      display: grid;
      gap: 10px;
    }

    .fieldLabel {
      font-size: 12px;
      color: var(--text-soft);
      font-weight: 700;
      letter-spacing: .01em;
    }

    .inlineActionRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .fileInputPlain {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--text-soft);
    }

    .modalSheet {
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(34,23,56,0.98), rgba(24,15,40,0.98));
    }

    .card {
      background: linear-gradient(180deg, rgba(41, 28, 67, 0.94), rgba(28, 19, 47, 0.94));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .buttonGroup {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .pill,
    .ghostBtn,
    .solidBtn,
    .dangerBtn {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: transform .15s ease, opacity .15s ease, background .2s ease, border-color .2s ease;
    }

    .pill:active,
    .ghostBtn:active,
    .solidBtn:active,
    .dangerBtn:active,
    .arrowBtn:active,
    .feedTapHint:active {
      transform: scale(0.985);
    }

    .pill,
    .ghostBtn {
      color: var(--text);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .solidBtn {
      color: #12091f;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 14px 32px rgba(120,64,220,0.28);
    }

    .dangerBtn {
      color: #ffe4e4;
      background: rgba(240,169,169,0.10);
      border: 1px solid rgba(240,169,169,0.18);
    }

    .hero {
      position: relative;
      padding: 18px;
      min-height: 312px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background-size: cover;
      background-position: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(16,10,31,0.72)),
        radial-gradient(circle at top right, rgba(207,177,255,0.20), transparent 34%),
        radial-gradient(circle at top left, rgba(157,92,255,0.16), transparent 30%);
    }

    .hero > * { position: relative; z-index: 1; }

    .avatarRow {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #fff;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 10px 24px rgba(0,0,0,0.20);
      flex: 0 0 auto;
    }

    .avatar img,
    .ownerMiniAvatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .identityName {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .identityHandle {
      margin-top: 4px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
    }

    .identityBio {
      margin: 12px 0 0;
      max-width: 92%;
      color: rgba(255,255,255,0.90);
      font-size: 14px;
      line-height: 1.56;
    }

    .gridStats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: var(--shadow-soft);
    }

    .statValue {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .statLabel {
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .sectionTitle {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .sectionText,
    .smallNote,
    .muted {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.56;
    }

    .muted strong { color: var(--text); }

    .field,
    .textarea,
    .fileInput,
    .select {
      width: 100%;
      padding: 14px;
      border-radius: 18px;
      color: var(--text);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.11);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .field::placeholder,
    .textarea::placeholder {
      color: var(--text-dim);
    }

    .textarea {
      min-height: 112px;
      resize: vertical;
    }

    .uploadBox {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(200,169,126,0.12), rgba(255,255,255,0.03));
      border: 1px dashed rgba(200,169,126,0.26);
    }

    .statusLine {
      min-height: 20px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .statusLine.error { color: #ffd1d1; }
    .statusLine.ok { color: #d1ffdf; }

    .postList,
    .creatorSimpleList,
    .reactionList {
      display: grid;
      gap: 12px;
    }

    .postCard {
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .postMedia {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(200,169,126,0.18), transparent 30%),
        linear-gradient(135deg, rgba(33,27,39,0.96), rgba(17,14,22,0.98));
    }

    .postMedia img,
    .postMedia video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .postTextOnly {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      text-align: center;
      font-size: 25px;
      line-height: 1.42;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(241,223,200,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(200,169,126,0.14), transparent 30%),
        linear-gradient(135deg, rgba(86,67,49,0.95), rgba(22,18,28,0.98));
    }

    .kindBadge,
    .makerBadge,
    .feedModeBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: rgba(255,255,255,0.95);
      background: rgba(10,9,13,0.44);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }

    .postMeta {
      padding: 12px 12px 14px;
      display: grid;
      gap: 10px;
    }

    .ownerMini {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ownerMiniAvatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      flex: 0 0 auto;
    }

    .ownerMiniName {
      font-size: 14px;
      font-weight: 800;
    }

    .ownerMiniHandle {
      margin-top: 2px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .caption {
      font-size: 14px;
      line-height: 1.56;
      white-space: pre-wrap;
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--text-soft);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .reactionItem,
    .simpleItem {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .reactionAuthor {
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 800;
    }

    .reactionText {
      font-size: 13px;
      line-height: 1.56;
      color: var(--text-soft);
      white-space: pre-wrap;
    }

    .emptyState {
      padding: 18px;
      border-radius: 20px;
      border: 1px dashed rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
      color: var(--text-soft);
      text-align: center;
      font-size: 14px;
      line-height: 1.55;
    }

    .feedScreen {
      position: relative;
      height: 100dvh;
      overflow: hidden;
      background: #09070f;
      touch-action: pan-y;
    }

    .feedCanvas {
      position: absolute;
      inset: 0;
    }

    .feedSlide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      background: #110d15;
    }

    .feedMediaWrap {
      position: absolute;
      inset: 0;
      background: #110d15;
    }

    .feedMediaWrap img,
    .feedMediaWrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .feedTextFill {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
      text-align: center;
      font-size: 32px;
      line-height: 1.34;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(241,223,200,0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(200,169,126,0.16), transparent 32%),
        linear-gradient(135deg, rgba(89,69,50,0.96), rgba(14,12,18,0.98));
    }

    .feedShade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0.05) 28%, rgba(0,0,0,0.34) 100%),
        radial-gradient(circle at top right, rgba(255,244,232,0.08), transparent 28%);
    }

    .feedOverlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 16px calc(var(--safe-bottom) + 18px);
      pointer-events: none;
    }

    .feedOverlay * { pointer-events: auto; }

    .feedInfo {
      max-width: calc(100% - 132px);
      padding: 8px 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      backdrop-filter: none;
      box-shadow: none;
    }

    .feedTitle {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.03em;
      font-weight: 900;
      color: #fffaf6;
      text-shadow: 0 2px 10px rgba(0,0,0,0.30);
    }

    .feedSubtitle {
      margin-top: 4px;
      color: rgba(255,255,255,0.92);
      font-size: 11px;
      line-height: 1.4;
      text-shadow: 0 2px 8px rgba(0,0,0,0.28);
    }

    .feedBottom {
      display: grid;
      gap: 14px;
    }

    .feedContentMeta {
      display: grid;
      gap: 8px;
      width: min(100%, 410px);
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      backdrop-filter: none;
      box-shadow: none;
    }

    .feedCaption {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.98);
      text-shadow: 0 2px 10px rgba(0,0,0,0.30);
      white-space: pre-wrap;
    }

    .feedStats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .feedTapHint,
    .feedLoopHint {
      align-self: flex-start;
      padding: 0;
      border-radius: 0;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255,255,255,0.94);
      background: transparent;
      border: 0;
      backdrop-filter: none;
    }

    .feedLoopHint {
      font-weight: 700;
      color: #fff2e7;
      text-shadow: 0 2px 8px rgba(0,0,0,0.24);
    }

    .arrowBtn {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      font-size: 22px;
      color: #4f3525;
      background: linear-gradient(180deg, rgba(255,250,246,0.92), rgba(243,229,216,0.80));
      border: 1px solid rgba(124,88,58,0.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(72,50,33,0.12);
    }

    .likeBtn {
      background: rgba(8,7,11,0.34);
      color: rgba(255,255,255,0.96);
      border: 1px solid rgba(255,255,255,0.12);
    }


    .feedSideArrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
    }

    .feedSideArrow.leftSide {
      left: 14px;
    }

    .feedSideArrow.rightSide {
      right: 14px;
    }

    .feedBackUpBtn {
      position: absolute;
      right: 18px;
      bottom: calc(var(--safe-bottom) + 206px);
      z-index: 6;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,248,242,0.70);
      color: #5c3f2c;
      border: 1px solid rgba(120,84,53,0.16);
      box-shadow: 0 10px 22px rgba(72,50,33,0.10);
      backdrop-filter: blur(8px);
      font-size: 15px;
      font-weight: 900;
    }

    .feedVideoControlsInline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 16px;
      background: rgba(255,248,242,0.56);
      border: 1px solid rgba(120,84,53,0.12);
      backdrop-filter: blur(8px);
    }

    .feedVideoInlineBtn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(111,84,62,0.96);
      color: #fff8f2;
      border: 1px solid rgba(111,84,62,0.96);
      font-size: 14px;
      font-weight: 900;
    }

    .feedVideoInlineBtn.ghost {
      background: rgba(255,255,255,0.82);
      color: #5f4330;
      border: 1px solid rgba(120,84,53,0.14);
    }

    .hidden { display: none !important; }

    @media (min-width: 461px) {
      .appShell {
        border-left: 1px solid rgba(255,255,255,0.04);
        border-right: 1px solid rgba(255,255,255,0.04);
      }
    }
  
    .modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 5, 9, 0.72);
      backdrop-filter: blur(14px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 20px 14px calc(var(--safe-bottom) + 20px);
      z-index: 1200;
    }

    .modalOverlay.open {
      display: flex;
    }

    .modalSheet {
      width: 100%;
      max-width: 460px;
      border-radius: 28px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015)),
        linear-gradient(180deg, var(--panel-3), var(--panel-2));
      border: 1px solid var(--line-strong);
      box-shadow: 0 28px 70px rgba(0,0,0,0.42);
    }

    .modalInner {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .modalHandle {
      width: 54px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      margin: 0 auto 6px;
    }

    .modalTitle {
      margin: 0;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .previewBox {
      min-height: 160px;
      border-radius: 22px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.14);
      color: var(--text-dim);
      text-align: center;
      padding: 18px;
    }

    .previewBox img,
    .previewBox video {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      display: block;
      border-radius: 18px;
    }

  </style>
</head>
<body>
  <div class="appShell">
    <section class="screen active" id="homeScreen"></section>
    <section class="screen" id="feedScreen"></section>
    <section class="screen" id="creatorScreen"></section>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const LOGIN_STORAGE_KEY = "socialPrototypeActiveUserId";
    const LOGIN_NAME_STORAGE_KEY = "socialPrototypeActiveUserName";
    const REMEMBER_LOGIN_STORAGE_KEY = "socialPrototypeRememberLogin";

    const state = {
      activeUserId: localStorage.getItem(LOGIN_STORAGE_KEY) || "",
      users: [],
      feedItems: [],
      activeScreen: "home",
      currentFeedIndex: 0,
      currentFeedScopeUserId: "",
      feedMode: "global",
      makerModeUserId: "",
      makerModeReturnPostId: null,
      homeEntryPostId: null,
      viewedCreatorUserId: "",
      ownFrontpage: null,
      creatorFrontpage: null,
      publishBusy: false,
      lastTapAt: 0,
      tapBurstCount: 0,
      tapBurstOwnerId: "",
      wheelLockUntil: 0,
      touchStartY: null,
      touchActive: false,
      friendSearchResults: [],
      incomingFriendRequests: [],
      outgoingFriendRequests: [],
      friendsList: []
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || "Request mislukt.");
      return data;
    }

    function getInitials(name = "?") {
      return String(name)
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map((part) => part[0])
        .join("")
        .slice(0, 2)
        .toUpperCase() || "?";
    }

    function getUserById(userId) {
      return state.users.find((user) => user.id === userId) || null;
    }

    function getUserBackground(user) {
      if (user?.backgroundUrl) return `url('${encodeURI(user.backgroundUrl)}')`;
      const heroColor = user?.heroColor || "#5c4734";
      return `linear-gradient(180deg, rgba(0,0,0,0.10), rgba(8,7,11,0.72)), radial-gradient(circle at top right, rgba(241,223,200,0.14), transparent 30%), radial-gradient(circle at top left, rgba(200,169,126,0.16), transparent 26%), linear-gradient(135deg, ${heroColor}, #151119)`;
    }

    function getAvatarHtml(user, className = "avatar") {
      if (user?.avatarUrl) {
        return `<div class="${className}" style="background:${escapeHtml(user.avatarColor || '#c8a97e')};"><img src="${escapeHtml(user.avatarUrl)}" alt="${escapeHtml(user.displayName || 'avatar')}" /></div>`;
      }
      return `<div class="${className}" style="background:linear-gradient(135deg, ${escapeHtml(user?.avatarColor || '#c8a97e')}, #6f543e);">${escapeHtml(getInitials(user?.displayName || '?'))}</div>`;
    }

    function getKindLabel(kind) {
      if (kind === "promoted") return "Promoted";
      if (kind === "recommended") return "Recommended";
      return "Normal";
    }

    function timeAgo(timestamp) {
      const diff = Math.max(0, Date.now() - Number(timestamp || 0));
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "zojuist";
      if (mins < 60) return `${mins} min geleden`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} uur geleden`;
      const days = Math.floor(hours / 24);
      return `${days} d geleden`;
    }

    function vibrateTick(pattern = [18, 45, 18]) {
      if (navigator.vibrate) {
        try { navigator.vibrate(pattern); } catch (_e) {}
      }
    }

    function setStatusLine(id, message = "", kind = "") {
      const element = $(id);
      if (!element) return;
      element.textContent = message;
      element.className = `statusLine${kind ? ` ${kind}` : ""}`;
    }

    function setActiveScreen(screen) {
      state.activeScreen = screen;
      ["homeScreen", "feedScreen", "creatorScreen"].forEach((id) => {
        $(id).classList.toggle("active", id === `${screen}Screen`);
      });
    }

    function switchAccount() {
      localStorage.removeItem(LOGIN_STORAGE_KEY);
      localStorage.removeItem(LOGIN_NAME_STORAGE_KEY);
      localStorage.removeItem(REMEMBER_LOGIN_STORAGE_KEY);
      window.location.href = "index.html";
    }

    async function loadUsers() {
      state.users = await fetchJson(`${API_BASE}/users`);
    }

    async function loadFeed() {
      const result = await fetchJson(`${API_BASE}/feed?userId=${encodeURIComponent(state.activeUserId)}`);
      state.feedItems = Array.isArray(result.items) ? result.items : [];
    }

    async function loadOwnFrontpage() {
      state.ownFrontpage = await fetchJson(`${API_BASE}/frontpage/${encodeURIComponent(state.activeUserId)}?viewerUserId=${encodeURIComponent(state.activeUserId)}`);
    }

    async function loadCreatorFrontpage(userId) {
      state.creatorFrontpage = await fetchJson(`${API_BASE}/frontpage/${encodeURIComponent(userId)}?viewerUserId=${encodeURIComponent(state.activeUserId)}`);
      state.viewedCreatorUserId = userId;
    }

    function getCurrentFeedItems() {
      if (state.feedMode === "creator" && state.makerModeUserId) {
        return state.feedItems.filter((item) => item.owner?.id === state.makerModeUserId);
      }

      if (state.homeEntryPostId) {
        const featured = state.feedItems.find((item) => item.id === state.homeEntryPostId);
        const remainder = state.feedItems.filter((item) => item.id !== state.homeEntryPostId);
        return featured ? [featured, ...remainder] : state.feedItems;
      }

      if (state.currentFeedScopeUserId) {
        const scoped = state.feedItems.filter((item) => item.owner?.id === state.currentFeedScopeUserId);
        return scoped.length ? scoped : state.feedItems;
      }

      return state.feedItems;
    }

    function getCurrentFeedItem() {
      const items = getCurrentFeedItems();
      if (!items.length) return null;
      const safeIndex = ((state.currentFeedIndex % items.length) + items.length) % items.length;
      state.currentFeedIndex = safeIndex;
      return items[safeIndex] || null;
    }

    function moveFeed(step) {
      const items = getCurrentFeedItems();
      if (!items.length) return;
      const len = items.length;
      state.currentFeedIndex = ((state.currentFeedIndex + step) % len + len) % len;
      renderFeedScreen();
    }

    function scrollFeedByIntent(direction) {
      const now = Date.now();
      if (now < state.wheelLockUntil) return;
      state.wheelLockUntil = now + 420;
      if (direction > 0) moveFeed(1);
      if (direction < 0) moveFeed(-1);
    }

    function onFeedWheel(event) {
      if (state.activeScreen !== "feed") return;
      if (Math.abs(event.deltaY) < 12) return;
      event.preventDefault();
      scrollFeedByIntent(event.deltaY > 0 ? 1 : -1);
    }

    function onFeedTouchStart(event) {
      if (state.activeScreen !== "feed") return;
      const target = event.target;
      if (target && target.closest(".feedVideoControlsInline")) return;
      state.touchActive = true;
      state.touchStartY = event.touches?.[0]?.clientY ?? null;
    }

    function onFeedTouchMove(event) {
      if (state.activeScreen !== "feed") return;
      if (!state.touchActive || state.touchStartY == null) return;
      const target = event.target;
      if (target && target.closest(".feedVideoControlsInline")) return;

      const currentY = event.touches?.[0]?.clientY ?? state.touchStartY;
      const delta = state.touchStartY - currentY;
      if (Math.abs(delta) < 58) return;

      event.preventDefault();
      scrollFeedByIntent(delta > 0 ? 1 : -1);
      state.touchActive = false;
      state.touchStartY = null;
    }

    function onFeedTouchEnd() {
      state.touchActive = false;
      state.touchStartY = null;
    }

    function bindFeedGestures() {
      window.addEventListener("wheel", onFeedWheel, { passive: false });
      window.addEventListener("touchstart", onFeedTouchStart, { passive: true });
      window.addEventListener("touchmove", onFeedTouchMove, { passive: false });
      window.addEventListener("touchend", onFeedTouchEnd, { passive: true });
      window.addEventListener("touchcancel", onFeedTouchEnd, { passive: true });
    }

    function normalizeHashtags(input) {
      return String(input || "")
        .split(/[\s,]+/)
        .map((part) => part.trim())
        .filter(Boolean)
        .map((part) => (part.startsWith("#") ? part : `#${part}`))
        .slice(0, 8);
    }

    async function uploadMedia(file) {
      const formData = new FormData();
      formData.append("ownerUserId", state.activeUserId);
      formData.append("media", file);
      return fetchJson(`${API_BASE}/upload-media`, { method: "POST", body: formData });
    }


    async function loadFriendsData() {
      const [listResult, requestsResult] = await Promise.all([
        fetchJson(`${API_BASE}/friends/list?userId=${encodeURIComponent(state.activeUserId)}`),
        fetchJson(`${API_BASE}/friends/requests?userId=${encodeURIComponent(state.activeUserId)}`)
      ]);

      state.friendsList = Array.isArray(listResult.items) ? listResult.items : [];
      state.incomingFriendRequests = Array.isArray(requestsResult.incoming) ? requestsResult.incoming : [];
      state.outgoingFriendRequests = Array.isArray(requestsResult.outgoing) ? requestsResult.outgoing : [];
    }

    async function searchFriends() {
      const query = $("friendSearchInput")?.value.trim() || "";
      try {
        const result = await fetchJson(`${API_BASE}/friends/search?userId=${encodeURIComponent(state.activeUserId)}&q=${encodeURIComponent(query)}`);
        state.friendSearchResults = Array.isArray(result.items) ? result.items : [];
        renderHomeScreen();
      } catch (error) {
        alert(error.message || "Zoeken mislukt.");
      }
    }

    async function acceptFriendRequest(requesterUserId) {
      try {
        await fetchJson(`${API_BASE}/friends/accept`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ requesterUserId, targetUserId: state.activeUserId })
        });
        await refreshAll({ keepScreen: "home" });
      } catch (error) {
        alert(error.message || "Accepteren mislukt.");
      }
    }

    async function removeFriend(friendUserId) {
      const ok = confirm("Weet je zeker dat je deze vriend wilt verwijderen?");
      if (!ok) return;

      try {
        await fetchJson(`${API_BASE}/friends/remove`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userA: state.activeUserId, userB: friendUserId })
        });
        await refreshAll({ keepScreen: "home" });
      } catch (error) {
        alert(error.message || "Verwijderen mislukt.");
      }
    }

    function renderFriendSearchResults() {
      if (!state.friendSearchResults.length) {
        return `<div class="emptyState">Nog geen zoekresultaten. Zoek op naam of @handle.</div>`;
      }

      return `
        <div class="reactionList">
          ${state.friendSearchResults.map((user) => `
            <div class="reactionItem">
              <div class="miniRow">
                <div class="ownerMini">
                  ${getAvatarHtml(user, "ownerMiniAvatar")}
                  <div>
                    <div class="ownerMiniName">${escapeHtml(user.displayName || "Gebruiker")}</div>
                    <div class="ownerMiniHandle">${escapeHtml(user.handle || "")}</div>
                  </div>
                </div>
                <div class="buttonGroup">
                  ${
                    user.friendshipStatus === "accepted"
                      ? `<button class="ghostBtn" onclick="removeFriend('${user.id}')">Verwijder</button>`
                      : user.friendshipStatus === "pending"
                      ? `<button class="pill" disabled>Pending</button>`
                      : `<button class="solidBtn" onclick="sendFriendRequest('${user.id}')">Toevoegen</button>`
                  }
                </div>
              </div>
              <div class="reactionText">${escapeHtml(user.bio || "")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderIncomingFriendRequests() {
      if (!state.incomingFriendRequests.length) {
        return `<div class="emptyState">Nog geen inkomende vriendschapsverzoeken.</div>`;
      }

      return `
        <div class="reactionList">
          ${state.incomingFriendRequests.map((request) => `
            <div class="reactionItem">
              <div class="miniRow">
                <div class="ownerMini">
                  ${getAvatarHtml(request.requester || {}, "ownerMiniAvatar")}
                  <div>
                    <div class="ownerMiniName">${escapeHtml(request.requester?.displayName || "Gebruiker")}</div>
                    <div class="ownerMiniHandle">${escapeHtml(request.requester?.handle || "")}</div>
                  </div>
                </div>
                <button class="solidBtn" onclick="acceptFriendRequest('${request.requesterUserId}')">Accepteren</button>
              </div>
              <div class="smallNote">${escapeHtml(timeAgo(request.createdAt))}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderFriendsList() {
      if (!state.friendsList.length) {
        return `<div class="emptyState">Nog geen vrienden toegevoegd.</div>`;
      }

      return `
        <div class="reactionList">
          ${state.friendsList.map((friend) => `
            <div class="reactionItem">
              <div class="miniRow">
                <div class="ownerMini">
                  ${getAvatarHtml(friend, "ownerMiniAvatar")}
                  <div>
                    <div class="ownerMiniName">${escapeHtml(friend.displayName || "Gebruiker")}</div>
                    <div class="ownerMiniHandle">${escapeHtml(friend.handle || "")}</div>
                  </div>
                </div>
                <button class="ghostBtn" onclick="removeFriend('${friend.id}')">Verwijder</button>
              </div>
              <div class="reactionText">${escapeHtml(friend.bio || "")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }


    async function publishPost() {
      if (state.publishBusy) return;

      const caption = $("composeCaption")?.value.trim() || "";
      const hashtags = normalizeHashtags($("composeHashtags")?.value || "");
      const file = $("composeMedia")?.files?.[0] || null;
      const publishKind = $("composeFeedKind")?.value || "normal";

      if (!caption && !file) {
        setStatusLine("composeStatus", "Voeg eerst tekst of media toe.", "error");
        return;
      }

      state.publishBusy = true;
      setStatusLine("composeStatus", "Bezig met plaatsen...", "");

      try {
        let imageUrl = "";
        let videoUrl = "";

        if (file) {
          const upload = await uploadMedia(file);
          if (upload.postType === "video") videoUrl = upload.url;
          else imageUrl = upload.url;
        }

        await fetchJson(`${API_BASE}/posts`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ownerUserId: state.activeUserId,
            caption,
            imageUrl,
            videoUrl,
            hashtags,
            feedKind: publishKind
          })
        });

        if ($("composeCaption")) $("composeCaption").value = "";
        if ($("composeHashtags")) $("composeHashtags").value = "";
        if ($("composeMedia")) $("composeMedia").value = "";
        if ($("composeFeedKind")) $("composeFeedKind").value = "normal";
        if ($("composePreview")) $("composePreview").innerHTML = "Nog geen foto of video gekozen.";

        await refreshAll({ keepScreen: "home" });
        closeComposeModal();
        setStatusLine("composeStatus", "Bericht geplaatst.", "ok");
      } catch (error) {
        setStatusLine("composeStatus", error.message || "Plaatsen mislukt.", "error");
      } finally {
        state.publishBusy = false;
      }
    }

    async function likePost(postId) {
      try {
        await fetchJson(`${API_BASE}/posts/${postId}/like`, { method: "POST" });
        await loadFeed();
        if (state.activeScreen === "feed") renderFeedScreen();
        if (state.activeScreen === "home") {
          await loadOwnFrontpage();
          renderHomeScreen();
        }
        if (state.activeScreen === "creator" && state.viewedCreatorUserId) {
          await loadCreatorFrontpage(state.viewedCreatorUserId);
          renderCreatorScreen();
        }
      } catch (error) {
        alert(error.message || "Liken mislukt.");
      }
    }


    async function deletePost(postId) {
      const currentIndexBeforeDelete = state.currentFeedIndex;

      if (!confirm("Weet je zeker dat je dit bericht wilt verwijderen?")) {
        return;
      }

      try {
        await fetchJson(`${API_BASE}/posts/${postId}/delete`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ownerUserId: state.activeUserId })
        });

        await loadFeed();
        await loadOwnFrontpage();
        if (state.viewedCreatorUserId) {
          await loadCreatorFrontpage(state.viewedCreatorUserId);
        }

        const updatedItems = getCurrentFeedItems();
        if (!updatedItems.length) {
          state.currentFeedIndex = 0;
          openOwnHomepage();
          return;
        }

        state.currentFeedIndex = Math.min(currentIndexBeforeDelete, updatedItems.length - 1);

        if (state.activeScreen === "feed") {
          renderFeedScreen();
        } else if (state.activeScreen === "home") {
          renderHomeScreen();
        } else if (state.activeScreen === "creator") {
          renderCreatorScreen();
        }
      } catch (error) {
        alert(error.message || "Verwijderen mislukt.");
      }
    }

    async function dislikePost(postId) {
      try {
        await fetchJson(`${API_BASE}/posts/${postId}/dislike`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ viewerUserId: state.activeUserId })
        });
        await loadFeed();
        if (state.activeScreen === "feed") renderFeedScreen();
      } catch (error) {
        alert(error.message || "Verbergen mislukt.");
      }
    }

    async function likeFrontpage(userId) {
      try {
        await fetchJson(`${API_BASE}/frontpage/${userId}/like`, { method: "POST" });
        if (userId === state.activeUserId) {
          await loadOwnFrontpage();
          renderHomeScreen();
        } else {
          await loadCreatorFrontpage(userId);
          renderCreatorScreen();
        }
      } catch (error) {
        alert(error.message || "Homepage-like mislukt.");
      }
    }

    async function sendFrontpageReaction(targetUserId) {
      const inputId = targetUserId === state.activeUserId ? "homeReactionInput" : "creatorReactionInput";
      const textarea = $(inputId);
      if (!textarea) return;
      const text = textarea.value.trim();
      if (!text) return;

      try {
        await fetchJson(`${API_BASE}/frontpage/${targetUserId}/react`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fromUserId: state.activeUserId, text })
        });
        textarea.value = "";
        alert("Bericht is naar pending moderatie gestuurd.");
        if (targetUserId === state.activeUserId) {
          await loadOwnFrontpage();
          renderHomeScreen();
        } else {
          await loadCreatorFrontpage(targetUserId);
          renderCreatorScreen();
        }
      } catch (error) {
        alert(error.message || "Versturen mislukt.");
      }
    }

    async function moderateReaction(reactionId, action) {
      try {
        await fetchJson(`${API_BASE}/frontpage/${state.activeUserId}/reactions/${reactionId}/${action}`, { method: "POST" });
        await loadOwnFrontpage();
        renderHomeScreen();
      } catch (error) {
        alert(error.message || "Moderatie mislukt.");
      }
    }

    async function sendFriendRequest(targetUserId) {
      try {
        await fetchJson(`${API_BASE}/friends/request`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ requesterUserId: state.activeUserId, targetUserId })
        });

        if (state.activeScreen === "home") {
          await refreshAll({ keepScreen: "home" });
        } else {
          await loadCreatorFrontpage(targetUserId);
          renderCreatorScreen();
        }
      } catch (error) {
        alert(error.message || "Vriendschapsverzoek mislukt.");
      }
    }

    async function saveProfile() {
      const displayName = $("profileDisplayName")?.value.trim() || "";
      const handleRaw = $("profileHandle")?.value.trim() || "";
      const bio = $("profileBio")?.value.trim() || "";
      const password = $("profilePassword")?.value || "";

      if (!displayName) {
        setStatusLine("profileStatus", "Naam mag niet leeg zijn.", "error");
        return;
      }

      if (!handleRaw) {
        setStatusLine("profileStatus", "Handle mag niet leeg zijn.", "error");
        return;
      }

      const payload = {
        displayName,
        handle: handleRaw.startsWith("@") ? handleRaw : `@${handleRaw}`,
        bio
      };

      if (password.length > 0) {
        payload.password = password;
      }

      setStatusLine("profileStatus", "Profiel wordt opgeslagen...", "");

      try {
        const result = await fetchJson(`${API_BASE}/users/${encodeURIComponent(state.activeUserId)}/profile`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (result?.user?.displayName) {
          localStorage.setItem("socialPrototypeActiveUserName", result.user.displayName);
        }

        if ($("profilePassword")) {
          $("profilePassword").value = "";
        }

        await refreshAll({ keepScreen: "home" });
        setStatusLine("profileStatus", "Profiel opgeslagen.", "ok");
      } catch (error) {
        setStatusLine("profileStatus", error.message || "Profiel opslaan mislukt.", "error");
      }
    }

    async function uploadProfileBackground() {
      const file = $("profileBackgroundFile")?.files?.[0] || null;
      if (!file) {
        setStatusLine("backgroundStatus", "Kies eerst een achtergrondfoto.", "error");
        return;
      }

      setStatusLine("backgroundStatus", "Achtergrond wordt geüpload...", "");

      try {
        const formData = new FormData();
        formData.append("background", file);

        const response = await fetch(`${API_BASE}/users/${encodeURIComponent(state.activeUserId)}/profile-media`, {
          method: "POST",
          body: formData
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.message || "Upload mislukt.");

        if ($("profileBackgroundFile")) {
          $("profileBackgroundFile").value = "";
        }

        await refreshAll({ keepScreen: "home" });
        setStatusLine("backgroundStatus", "Achtergrond opgeslagen.", "ok");
      } catch (error) {
        setStatusLine("backgroundStatus", error.message || "Upload mislukt.", "error");
      }
    }

    function openGlobalFeed() {
      state.feedMode = "global";
      state.currentFeedScopeUserId = "";
      state.makerModeUserId = "";
      state.homeEntryPostId = null;
      state.currentFeedIndex = 0;
      setActiveScreen("feed");
      renderFeedScreen();
    }

    function openHomepageEntryFeed() {
      const ownPosts = state.feedItems
        .filter((item) => item.owner?.id === state.activeUserId)
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      const firstOwnPost = ownPosts[0] || null;

      state.feedMode = "global";
      state.currentFeedScopeUserId = "";
      state.makerModeUserId = "";
      state.homeEntryPostId = firstOwnPost ? firstOwnPost.id : null;
      state.currentFeedIndex = 0;
      setActiveScreen("feed");
      renderFeedScreen();
    }

    function openOwnHomepage() {
      state.feedMode = "global";
      state.currentFeedScopeUserId = "";
      state.makerModeUserId = "";
      state.homeEntryPostId = null;
      state.currentFeedIndex = 0;
      setActiveScreen("home");
      renderHomeScreen();
    }

    function openOwnContentFeed() {
      state.feedMode = "global";
      state.currentFeedScopeUserId = state.activeUserId;
      state.makerModeUserId = "";
      state.currentFeedIndex = 0;
      setActiveScreen("feed");
      renderFeedScreen();
    }

    async function openCurrentCreatorHomepage() {
      const current = getCurrentFeedItem();
      if (!current?.owner?.id) return;
      await loadCreatorFrontpage(current.owner.id);
      setActiveScreen("creator");
      renderCreatorScreen();
    }

    async function openCreatorHomepageFromCard(userId) {
      if (!userId) return;
      await loadCreatorFrontpage(userId);
      setActiveScreen("creator");
      renderCreatorScreen();
    }

    function findFeedIndexByPostId(postId) {
      if (postId == null) return 0;
      const index = state.feedItems.findIndex((item) => item.id === postId);
      return index >= 0 ? index : 0;
    }

    function enterMakerMode(userId) {
      if (!userId) return;
      const current = getCurrentFeedItem();
      state.makerModeReturnPostId = current?.id ?? null;
      state.feedMode = "creator";
      state.makerModeUserId = userId;
      state.currentFeedScopeUserId = "";
      state.currentFeedIndex = 0;
      vibrateTick([18, 40, 18]);
      renderFeedScreen();
    }

    function exitMakerModeToFeed() {
      const returnPostId = state.makerModeReturnPostId;
      state.feedMode = "global";
      state.makerModeUserId = "";
      state.currentFeedScopeUserId = "";
      const items = getCurrentFeedItems();
      const indexInCurrentList = items.findIndex((item) => item.id === returnPostId);
      state.currentFeedIndex = indexInCurrentList >= 0 ? indexInCurrentList : findFeedIndexByPostId(returnPostId);
      vibrateTick([14, 30, 14]);
      renderFeedScreen();
    }

    function jumpFeedUpOne(event) {
      if (event) event.stopPropagation();
      moveFeed(-1);
    }

    async function handleFeedLeftArrow() {
      if (state.feedMode === "creator") {
        exitMakerModeToFeed();
        return;
      }

      if (state.currentFeedScopeUserId && state.currentFeedScopeUserId !== state.activeUserId) {
        await loadCreatorFrontpage(state.currentFeedScopeUserId);
        setActiveScreen("creator");
        renderCreatorScreen();
        return;
      }

      openOwnHomepage();
    }

    function handlePostTap(ownerUserId) {
      const now = Date.now();
      if (now - state.lastTapAt > 650 || state.tapBurstOwnerId !== ownerUserId) {
        state.tapBurstCount = 0;
      }
      state.lastTapAt = now;
      state.tapBurstOwnerId = ownerUserId;
      state.tapBurstCount += 1;

      if (state.tapBurstCount >= 3) {
        state.tapBurstCount = 0;
        if (state.feedMode === "creator") {
          exitMakerModeToFeed();
        } else {
          enterMakerMode(ownerUserId);
        }
      }
    }

    function renderPostCard(item, options = {}) {
      const owner = item.owner || getUserById(item.ownerUserId) || {};
      const isOwn = owner.id === state.activeUserId;
      const mediaHtml = item.postType === "image" && item.imageUrl
        ? `<div class="postMedia"><img src="${escapeHtml(item.imageUrl)}" alt="post" /></div>`
        : item.postType === "video" && item.videoUrl
        ? `<div class="postMedia"><video src="${escapeHtml(item.videoUrl)}" controls playsinline preload="metadata"></video></div>`
        : `<div class="postTextOnly">${escapeHtml(item.caption || "Tekstpost")}</div>`;

      const hashtags = Array.isArray(item.hashtags) && item.hashtags.length
        ? `<div class="hashtags">${item.hashtags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>`
        : "";

      const caption = item.postType === "text" && !item.imageUrl && !item.videoUrl
        ? ""
        : `<div class="caption">${escapeHtml(item.caption || "")}</div>`;

      const ownerAction = options.creatorCard
        ? `<button class="ghostBtn" onclick="openCreatorHomepageFromCard('${owner.id}')">Open maker</button>`
        : isOwn
        ? `<button class="ghostBtn" onclick="openOwnContentFeed()">Mijn content</button>`
        : `<button class="ghostBtn" onclick="openCreatorHomepageFromCard('${owner.id}')">Maker</button>`;

      return `
        <article class="postCard">
          ${mediaHtml}
          <div class="postMeta">
            <div class="miniRow">
              <div class="ownerMini">
                ${getAvatarHtml(owner, "ownerMiniAvatar")}
                <div>
                  <div class="ownerMiniName">${escapeHtml(owner.displayName || "Gebruiker")}</div>
                  <div class="ownerMiniHandle">${escapeHtml(owner.handle || "")}</div>
                </div>
              </div>
              <span class="kindBadge">${escapeHtml(getKindLabel(item.feedKind || "normal"))}</span>
            </div>
            ${caption}
            ${hashtags}
            <div class="actionRow">
              <div class="buttonGroup">
                <button class="ghostBtn" onclick="likePost(${Number(item.id)})">♥ ${Number(item.likes || 0)}</button>
                <button class="ghostBtn" onclick="dislikePost(${Number(item.id)})">Verberg</button>
              </div>
              ${ownerAction}
            </div>
          </div>
        </article>
      `;

      if (item.postType === "video" && item.videoUrl) {
        bindFeedVideoControls();
      }
    }

    function renderReactionList(reactions, showModeration = false) {
      if (!Array.isArray(reactions) || !reactions.length) {
        return `<div class="emptyState">Nog geen berichten op deze voorpagina.</div>`;
      }

      return `
        <div class="reactionList">
          ${reactions.map((reaction) => {
            const fromUser = reaction.fromUser || getUserById(reaction.fromUserId) || {};
            return `
              <div class="reactionItem">
                <div class="reactionAuthor">${escapeHtml(fromUser.displayName || "Gebruiker")} · ${escapeHtml(fromUser.handle || "")}</div>
                <div class="reactionText">${escapeHtml(reaction.text || "")}</div>
                <div class="miniRow" style="margin-top:10px;">
                  <div class="smallNote">${escapeHtml(timeAgo(reaction.createdAt))}</div>
                  ${showModeration ? `
                    <div class="buttonGroup">
                      <button class="ghostBtn" onclick="moderateReaction(${Number(reaction.id)}, 'approve')">Approve</button>
                      <button class="ghostBtn" onclick="moderateReaction(${Number(reaction.id)}, 'reject')">Reject</button>
                      <button class="dangerBtn" onclick="moderateReaction(${Number(reaction.id)}, 'block')">Block</button>
                    </div>
                  ` : ""}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;

      if (item.postType === "video" && item.videoUrl) {
        bindFeedVideoControls();
      }
    }


    function openComposeModal() {
      const modal = $("composeModal");
      if (!modal) return;
      modal.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeComposeModal(event) {
      if (event && event.target && event.target !== $("composeModal")) return;
      const modal = $("composeModal");
      if (!modal) return;
      modal.classList.remove("open");
      document.body.style.overflow = "";
    }

    function handleComposeMediaChange(event) {
      const file = event?.target?.files?.[0] || null;
      const preview = $("composePreview");
      if (!preview) return;
      if (!file) {
        preview.innerHTML = "Nog geen foto of video gekozen.";
        return;
      }
      const url = URL.createObjectURL(file);
      if (file.type.startsWith("video/")) {
        preview.innerHTML = `<video src="${url}" controls playsinline loop></video>`;
      } else {
        preview.innerHTML = `<img src="${url}" alt="Voorbeeld van upload" />`;
      }
    }

    function renderHomeScreen() {
      const frontpage = state.ownFrontpage;
      const user = frontpage?.user || getUserById(state.activeUserId) || {};
      const stats = frontpage?.stats || { posts: 0, homepageLikes: 0, reactions: 0, friends: 0 };
      const posts = Array.isArray(frontpage?.recentPosts) ? frontpage.recentPosts : [];
      const acceptedReactions = Array.isArray(frontpage?.acceptedReactions) ? frontpage.acceptedReactions : [];
      const pendingReactions = Array.isArray(frontpage?.pendingReactions) ? frontpage.pendingReactions : [];

      $("homeScreen").innerHTML = `
        <div class="page">
          <div class="stack">
            <div class="topRow">
              <div>
                <h1 class="pageTitle">Homepage</h1>
                <div class="pageIntro">Jouw plek. Rustig, duidelijk en direct.</div>
              </div>
              <div class="buttonGroup">
                <button class="solidBtn" onclick="openHomepageEntryFeed()">Feed</button>
                <button class="ghostBtn" onclick="window.location.href='app.html'">Desktop</button>
                <button class="ghostBtn" onclick="switchAccount()">Account</button>
              </div>
            </div>

            <section class="card hero" style="background:${getUserBackground(user)};">
              <div class="avatarRow">
                ${getAvatarHtml(user)}
                <div class="identityBlock">
                  <h2 class="identityName">${escapeHtml(user.displayName || 'Gebruiker')}</h2>
                  <div class="identityHandle">${escapeHtml(user.handle || '')}</div>
                </div>
              </div>
              <p class="identityBio">${escapeHtml(user.bio || 'Nieuwe gebruiker op het prototype.')}</p>
              <div class="heroMeta">
                <span class="heroChip">${Number(stats.posts || 0)} posts</span>
                <span class="heroChip">${Number(stats.homepageLikes || 0)} likes</span>
                <span class="heroChip">${Number(stats.friends || 0)} vrienden</span>
              </div>
              <div class="heroActions">
                <button class="solidBtn" onclick="openComposeModal()">Content maken</button>
                <button class="ghostBtn" onclick="openOwnContentFeed()">Mijn content</button>
                <button class="ghostBtn" onclick="refreshAll({ keepScreen: 'home' })">Vernieuw</button>
              </div>
            </section>

            <div class="modalOverlay" id="composeModal" onclick="closeComposeModal(event)">
              <div class="modalSheet" onclick="event.stopPropagation()">
                <div class="modalInner">
                  <div class="modalHandle"></div>
                  <div class="sectionHeader">
                    <div>
                      <h3 class="modalTitle">Nieuwe content</h3>
                      <div class="sectionText">Kies je foto of video en zet er een tekst bij.</div>
                    </div>
                    <button class="ghostBtn" onclick="closeComposeModal()">Sluiten</button>
                  </div>

                  <div class="previewBox" id="composePreview">Nog geen foto of video gekozen.</div>

                  <div class="uploadBox">
                    <input id="composeMedia" class="fileInput" type="file" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm" onchange="handleComposeMediaChange(event)" />
                    <div class="smallNote">Afbeelding of video. De server accepteert jpg, jpeg, png, webp, mp4 en webm.</div>
                  </div>

                  <textarea id="composeCaption" class="textarea" placeholder="Zet hier je tekst of caption..."></textarea>
                  <input id="composeHashtags" class="field" placeholder="#homepage #maker #concept" />
                  <select id="composeFeedKind" class="select">
                    <option value="normal">Normal</option>
                    <option value="recommended">Recommended</option>
                    <option value="promoted">Promoted</option>
                  </select>
                  <div class="composerActions">
                    <div id="composeStatus" class="statusLine"></div>
                    <button class="solidBtn" onclick="publishPost()">Plaatsen</button>
                  </div>
                </div>
              </div>
            </div>

            <section class="card">
              <div class="cardBody stack">
                <div class="sectionHeader">
                  <div>
                    <h3 class="sectionTitle">Reacties</h3>
                    <div class="sectionText">Publieke berichten voor jouw homepage.</div>
                  </div>
                </div>
                <textarea id="homeReactionInput" class="textarea" placeholder="Schrijf iets voor je eigen homepage..."></textarea>
                <div class="actionRow">
                  <div class="smallNote">Nieuwe berichten komen eerst in pending.</div>
                  <button class="ghostBtn" onclick="sendFrontpageReaction('${user.id}')">Versturen</button>
                </div>
                ${renderReactionList(acceptedReactions, false)}
              </div>
            </section>

            <section class="card">
              <div class="cardBody stack">
                <div class="sectionHeader">
                  <div>
                    <h3 class="sectionTitle">Pending</h3>
                    <div class="sectionText">Keuren, afwijzen of blokkeren.</div>
                  </div>
                </div>
                ${renderReactionList(pendingReactions, true)}
              </div>
            </section>

            <section class="card">
              <div class="cardBody stack">
                <div class="sectionHeader">
                  <div>
                    <h3 class="sectionTitle">Profiel bewerken</h3>
                    <div class="sectionText">Pas je profiel aan en upload je homepage-achtergrond.</div>
                  </div>
                </div>
                <input id="profileDisplayName" class="field" value="${escapeHtml(user.displayName || '')}" placeholder="Naam" />
                <input id="profileHandle" class="field" value="${escapeHtml(user.handle || '')}" placeholder="@handle" />
                <textarea id="profileBio" class="textarea" placeholder="Korte bio...">${escapeHtml(user.bio || '')}</textarea>
                <input id="profilePassword" class="field" type="password" placeholder="Nieuw wachtwoord (optioneel)" />
                <div class="profileUploadRow">
                  <div class="fieldLabel">Homepage-achtergrond</div>
                  <input id="profileBackgroundFile" class="fileInputPlain" type="file" accept="image/jpeg,image/png,image/webp" />
                  <div class="inlineActionRow">
                    <button class="ghostBtn" onclick="uploadProfileBackground()">Achtergrond uploaden</button>
                    <div id="backgroundStatus" class="statusLine"></div>
                  </div>
                </div>
                <div class="composerActions">
                  <div id="profileStatus" class="statusLine"></div>
                  <button class="solidBtn" onclick="saveProfile()">Opslaan</button>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="cardBody stack">
                <div class="sectionHeader">
                  <div>
                    <h3 class="sectionTitle">Jouw content</h3>
                    <div class="sectionText">Recente posts op je homepage.</div>
                  </div>
                </div>
                <div class="postList">
                  ${posts.length ? posts.map((item) => renderPostCard(item)).join("") : `<div class="emptyState">Nog geen posts op je homepage.</div>`}
                </div>
              </div>
            </section>
          </div>
        </div>
      `;
    }

    function renderCreatorScreen() {
      const frontpage = state.creatorFrontpage;
      const user = frontpage?.user || getUserById(state.viewedCreatorUserId) || {};
      const stats = frontpage?.stats || { posts: 0, homepageLikes: 0, reactions: 0, friends: 0 };
      const posts = Array.isArray(frontpage?.recentPosts) ? frontpage.recentPosts : [];
      const reactions = Array.isArray(frontpage?.acceptedReactions) ? frontpage.acceptedReactions : [];
      const friendshipStatus = frontpage?.friendshipStatus || "none";
      const canFriend = user.id && user.id !== state.activeUserId;

      $("creatorScreen").innerHTML = `
        <div class="page">
          <div class="stack">
            <div class="topRow">
              <div>
                <h1 class="pageTitle">Maker</h1>
                <div class="pageIntro">De publieke homepage van de maker.</div>
              </div>
              <div class="buttonGroup">
                <button class="pill" onclick="setActiveScreen('feed'); renderFeedScreen();">Feed</button>
              </div>
            </div>

            <section class="card hero" style="background:${getUserBackground(user)}; min-height: 248px;">
              <div class="avatarRow">
                ${getAvatarHtml(user)}
                <div class="identityBlock">
                  <h2 class="identityName">${escapeHtml(user.displayName || 'Maker')}</h2>
                  <div class="identityHandle">${escapeHtml(user.handle || '')}</div>
                </div>
              </div>
              <p class="identityBio">${escapeHtml(user.bio || 'Publieke makerspagina.')}</p>
              <div class="heroMeta">
                <span class="heroChip">${Number(stats.posts || 0)} posts</span>
                <span class="heroChip">${Number(stats.homepageLikes || 0)} likes</span>
                <span class="heroChip">${Number(stats.reactions || 0)} reacties</span>
              </div>
              <div class="heroActions">
                <button class="ghostBtn" onclick="openCreatorContentFeed('${user.id}')">Alle content</button>
                <button class="ghostBtn" onclick="likeFrontpage('${user.id}')">♥ Homepage</button>
                ${canFriend ? `<button class="solidBtn" onclick="sendFriendRequest('${user.id}')">Vriend toevoegen</button>` : ``}
              </div>
            </section>

            <section class="card">
              <div class="cardBody stack">
                <div class="sectionHeader">
                  <div>
                    <h3 class="sectionTitle">Reactie sturen</h3>
                    <div class="sectionText">Vriendschapsstatus: ${escapeHtml(friendshipStatus)}</div>
                  </div>
                </div>
                <textarea id="creatorReactionInput" class="textarea" placeholder="Schrijf iets aan ${escapeHtml(user.displayName || 'de maker')}..."></textarea>
                <div class="actionRow">
                  <div class="smallNote">Bericht gaat eerst naar pending bij de maker.</div>
                  <button class="ghostBtn" onclick="sendFrontpageReaction('${user.id}')">Versturen</button>
                </div>
                ${renderReactionList(reactions, false)}
              </div>
            </section>

            <section class="card">
              <div class="cardBody stack">
                <div class="sectionHeader">
                  <div>
                    <h3 class="sectionTitle">Content van deze maker</h3>
                    <div class="sectionText">Openbaar overzicht van recente posts.</div>
                  </div>
                </div>
                <div class="creatorSimpleList">
                  ${posts.length ? posts.map((item) => renderPostCard(item, { creatorCard: true })).join("") : `<div class="emptyState">Deze maker heeft nog geen content.</div>`}
                </div>
              </div>
            </section>
          </div>
        </div>
      `;
    }

    function getFeedVideo() {
      return document.getElementById("feedVideoElement");
    }

    function updateFeedVideoUi() {
      const video = getFeedVideo();
      const playBtn = document.getElementById("feedVideoPlayBtn");
      const muteBtn = document.getElementById("feedVideoMuteBtn");
      if (!video || !playBtn || !muteBtn) return;
      playBtn.textContent = video.paused ? "▶" : "❚❚";
      muteBtn.textContent = video.muted ? "🔇" : "🔊";
    }

    function bindFeedVideoControls() {
      const video = getFeedVideo();
      if (!video) return;
      const safeUpdate = () => updateFeedVideoUi();
      video.addEventListener("play", safeUpdate);
      video.addEventListener("pause", safeUpdate);
      video.addEventListener("loadedmetadata", safeUpdate);
      video.addEventListener("volumechange", safeUpdate);
      video.addEventListener("ended", safeUpdate);
      updateFeedVideoUi();
    }

    function toggleFeedVideoPlay(event) {
      if (event) event.stopPropagation();
      const video = getFeedVideo();
      if (!video) return;
      if (video.paused) {
        video.play().catch(() => {});
      } else {
        video.pause();
      }
      updateFeedVideoUi();
    }

    function toggleFeedVideoMute(event) {
      if (event) event.stopPropagation();
      const video = getFeedVideo();
      if (!video) return;
      video.muted = !video.muted;
      updateFeedVideoUi();
    }

    function renderFeedScreen() {
      const items = getCurrentFeedItems();
      const item = getCurrentFeedItem();

      if (!items.length || !item) {
        $("feedScreen").innerHTML = `
          <div class="feedScreen">
            <div class="page" style="padding-top:calc(var(--safe-top) + 24px);">
              <div class="emptyState">Nog geen feeditems gevonden.</div>
            </div>
          </div>
        `;
        return;
      }

      const owner = item.owner || getUserById(item.ownerUserId) || {};
      const mediaHtml = item.postType === "image" && item.imageUrl
        ? `<div class="feedMediaWrap"><img src="${escapeHtml(item.imageUrl)}" alt="feed" /></div>`
        : item.postType === "video" && item.videoUrl
        ? `<div class="feedMediaWrap" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();" onpointerdown="event.stopPropagation();"><video id="feedVideoElement" src="${escapeHtml(item.videoUrl)}" autoplay muted loop playsinline preload="metadata" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();" onpointerdown="event.stopPropagation();"></video></div>`
        : `<div class="feedTextFill">${escapeHtml(item.caption || 'Tekstpost')}</div>`;

      const scopeLabel = state.feedMode === "creator"
        ? `maker-modus · ${escapeHtml(owner.displayName || 'maker')}`
        : state.homeEntryPostId && state.currentFeedIndex === 0
        ? `jouw start · eerst eigen content`
        : `feed · ${state.currentFeedIndex + 1}/${items.length}`;

      $("feedScreen").innerHTML = `
        <div class="feedScreen">
          <div class="feedCanvas">
            <article class="feedSlide" onclick="handlePostTap('${owner.id || ''}')">
              ${mediaHtml}
              <div class="feedShade"></div>
              <div class="feedOverlay">
                <div class="feedOverlayRow" style="justify-content:center;">
                  <div class="feedInfo">
                    <h2 class="feedTitle">${escapeHtml(owner.displayName || 'Maker')}</h2>
                    <div class="feedSubtitle">${escapeHtml(owner.handle || '')} · ${escapeHtml(scopeLabel)}</div>
                  </div>
                </div>

                <button class="arrowBtn feedSideArrow leftSide" onclick="event.stopPropagation(); handleFeedLeftArrow();">←</button>
                <button class="arrowBtn feedSideArrow rightSide" onclick="event.stopPropagation(); openCurrentCreatorHomepage();">→</button>
                <button class="feedBackUpBtn" onclick="jumpFeedUpOne(event)">↑</button>

                <div class="feedBottom">
                  <div class="feedContentMeta">
                    <div class="feedStats">
                      <span class="feedModeBadge">${escapeHtml(getKindLabel(item.feedKind || 'normal'))}</span>
                      <span class="feedModeBadge">♥ ${Number(item.likes || 0)}</span>
                      <span class="feedModeBadge">${escapeHtml(timeAgo(item.createdAt))}</span>
                    </div>
                    <div class="feedCaption">${escapeHtml(item.caption || '')}</div>
                    ${Array.isArray(item.hashtags) && item.hashtags.length ? `<div class="feedStats">${item.hashtags.map((tag) => `<span class="feedModeBadge">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
                  </div>

                  <div class="bottomActionRow">
                    <div class="buttonGroup">
                      <button class="pill likeBtn" onclick="event.stopPropagation(); likePost(${Number(item.id)})">Like</button>
                      <button class="pill likeBtn" onclick="event.stopPropagation(); dislikePost(${Number(item.id)})">Verberg</button>
                      ${owner.id === state.activeUserId ? `<button class="pill likeBtn" onclick="event.stopPropagation(); deletePost(${Number(item.id)})">Verwijder</button>` : ``}
                      ${item.postType === "video" && item.videoUrl ? `
                        <div class="feedVideoControlsInline" onclick="event.stopPropagation();" ontouchstart="event.stopPropagation();" onpointerdown="event.stopPropagation();">
                          <button id="feedVideoPlayBtn" class="feedVideoInlineBtn" onclick="toggleFeedVideoPlay(event)">▶</button>
                          <button id="feedVideoMuteBtn" class="feedVideoInlineBtn ghost" onclick="toggleFeedVideoMute(event)">🔇</button>
                        </div>
                      ` : ``}
                    </div>
                    <div class="feedLoopHint" onclick="event.stopPropagation();">
                      Loopende feed · swipe ↑↓
                    </div>
                  </div>

                  <div class="feedTapHint" onclick="event.stopPropagation(); handlePostTap('${owner.id || ''}')">
                    3x tik op content = alleen content van deze maker. Nog eens 3x = terug naar de gewone feed, precies waar je was.
                  </div>
                </div>
              </div>
            </article>
          </div>
        </div>
      `;
    }

    function openCreatorContentFeed(userId) {
      if (!userId) return;
      state.feedMode = "creator";
      state.makerModeUserId = userId;
      state.makerModeReturnPostId = getCurrentFeedItem()?.id || null;
      state.currentFeedScopeUserId = "";
      state.currentFeedIndex = 0;
      setActiveScreen("feed");
      renderFeedScreen();
    }

    async function refreshAll(options = {}) {
      const keepScreen = options.keepScreen || state.activeScreen;
      await loadUsers();
      await loadFeed();
      await loadOwnFrontpage();
      await loadFriendsData();
      if (state.viewedCreatorUserId) {
        await loadCreatorFrontpage(state.viewedCreatorUserId);
      }

      if (keepScreen === "feed") {
        setActiveScreen("feed");
        renderFeedScreen();
      } else if (keepScreen === "creator" && state.viewedCreatorUserId) {
        setActiveScreen("creator");
        renderCreatorScreen();
      } else {
        setActiveScreen("home");
        renderHomeScreen();
      }
    }

    function bindGlobalKeys() {
      window.addEventListener("keydown", (event) => {
        if (state.activeScreen !== "feed") return;
        if (event.key === "ArrowDown") moveFeed(1);
        if (event.key === "ArrowUp") moveFeed(-1);
      });
    }

    async function startApp() {
      try {
        if (!state.activeUserId) {
          window.location.href = "index.html";
          return;
        }
        await refreshAll({ keepScreen: "home" });
        bindGlobalKeys();
        bindFeedGestures();
      } catch (error) {
        console.error(error);
        alert(error.message || "Kon de mobiele app niet laden.");
      }
    }

    startApp();
  </script>
</body>
</html>
