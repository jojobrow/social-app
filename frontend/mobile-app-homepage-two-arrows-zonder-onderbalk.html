<!-- Vervang je huidige frontend/mobile-app-homepage-two-arrows-zonder-onderbalk.html volledig door deze versie. -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mobile Social Frontpage Prototype</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #e6d8cb;
      --card: rgba(255, 248, 242, 0.94);
      --card-strong: rgba(255, 248, 242, 0.98);
      --line: rgba(110, 82, 62, 0.30);
      --line-soft: rgba(110, 82, 62, 0.20);
      --text: #251810;
      --muted: #5e4739;
      --shadow: 0 18px 38px rgba(76, 54, 40, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --safe-top: max(14px, env(safe-area-inset-top));
      --safe-bottom: max(18px, env(safe-area-inset-bottom));
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #f5ede7 0%, #ecdfd4 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    body { overflow: hidden; }
    button, input, textarea, select { font: inherit; }
    button { border: none; cursor: pointer; transition: transform 0.16s ease, opacity 0.16s ease; }
    button:active { transform: scale(0.98); }
    .hidden { display: none !important; }
    .app { position: relative; height: 100vh; overflow: hidden; }
    .screen { position: absolute; inset: 0; opacity: 0; pointer-events: none; transform: translateY(12px); transition: opacity 0.22s ease, transform 0.22s ease; }
    .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .screenScroll { position: relative; height: 100%; overflow-y: auto; padding: calc(var(--safe-top) + 2px) 14px calc(24px + var(--safe-bottom)); }
    .topbar { position: sticky; top: 0; z-index: 12; display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; padding: 10px 0 8px; backdrop-filter: blur(8px); }
    .topbarTitle { min-width: 0; }
    .eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 800; color: rgba(101, 75, 58, 0.72); margin-bottom: 3px; }
    .title { font-size: 13px; font-weight: 800; letter-spacing: -0.03em; }
    .topbarActions, .composerActions, .commentComposerActions, .overlayActionRow, .overlayBadgeRow { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .iconBtn, .btnPrimary, .btnSoft, .chipBtn, .overlayPill {
      border-radius: 999px; padding: 10px 14px; font-size: 13px; font-weight: 700; line-height: 1; border: 1px solid transparent;
    }
    .iconBtn, .btnSoft, .chipBtn { background: rgba(255,255,255,0.72); color: #5f493c; border-color: rgba(190,162,138,0.18); }
    .btnPrimary { background: linear-gradient(135deg, #fffdfb, #edd9ca); color: #4b372a; border: 1px solid rgba(168,135,112,0.30); }
    .heroShell, .composer, .commentComposer, .glassCard, .compactActionCard, .compactMenuBtn, .compactRecentBtn {
      border-radius: 22px; border: 1px solid var(--line-soft); background: var(--card); box-shadow: var(--shadow);
    }
    .heroShell { position: relative; overflow: hidden; min-height: 250px; background: linear-gradient(135deg, rgba(248,236,227,0.96), rgba(241,226,215,0.94)); }
    .heroContent { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 280px; padding: 11px; }
    .profileLine, .heroTop { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .profileLine { flex: 1 1 auto; min-width: 0; align-items: center; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; color: #5e493c; flex-shrink: 0; }
    .avatar.small { width: 30px; height: 30px; font-size: 11px; }
    .name { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; }
    .handle, .small, .muted, .postMeta, .hashtags, .commentHint { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .bio, .infoText, .reactionText, .overlayCaption { white-space: pre-wrap; font-size: 12px; line-height: 1.55; color: #4f392d; }
    .likeStack { text-align: right; min-width: 58px; display: grid; gap: 5px; justify-items: end; }
    .likeCount { font-size: 14px; font-weight: 800; }
    .metaStack { margin-top: 6px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 5px; text-align: center; width: min(210px, 58vw); }
    .metaMini { padding: 6px 6px; border-radius: 10px; background: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.28); }
    .metaMiniValue { font-size: 12px; font-weight: 800; line-height: 1; }
    .metaMiniLabel { margin-top: 2px; font-size: 9px; opacity: 0.86; text-transform: lowercase; }
    .glassCard { padding: 12px; }
    .heroComposerCenter { display: flex; align-items: center; justify-content: center; min-height: 0; flex: 1 1 auto; }
    .centerComposeBtn { border: 0; border-radius: 999px; padding: 12px 18px; font: inherit; font-weight: 800; font-size: 11px; background: rgba(255, 248, 240, 0.92); color: #5f4b3d; box-shadow: 0 8px 20px rgba(0,0,0,0.10); }
    .section { margin-top: 10px; }
    .compactActionGrid, .compactMenuGrid, .compactRecentGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; }
    .compactActionCard, .compactMenuBtn, .compactRecentBtn { text-align: left; padding: 10px; background: rgba(255,255,255,0.68); }
    .compactActionValue { font-size: 11px; font-weight: 800; color: #5a4538; line-height: 1.1; }
    .compactActionLabel, .compactActionHint, .compactMenuBtn span { font-size: 10px; color: var(--muted); line-height: 1.3; }
    .compactMenuBtn strong { font-size: 11px; color: #4d382c; line-height: 1.2; }
    .compactRecentBtn .infoText { font-size: 11px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .compactRecentBtn .chipLabel { font-size: 9px; margin-bottom: 3px; color: rgba(101,75,58,0.72); font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; }
    .commentComposer { display: grid; gap: 7px; padding: 10px; }
    .commentComposer textarea, .composer textarea, .composer input[type="text"], .composer select {
      display: block; width: 100%; box-sizing: border-box; border-radius: 16px; border: 1px solid rgba(128, 98, 78, 0.28); background: rgba(255, 251, 247, 0.96); color: var(--text); padding: 16px 18px; font: inherit; box-shadow: 0 8px 18px rgba(101, 72, 54, 0.06); outline: none;
    }
    .commentComposer textarea { min-height: 88px; resize: vertical; }
    .composer { padding: 12px; display: grid; gap: 10px; margin-top: 10px; }
    .sectionHeader { display: flex; align-items: center; justify-content: space-between; gap: 7px; margin-bottom: 4px; }
    .sectionTitle { font-size: 13px; font-weight: 800; }
    .fileInput {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .textarea, .field, .select {
      position: static;
      width: 100%;
      height: auto;
      opacity: 1;
      pointer-events: auto;
    }
    .filePickerBtn {
      width: 100%; border-radius: 16px; border: 1px solid rgba(170,142,120,0.18); background: rgba(255,250,245,0.98); color: #2f2119; padding: 14px 16px; text-align: left; font-weight: 700; box-shadow: 0 10px 24px rgba(101, 72, 54, 0.08);
    }
    .filePickerBtn span { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-top: 4px; }
    .composer textarea::placeholder, .composer input[type="text"]::placeholder, .commentComposer textarea::placeholder { color: #785f51; }
    #feedScreen .screenScroll { padding: 0; overflow: hidden; }
    .feedTopbarOverlay { position: absolute; top: calc(var(--safe-top) + 6px); left: 16px; right: 16px; z-index: 14; display: flex; align-items: center; justify-content: space-between; gap: 10px; pointer-events: none; }
    .feedTopbarOverlay > * { pointer-events: auto; }
    .feedHomeArrow, .feedCreatorArrow {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 15; width: 42px; height: 42px; border: 1px solid rgba(255,255,255,0.18); border-radius: 999px; background: rgba(78, 58, 45, 0.30); color: #fffaf6; backdrop-filter: blur(14px); box-shadow: 0 14px 28px rgba(50, 34, 24, 0.14); display: grid; place-items: center; font-size: 20px; cursor: pointer;
    }
    .feedHomeArrow { left: 14px; }
    .feedCreatorArrow { right: 14px; }
    .feedViewportMobile { position: relative; height: 100%; overflow: hidden; padding-bottom: var(--safe-bottom); }
    #feedContent { height: 100%; }
    .mobilePostStage { position: relative; height: 100%; overflow: hidden; background: linear-gradient(180deg, rgba(255,250,245,0.30), rgba(244,235,227,0.24)); }
    .mobilePostStage .postMedia { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; overflow: hidden; background: rgba(233, 222, 213, 0.92); }
    .mobilePostStage .postMedia img, .mobilePostStage .postMedia video { width: 100%; height: 100%; min-width: 100%; min-height: 100%; object-fit: cover; object-position: center; }
    .postTextFill { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 28px; text-align: center; font-size: 24px; font-weight: 800; line-height: 1.35; color: #5b4639; background: linear-gradient(135deg, rgba(244,230,220,0.95), rgba(250,241,236,0.90)); }
    .mobilePostOverlayTop, .mobilePostOverlayBottom { position: absolute; left: 14px; right: 14px; z-index: 2; }
    .mobilePostOverlayTop { top: calc(var(--safe-top) + 56px); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .mobilePostOverlayBottom { bottom: calc(16px + var(--safe-bottom)); display: grid; gap: 10px; }
    .overlayGlass, .overlayPill { border: 1px solid rgba(255,255,255,0.18); background: rgba(78, 58, 45, 0.30); color: #fffaf6; backdrop-filter: blur(16px); box-shadow: 0 18px 42px rgba(50, 34, 24, 0.16); }
    .overlayGlass { border-radius: 22px; padding: 12px; }
    .overlayOwnerCard { display: flex; align-items: center; gap: 10px; min-width: 0; max-width: 78%; }
    .overlayOwnerMeta { min-width: 0; }
    .overlayOwnerName { font-size: 15px; font-weight: 800; color: #fffaf6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .overlayOwnerHandle, .overlayCaption, .overlayLikes, .feedGhostHint { color: rgba(255, 247, 241, 0.88); }
    .overlayOwnerHandle, .overlayLikes, .feedGhostHint { font-size: 12px; }
    .feedGhostHint { position: absolute; left: 16px; right: 16px; bottom: calc(84px + var(--safe-bottom)); z-index: 2; text-align: center; pointer-events: none; }
    @media (min-width: 760px) {
      .app { width: 430px; max-width: 100%; margin: 0 auto; border-left: 1px solid rgba(170,142,120,0.10); border-right: 1px solid rgba(170,142,120,0.10); box-shadow: 0 0 0 1px rgba(255,255,255,0.2); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen active frontpageScreen" id="homeScreen">
      <div class="screenScroll">
        <div class="topbar">
          <div class="topbarTitle">
            <div class="eyebrow">Mobile frontpage</div>
            <div class="title" id="homeScreenTitle">Jouw voorpagina</div>
          </div>
          <div class="topbarActions">
            <button class="iconBtn" onclick="openFeed()">Feed</button>
            <button class="iconBtn" onclick="refreshAll()">Vernieuw</button>
          </div>
        </div>
        <div id="homeContent"></div>
      </div>
    </div>

    <div class="screen" id="feedScreen">
      <div class="screenScroll">
        <div class="feedViewportMobile" id="feedViewportMobile">
          <div class="feedTopbarOverlay">
            <div class="overlayPill">Contentstroom</div>
            <button class="overlayPill" onclick="openOwnHome()">Eigen home</button>
          </div>
          <div id="feedContent"></div>
        </div>
      </div>
    </div>

    <div class="screen frontpageScreen" id="creatorScreen">
      <div class="screenScroll">
        <div class="topbar">
          <div class="topbarTitle">
            <div class="eyebrow">Voorpagina</div>
            <div class="title" id="creatorScreenTitle">Maker</div>
          </div>
          <div class="topbarActions">
            <button class="iconBtn" onclick="openFeed()">Feed</button>
            <button class="iconBtn" onclick="openOwnHome()">Eigen home</button>
          </div>
        </div>
        <div id="creatorContent"></div>
      </div>
    </div>

    <div class="screen" id="contentScreen">
      <div class="screenScroll">
        <div class="topbar">
          <div class="topbarTitle">
            <div class="eyebrow">Eigen content</div>
            <div class="title" id="contentScreenTitle">Raster</div>
          </div>
          <div class="topbarActions">
            <button class="iconBtn" onclick="openOwnHome()">Terug</button>
          </div>
        </div>
        <div id="contentGrid"></div>
      </div>
    </div>

    <div class="drawerBackdrop hidden" id="drawerBackdrop" onclick="closeDrawer()"></div>
    <div class="hidden" id="drawer"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let users = [];
    let feedItems = [];
    let activeUserId = localStorage.getItem("socialPrototypeActiveUserId") || "";
    let activeScreen = "home";
    let composeOpen = false;
    let currentFeedIndex = 0;
    let currentFeedScopeUserId = "";
    let currentFeedOwnerId = "";
    let currentViewedFrontpageUserId = "";
    let currentContentOwnerId = "";
    let lastFeedGestureAt = 0;
    let homepageReturnScopeUserId = "";
    let homepageReturnFeedIndex = 0;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || "Request mislukt.");
      return data;
    }

    function getInitials(name = "?") {
      return String(name).split(" ").map(part => part[0]).join("").slice(0, 2).toUpperCase();
    }

    function getKindLabel(kind) {
      if (kind === "promoted") return "Promoted";
      if (kind === "recommended") return "Recommended";
      return "Normal";
    }

    function getUserBackground(user) {
      if (user?.backgroundUrl) return `url('${encodeURI(user.backgroundUrl)}')`;
      return "linear-gradient(135deg, rgba(248,236,227,0.86), rgba(255,245,238,0.78))";
    }

    function setActiveScreen(screenId) {
      activeScreen = screenId;
      const map = { home: "homeScreen", feed: "feedScreen", creator: "creatorScreen", content: "contentScreen" };
      document.querySelectorAll(".screen").forEach(el => el.classList.toggle("active", el.id === map[screenId]));
      pauseAllVideos();
    }

    function pauseAllVideos() {
      document.querySelectorAll("video").forEach(video => { try { video.pause(); } catch (_e) {} });
    }

    async function loadUsers() {
      users = await fetchJson(`${API_BASE}/users`);
    }

    function shuffleArray(items = []) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    async function loadFeed() {
      const data = await fetchJson(`${API_BASE}/feed?userId=${encodeURIComponent(activeUserId)}`);
      feedItems = shuffleArray(data.items || []);
      if (currentFeedIndex >= feedItems.length) currentFeedIndex = 0;
    }

    async function refreshAll() {
      await loadUsers();
      await loadFeed();
      await renderHomeScreen();
      if (activeScreen === "feed") await renderFeedScreen();
      if (activeScreen === "creator" && currentViewedFrontpageUserId) await renderCreatorScreen(currentViewedFrontpageUserId);
      if (activeScreen === "content" && currentContentOwnerId) await renderContentGrid(currentContentOwnerId);
    }

    function renderHashtags(hashtags = []) {
      if (!hashtags.length) return "";
      return `<div class="hashtags">${hashtags.map(tag => `#${escapeHtml(String(tag).replace(/^#/, ""))}`).join(" ")}</div>`;
    }

    function renderPostMedia(item) {
      if (item.postType === "video" && item.videoUrl) return `<div class="postMedia"><video src="${escapeHtml(item.videoUrl)}" controls preload="metadata" playsinline></video></div>`;
      if (item.postType === "image" && item.imageUrl) return `<div class="postMedia"><img src="${escapeHtml(item.imageUrl)}" alt="Post media" /></div>`;
      return `<div class="postMedia"><div class="postTextFill">${escapeHtml(item.caption || "Tekstpost")}</div></div>`;
    }

    function getCompactFrontpageButtons(front, isOwner) {
      const user = front.user;
      const buttons = [];
      if (isOwner) {
        buttons.push(`<button class="compactMenuBtn" onclick="openOwnContent()"><strong>Eigen content</strong><span>Open je raster.</span></button>`);
        buttons.push(`<button class="compactMenuBtn" onclick="triggerBackgroundUpload()"><strong>Achtergrond</strong><span>Upload nieuwe sfeerlaag.</span></button>`);
        buttons.push(`<button class="compactMenuBtn" onclick="openPendingPlaceholder()"><strong>Moderatie</strong><span>Pending reacties.</span></button>`);
        buttons.push(`<button class="compactMenuBtn" onclick="openFriendsPlaceholder()"><strong>Vrienden</strong><span>Bekijk je netwerk.</span></button>`);
      } else {
        buttons.push(`<button class="compactMenuBtn" onclick="sendFriendRequest('${user.id}')"><strong>Vriendschap</strong><span>Vraag verbinding aan.</span></button>`);
        buttons.push(`<button class="compactMenuBtn" onclick="openContentGridForUser('${user.id}')"><strong>Eigen content</strong><span>Open de makerstroom.</span></button>`);
        buttons.push(`<button class="compactMenuBtn" onclick="openFriendsPlaceholder()"><strong>Vrienden</strong><span>Bekijk netwerk.</span></button>`);
        buttons.push(`<button class="compactMenuBtn" onclick="openInfoPlaceholder()"><strong>Info</strong><span>Bio en hashtags.</span></button>`);
      }
      return buttons.slice(0, 4).join("");
    }

    function renderComposeBlock() {
      return `
        <div class="composer ${composeOpen ? '' : 'hidden'}" id="composeBlock">
          <div class="sectionHeader">
            <div class="sectionTitle">Nieuw bericht</div>
            <button class="chipBtn" onclick="toggleCompose()">Sluiten</button>
          </div>
          <button type="button" class="filePickerBtn" onclick="triggerMediaPicker()">Upload foto of video<span>Tik hier om een foto of video van je telefoon te kiezen</span></button>
          <input id="mediaFileInput" type="file" class="fileInput" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm" />
          <div class="small" id="uploadStatus">Nog geen bestand gekozen. Tik op “Upload foto of video”.</div>
          <textarea id="captionInput" class="textarea" placeholder="Schrijf hier je tekst of caption bij je bericht"></textarea>
          <input id="hashtagsInput" class="field" type="text" placeholder="#homepage, #creator, #concept" />
          <select id="feedKindSelect" class="select">
            <option value="normal">Normal</option>
            <option value="recommended">Recommended</option>
            <option value="promoted">Promoted</option>
          </select>
          <div class="composerActions">
            <button class="btnPrimary" onclick="publishPost()">Plaatsen</button>
            <button class="btnSoft" onclick="toggleCompose()">Annuleren</button>
          </div>
        </div>
      `;
    }

    function buildFrontpageMarkup(front, { isOwner = false, titleText = "Voorpagina" } = {}) {
      const user = front.user;
      const recentPosts = (front.recentPosts || []).slice(0, 2);
      return `
        <div class="heroShell" style="--hero-bg:${getUserBackground(user)};">
          <div class="heroContent">
            <div class="heroTop">
              <div class="profileLine">
                <div class="avatar" style="background:${escapeHtml(user.avatarColor || '#dcc2ad')};">${getInitials(user.displayName)}</div>
                <div>
                  <div class="name">${escapeHtml(user.displayName)}</div>
                  <div class="handle">${escapeHtml(user.handle || "")}</div>
                </div>
              </div>
              <div class="likeStack">
                <button class="btnSoft" onclick="likeHomepage('${user.id}')">Like</button>
                <div class="likeCount">${front.stats?.homepageLikes ?? user.homepageLikes ?? 0}</div>
                <div class="small">homepage likes</div>
                <div class="metaStack">
                  <div class="metaMini"><div class="metaMiniValue">${front.stats?.posts ?? 0}</div><div class="metaMiniLabel">posts</div></div>
                  <div class="metaMini"><div class="metaMiniValue">${front.stats?.reactions ?? 0}</div><div class="metaMiniLabel">reacties</div></div>
                  <div class="metaMini"><div class="metaMiniValue">${front.stats?.friends ?? 0}</div><div class="metaMiniLabel">vrienden</div></div>
                </div>
              </div>
            </div>
            <div class="glassCard">
              <div class="eyebrow">${escapeHtml(titleText)}</div>
              <div class="bio">${escapeHtml(user.bio || "Nog geen bio toegevoegd.")}</div>
            </div>
            ${isOwner ? `<div class="heroComposerCenter"><button class="centerComposeBtn" onclick="toggleCompose()">Nieuw bericht</button></div>` : ``}
          </div>
        </div>

        ${isOwner ? `
          <div class="section"><div class="compactActionGrid">
            <button class="compactActionCard" onclick="openOwnContent()"><div class="compactActionValue">${front.stats?.posts ?? 0}</div><div class="compactActionLabel">Eigen content</div><div class="compactActionHint">Open je raster.</div></button>
            <button class="compactActionCard" onclick="openPendingPlaceholder()"><div class="compactActionValue">${front.pendingReactions?.length || 0}</div><div class="compactActionLabel">Moderatie</div><div class="compactActionHint">Pending reacties.</div></button>
          </div></div>
        ` : `
          <div class="section">
            <div class="commentComposer">
              <div class="sectionHeader"><div class="sectionTitle">Plaats reactie</div></div>
              <textarea id="homepageCommentInput" placeholder="Plaats direct een reactie op de voorpagina van ${escapeHtml(user.displayName || 'deze maker')}..."></textarea>
              <div class="commentComposerActions">
                <div class="commentHint">Reacties komen eerst binnen ter beoordeling door de eigenaar.</div>
                <button class="chipBtn" onclick="submitHomepageComment('${user.id}')">Plaats reactie</button>
              </div>
            </div>
          </div>
        `}

        <div class="section"><div class="compactMenuGrid">${getCompactFrontpageButtons(front, isOwner)}</div></div>

        <div class="section">
          ${recentPosts.length ? `<div class="compactRecentGrid">${recentPosts.map(post => `
            <button class="compactRecentBtn" onclick="openFeedAtPost(${post.id}, '${user.id}')">
              <div class="chipLabel">${escapeHtml(getKindLabel(post.feedKind))} · ${escapeHtml(post.postType)}</div>
              <div class="infoText">${escapeHtml(post.caption || "Zonder caption")}</div>
            </button>`).join("")}</div>` : `<div class="compactRecentBtn"><div class="infoText">Nog geen content beschikbaar.</div></div>`}
        </div>

        ${isOwner ? renderComposeBlock() : ""}
        <input id="backgroundUploadInput" class="fileInput" type="file" accept="image/jpeg,image/png,image/webp" />
      `;
    }

    async function renderHomeScreen() {
      const front = await fetchJson(`${API_BASE}/frontpage/${encodeURIComponent(activeUserId)}?viewerUserId=${encodeURIComponent(activeUserId)}`);
      currentViewedFrontpageUserId = activeUserId;
      document.getElementById("homeScreenTitle").textContent = "Jouw voorpagina";
      document.getElementById("homeContent").innerHTML = buildFrontpageMarkup(front, { isOwner: true, titleText: "Startpunt · resetpunt · terugkeerpunt" });
      bindComposeInputListeners();
      bindBackgroundUpload();
    }

    async function renderCreatorScreen(userId) {
      const front = await fetchJson(`${API_BASE}/frontpage/${encodeURIComponent(userId)}?viewerUserId=${encodeURIComponent(activeUserId)}`);
      currentViewedFrontpageUserId = userId;
      const isOwner = userId === activeUserId;
      document.getElementById("creatorScreenTitle").textContent = isOwner ? "Jouw voorpagina" : (front.user.displayName || "Maker");
      document.getElementById("creatorContent").innerHTML = buildFrontpageMarkup(front, { isOwner, titleText: isOwner ? "Jouw voorpagina" : "Voorpagina van de maker" });
      if (isOwner) { bindComposeInputListeners(); bindBackgroundUpload(); }
      setActiveScreen(isOwner ? "home" : "creator");
    }

    function bindBackgroundUpload() {
      const bgInput = document.getElementById("backgroundUploadInput");
      if (!bgInput || bgInput.dataset.bound === "true") return;
      bgInput.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        await uploadHomepageBackground(file);
        event.target.value = "";
      });
      bgInput.dataset.bound = "true";
    }

    async function renderFeedScreen() {
      const container = document.getElementById("feedContent");
      if (!feedItems.length) {
        container.innerHTML = `<div class="infoText" style="margin:24px;">Geen feed-items beschikbaar.</div>`;
        return;
      }
      let visibleItems = feedItems;
      if (currentFeedScopeUserId) visibleItems = feedItems.filter(item => item.owner?.id === currentFeedScopeUserId);
      if (!visibleItems.length) visibleItems = feedItems;
      if (currentFeedIndex >= visibleItems.length) currentFeedIndex = 0;
      const item = visibleItems[currentFeedIndex];
      currentFeedOwnerId = item.owner?.id || "";
      const owner = item.owner || {};
      container.innerHTML = `
        <div class="mobilePostStage" id="mobilePostStage" style="height:100%;">
          ${renderPostMedia(item)}
          <button class="feedHomeArrow" onclick="goHomeFromFeedButton()" aria-label="Terug naar je homepage">↖</button>
          <button class="feedCreatorArrow" onclick="openCurrentCreatorHomepage()" aria-label="Open homepage van maker">↗</button>
          <div class="mobilePostOverlayTop">
            <div class="overlayGlass overlayOwnerCard">
              <div class="avatar small" style="background:${escapeHtml(owner.avatarColor || '#dcc2ad')};">${getInitials(owner.displayName || '?')}</div>
              <div class="overlayOwnerMeta">
                <div class="overlayOwnerName">${escapeHtml(owner.displayName || 'Onbekend')}</div>
                <div class="overlayOwnerHandle">${escapeHtml(owner.handle || '')}</div>
              </div>
            </div>
            <div class="overlayBadgeRow">
              <div class="overlayPill">${escapeHtml(getKindLabel(item.feedKind))}</div>
              <div class="overlayPill">${escapeHtml(item.postType)}</div>
            </div>
          </div>
          <div class="feedGhostHint">Swipe omhoog of omlaag voor de volgende post.</div>
          <div class="mobilePostOverlayBottom">
            <div class="overlayGlass">
              ${item.caption ? `<div class="overlayCaption">${escapeHtml(item.caption)}</div>` : ""}
              ${renderHashtags(item.hashtags || [])}
              <div class="overlayLikes" style="margin-top:8px;">${item.likes || 0} postlikes</div>
            </div>
            <div class="overlayActionRow">
              <button class="overlayPill" onclick="likePost(${item.id})">Like post</button>
              <button class="overlayPill" onclick="dislikePost(${item.id})">Dislike privé</button>
              <button class="overlayPill" onclick="openCreatorFromFeed()">Homepage maker</button>
            </div>
          </div>
        </div>
      `;
      bindFeedGestures();
    }

    function openOwnHome() {
      currentViewedFrontpageUserId = activeUserId;
      homepageReturnScopeUserId = "";
      homepageReturnFeedIndex = currentFeedIndex;
      setActiveScreen("home");
    }

    function goHomeFromFeedButton() {
      currentViewedFrontpageUserId = activeUserId;
      homepageReturnScopeUserId = "";
      homepageReturnFeedIndex = currentFeedIndex;
      setActiveScreen("home");
    }

    async function openFeed() {
      currentFeedScopeUserId = "";
      await renderFeedScreen();
      setActiveScreen("feed");
    }

    async function openFeedAtPost(postId, scopeUserId = "") {
      currentFeedScopeUserId = scopeUserId || "";
      const visibleItems = currentFeedScopeUserId ? feedItems.filter(item => item.owner?.id === currentFeedScopeUserId) : feedItems;
      const index = visibleItems.findIndex(item => item.id === postId);
      currentFeedIndex = index >= 0 ? index : 0;
      await renderFeedScreen();
      setActiveScreen("feed");
    }

    async function scrollFeed(direction) {
      let visibleItems = currentFeedScopeUserId ? feedItems.filter(item => item.owner?.id === currentFeedScopeUserId) : feedItems;
      if (!visibleItems.length) visibleItems = feedItems;
      if (!visibleItems.length) return;
      currentFeedIndex += direction;
      if (currentFeedIndex < 0) currentFeedIndex = visibleItems.length - 1;
      if (currentFeedIndex > visibleItems.length - 1) currentFeedIndex = 0;
      await renderFeedScreen();
    }

    async function handleFeedDirection(direction) {
      const now = Date.now();
      if (now - lastFeedGestureAt < 260) return;
      lastFeedGestureAt = now;
      await scrollFeed(direction);
    }

    function bindFeedGestures() {
      const viewport = document.getElementById("feedViewportMobile");
      if (!viewport || viewport.dataset.gestureBound === "true") return;
      viewport.addEventListener("wheel", async (event) => {
        if (activeScreen !== "feed") return;
        if (Math.abs(event.deltaY) < 18) return;
        event.preventDefault();
        await handleFeedDirection(event.deltaY > 0 ? 1 : -1);
      }, { passive: false });
      let touchStartY = 0;
      let touchStartX = 0;
      viewport.addEventListener("touchstart", (event) => {
        if (activeScreen !== "feed") return;
        const touch = event.changedTouches[0];
        touchStartY = touch.clientY;
        touchStartX = touch.clientX;
      }, { passive: true });
      viewport.addEventListener("touchend", async (event) => {
        if (activeScreen !== "feed") return;
        const touch = event.changedTouches[0];
        const deltaY = touchStartY - touch.clientY;
        const deltaX = touchStartX - touch.clientX;
        if (Math.abs(deltaY) < 40 || Math.abs(deltaY) < Math.abs(deltaX)) return;
        await handleFeedDirection(deltaY > 0 ? 1 : -1);
      }, { passive: true });
      viewport.dataset.gestureBound = "true";
    }

    async function openCreatorFromFeed() {
      const userId = currentFeedOwnerId || activeUserId;
      currentViewedFrontpageUserId = userId;
      homepageReturnScopeUserId = currentFeedScopeUserId || "";
      homepageReturnFeedIndex = currentFeedIndex;
      await renderCreatorScreen(userId);
    }

    async function openCurrentCreatorHomepage() {
      await openCreatorFromFeed();
    }

    async function openOwnContent() {
      await renderContentGrid(activeUserId);
    }

    async function openContentGridForUser(userId) {
      await renderContentGrid(userId);
    }

    function toggleCompose() {
      composeOpen = !composeOpen;
      if (activeScreen !== "home") openOwnHome();
      renderHomeScreen();
    }

    function triggerBackgroundUpload() {
      const input = document.getElementById("backgroundUploadInput");
      if (input) input.click();
    }

    function triggerMediaPicker() {
      const input = document.getElementById("mediaFileInput");
      if (input) input.click();
    }

    function bindComposeInputListeners() {
      const mediaInput = document.getElementById("mediaFileInput");
      if (!mediaInput || mediaInput.dataset.bound === "true") return;
      mediaInput.addEventListener("change", (event) => {
        const file = event.target.files[0];
        const uploadStatus = document.getElementById("uploadStatus");
        if (!uploadStatus) return;
        if (!file) {
          uploadStatus.textContent = "Nog geen bestand gekozen. Tik op ‘Upload foto of video’.";
          return;
        }
        const isVideo = ["video/mp4", "video/webm"].includes(file.type);
        const isImage = ["image/jpeg", "image/png", "image/webp"].includes(file.type);
        if (isImage) uploadStatus.textContent = `Afbeelding gekozen: ${file.name}`;
        else if (isVideo) uploadStatus.textContent = `Video gekozen: ${file.name}`;
        else uploadStatus.textContent = "Ongeldig bestandstype.";
      });
      mediaInput.dataset.bound = "true";
    }

    async function uploadHomepageBackground(file) {
      const validTypes = ["image/jpeg", "image/png", "image/webp"];
      if (!validTypes.includes(file.type)) return alert("Alleen jpg, jpeg, png en webp zijn toegestaan.");
      if (file.size > 8 * 1024 * 1024) return alert("Afbeelding is te groot. Maximaal 8 MB.");
      const formData = new FormData();
      formData.append("media", file);
      formData.append("kind", "background");
      const response = await fetch(`${API_BASE}/users/${encodeURIComponent(activeUserId)}/profile-media`, { method: "POST", body: formData });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || "Upload mislukt.");
      await refreshAll();
    }

    async function publishPost() {
      const captionInput = document.getElementById("captionInput");
      const hashtagsInput = document.getElementById("hashtagsInput");
      const feedKindSelect = document.getElementById("feedKindSelect");
      const mediaFileInput = document.getElementById("mediaFileInput");
      const uploadStatus = document.getElementById("uploadStatus");
      if (!captionInput || !hashtagsInput || !feedKindSelect || !mediaFileInput || !uploadStatus) return;
      try {
        let imageUrl = "";
        let videoUrl = "";
        const file = mediaFileInput.files[0];
        if (file) {
          uploadStatus.textContent = "Media uploaden...";
          const formData = new FormData();
          formData.append("media", file);
          formData.append("ownerUserId", activeUserId);
          const uploadResult = await fetch(`${API_BASE}/upload-media`, { method: "POST", body: formData });
          const uploadData = await uploadResult.json().catch(() => ({}));
          if (!uploadResult.ok) throw new Error(uploadData.message || "Media upload mislukt.");
          if (uploadData.postType === "image") imageUrl = uploadData.url || "";
          if (uploadData.postType === "video") videoUrl = uploadData.url || "";
        }
        const hashtags = hashtagsInput.value.split(",").map(tag => tag.trim()).filter(Boolean);
        await fetchJson(`${API_BASE}/posts`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ownerUserId: activeUserId,
            caption: captionInput.value.trim(),
            imageUrl,
            videoUrl,
            hashtags,
            feedKind: feedKindSelect.value || "normal"
          })
        });
        composeOpen = false;
        await refreshAll();
      } catch (error) {
        alert(error.message || "Plaatsen mislukt.");
      }
    }

    async function likePost(postId) {
      await fetchJson(`${API_BASE}/posts/${postId}/like`, { method: "POST" });
      await renderFeedScreen();
    }

    async function dislikePost(postId) {
      await fetchJson(`${API_BASE}/posts/${postId}/dislike`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ viewerUserId: activeUserId })
      });
      alert("Post privé gedisliked.");
    }

    async function likeHomepage(userId) {
      await fetchJson(`${API_BASE}/frontpage/${userId}/like`, { method: "POST" });
      if (activeScreen === "creator") await renderCreatorScreen(userId);
      else await renderHomeScreen();
    }

    async function submitHomepageComment(targetUserId) {
      const input = document.getElementById("homepageCommentInput");
      if (!input) return;
      const text = input.value.trim();
      if (!text) return alert("Schrijf eerst een reactie.");
      await fetchJson(`${API_BASE}/frontpage/${targetUserId}/react`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fromUserId: activeUserId, text })
      });
      input.value = "";
      alert("Reactie verstuurd voor moderatie.");
    }

    async function sendFriendRequest(targetUserId) {
      await fetchJson(`${API_BASE}/friends/request`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ requesterUserId: activeUserId, targetUserId })
      });
      alert("Vriendschapsverzoek verstuurd.");
    }

    function openPendingPlaceholder() { alert("Moderatie komt hier."); }
    function openFriendsPlaceholder() { alert("Vriendenoverzicht komt hier."); }
    function openInfoPlaceholder() { alert("Extra info komt hier."); }

    async function renderContentGrid(userId) {
      const front = await fetchJson(`${API_BASE}/frontpage/${encodeURIComponent(userId)}?viewerUserId=${encodeURIComponent(activeUserId)}`);
      currentContentOwnerId = userId;
      document.getElementById("contentScreenTitle").textContent = userId === activeUserId ? "Jouw content" : `Content van ${front.user.displayName}`;
      document.getElementById("contentGrid").innerHTML = `
        <div class="section">
          <div class="compactRecentGrid">
            ${(front.recentPosts || []).length ? front.recentPosts.map(post => `
              <button class="compactRecentBtn" onclick="openFeedAtPost(${post.id}, '${userId}')">
                <div class="chipLabel">${escapeHtml(getKindLabel(post.feedKind))} · ${escapeHtml(post.postType)}</div>
                <div class="infoText">${escapeHtml(post.caption || 'Zonder caption')}</div>
              </button>
            `).join('') : `<div class="compactRecentBtn"><div class="infoText">Nog geen content in dit raster.</div></div>`}
          </div>
        </div>
      `;
      setActiveScreen("content");
    }

    async function ensureActiveUser() {
      if (activeUserId) return;
      const storedName = localStorage.getItem("socialPrototypeName") || "Johannes";
      const auth = await fetchJson(`${API_BASE}/auth/name-login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ displayName: storedName })
      });
      activeUserId = auth.user.id;
      localStorage.setItem("socialPrototypeActiveUserId", activeUserId);
    }

    async function init() {
      await ensureActiveUser();
      await refreshAll();
      openOwnHome();
    }

    init().catch(error => {
      console.error(error);
      alert(error.message || "Initialiseren mislukt.");
    });
  </script>
</body>
</html>
