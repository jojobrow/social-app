<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Social Prototype Mobile - Homepage</title>
  <style>

    :root {
      --bg: #0f0a19;
      --bg-2: #1a1230;
      --bg-3: #24183f;
      --panel: rgba(28, 20, 48, 0.88);
      --panel-2: rgba(39, 28, 65, 0.96);
      --panel-3: rgba(54, 39, 87, 0.98);
      --glass: rgba(255,255,255,0.07);
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.16);
      --text: #f7f3ff;
      --text-soft: #cdc3e6;
      --text-dim: #9b91b8;
      --accent: #9b5cff;
      --accent-2: #c9a5ff;
      --accent-3: #6d35d8;
      --accent-deep: #5126a6;
      --ok: #8ff0bc;
      --danger: #ffb6c1;
      --shadow: 0 24px 60px rgba(0,0,0,0.36);
      --shadow-soft: 0 16px 36px rgba(0,0,0,0.22);
      --radius: 26px;
      --radius-sm: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(155,92,255,0.18), transparent 28%),
        radial-gradient(circle at top left, rgba(201,165,255,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .appShell {
      min-height: 100dvh;
      max-width: 460px;
      margin: 0 auto;
      position: relative;
      background:
        linear-gradient(180deg, rgba(8,7,11,0.58), rgba(18,15,25,0.58)),
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 34%);
      backdrop-filter: blur(20px);
    }

    .screen {
      display: none;
      min-height: 100dvh;
    }

    .screen.active {
      display: block;
    }

    .page {
      padding: calc(var(--safe-top) + 18px) 16px calc(var(--safe-bottom) + 28px);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)),
        linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0)),
        radial-gradient(circle at top right, rgba(201,165,255,0.12), transparent 28%);
      pointer-events: none;
    }

    .cardBody {
      position: relative;
      z-index: 1;
      padding: 16px;
    }

    .topRow,
    .sectionHeader,
    .feedOverlayRow,
    .statRow,
    .actionRow,
    .composerActions,
    .miniRow,
    .bottomActionRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .topRow,
    .sectionHeader {
      align-items: flex-start;
    }

    .pageTitle {
      margin: 0;
      font-size: 30px;
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .pageIntro {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
      max-width: 34ch;
    }

    .buttonGroup {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .navBtnWrap {
      position: relative;
      display: inline-flex;
    }

    .tinyLamp {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ffcf5a;
      box-shadow: 0 0 0 2px rgba(9,7,15,0.92), 0 0 14px rgba(255,207,90,0.55);
      pointer-events: none;
    }

    .uploadLabelWrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 999px;
      overflow: hidden;
    }

    .uploadLabelInput {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
    }

    .uploadLabelBtn {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }


    .pill,
    .ghostBtn,
    .solidBtn,
    .dangerBtn {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: transform .15s ease, opacity .15s ease, background .2s ease, border-color .2s ease;
    }

    .pill:active,
    .ghostBtn:active,
    .solidBtn:active,
    .dangerBtn:active,
    .arrowBtn:active,
    .feedTapHint:active {
      transform: scale(0.985);
    }

    .pill,
    .ghostBtn {
      color: var(--text);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .solidBtn {
      color: #18130f;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 14px 32px rgba(200,169,126,0.22);
    }

    .dangerBtn {
      color: #ffe4e4;
      background: rgba(240,169,169,0.10);
      border: 1px solid rgba(240,169,169,0.18);
    }

    .hero {
      position: relative;
      padding: 18px;
      min-height: 228px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background:
        radial-gradient(circle at top right, rgba(201,165,255,0.18), transparent 30%),
        linear-gradient(135deg, rgba(96,43,194,0.92), rgba(20,15,31,0.96));
    }

    .heroMedia {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      z-index: 0;
      pointer-events: none;
    }

    .heroMedia img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 18px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(8,7,11,0.64)),
        radial-gradient(circle at top right, rgba(201,165,255,0.14), transparent 30%),
        radial-gradient(circle at top left, rgba(155,92,255,0.10), transparent 28%);
    }

    .hero > * { position: relative; z-index: 1; }

    .heroLikeWrap {
      position: absolute !important;
      top: 16px;
      right: 16px;
      z-index: 2 !important;
    }

    .likeQuotaStack {
      position: absolute;
      top: calc(var(--safe-top) + 14px);
      right: 16px;
      z-index: 7;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .likeIconBtn {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(8,7,11,0.34);
      color: rgba(255,255,255,0.98);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 22px rgba(0,0,0,0.14);
      backdrop-filter: blur(10px);
      font-size: 18px;
      font-weight: 900;
      position: relative;
    }

    .likeIconCount {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,248,242,0.96);
      color: #4f3525;
      border: 1px solid rgba(124,88,58,0.18);
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .likeCountStack {
      position: absolute;
      top: -18px;
      right: -8px;
      display: grid;
      gap: 8px;
      justify-items: end;
      pointer-events: none;
    }

    .likeCountStack .likeIconCount {
      position: relative;
      top: auto;
      right: auto;
      min-width: 22px;
      height: 22px;
      font-size: 10px;
    }

    .heroLikeWrap .likeQuotaStack {
      position: relative;
      top: auto;
      right: auto;
      z-index: auto;
      display: inline-flex;
    }

    .heroLikeWrap .likeCountStack {
      top: -18px;
      right: -8px;
    }

    .avatarRow {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #fff;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 10px 24px rgba(0,0,0,0.20);
      flex: 0 0 auto;
    }

    .avatar img,
    .ownerMiniAvatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .identityName {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .identityHandle {
      margin-top: 4px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
    }

    .identityBio {
      margin: 12px 0 0;
      max-width: 92%;
      color: rgba(255,255,255,0.90);
      font-size: 14px;
      line-height: 1.56;
    }

    .gridStats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: var(--shadow-soft);
    }

    .statValue {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .statLabel {
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .sectionTitle {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .sectionText,
    .smallNote,
    .muted {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.56;
    }

    .muted strong { color: var(--text); }

    .field,
    .textarea,
    .fileInput,
    .select {
      width: 100%;
      padding: 14px;
      border-radius: 18px;
      color: var(--text);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.11);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .field::placeholder,
    .textarea::placeholder {
      color: var(--text-dim);
    }

    .textarea {
      min-height: 112px;
      resize: vertical;
    }

    .uploadBox {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(200,169,126,0.12), rgba(255,255,255,0.03));
      border: 1px dashed rgba(200,169,126,0.26);
    }

    .statusLine {
      min-height: 20px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .statusLine.error { color: #ffd1d1; }
    .statusLine.ok { color: #d1ffdf; }

    .postList,
    .creatorSimpleList,
    .reactionList {
      display: grid;
      gap: 12px;
    }

    .postCard {
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .postMedia {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(200,169,126,0.18), transparent 30%),
        linear-gradient(135deg, rgba(33,27,39,0.96), rgba(17,14,22,0.98));
    }

    .postMedia img,
    .postMedia video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .postTextOnly {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      text-align: center;
      font-size: 25px;
      line-height: 1.42;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(241,223,200,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(200,169,126,0.14), transparent 30%),
        linear-gradient(135deg, rgba(86,67,49,0.95), rgba(22,18,28,0.98));
    }

    .kindBadge,
    .makerBadge,
    .feedModeBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: rgba(255,255,255,0.95);
      background: rgba(10,9,13,0.44);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }

    .postMeta {
      padding: 12px 12px 14px;
      display: grid;
      gap: 10px;
    }

    .ownerMini {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ownerMiniAvatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      flex: 0 0 auto;
    }

    .ownerMiniName {
      font-size: 14px;
      font-weight: 800;
    }

    .ownerMiniHandle {
      margin-top: 2px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .caption {
      font-size: 14px;
      line-height: 1.56;
      white-space: pre-wrap;
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--text-soft);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .reactionItem,
    .simpleItem {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .reactionAuthor {
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 800;
    }

    .reactionText {
      font-size: 13px;
      line-height: 1.56;
      color: var(--text-soft);
      white-space: pre-wrap;
    }

    .emptyState {
      padding: 18px;
      border-radius: 20px;
      border: 1px dashed rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
      color: var(--text-soft);
      text-align: center;
      font-size: 14px;
      line-height: 1.55;
    }

    .feedScreen {
      position: relative;
      height: 100dvh;
      overflow: hidden;
      background: #09070f;
      touch-action: pan-y;
    }

    .feedCanvas {
      position: absolute;
      inset: 0;
    }

    .feedSlide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      background: #110d15;
    }

    .feedMediaWrap {
      position: absolute;
      inset: 0;
      background: #110d15;
    }

    .feedMediaWrap img,
    .feedMediaWrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .feedTextFill {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
      text-align: center;
      font-size: 32px;
      line-height: 1.34;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(241,223,200,0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(200,169,126,0.16), transparent 32%),
        linear-gradient(135deg, rgba(89,69,50,0.96), rgba(14,12,18,0.98));
    }

    .feedShade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0.05) 28%, rgba(0,0,0,0.34) 100%),
        radial-gradient(circle at top right, rgba(255,244,232,0.08), transparent 28%);
    }

    .feedOverlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 16px calc(var(--safe-bottom) + 18px);
      pointer-events: none;
    }

    .feedOverlay * { pointer-events: auto; }

    .feedInfo {
      max-width: calc(100% - 132px);
      padding: 8px 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      backdrop-filter: none;
      box-shadow: none;
    }

    .feedTitle {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.03em;
      font-weight: 900;
      color: #fffaf6;
      text-shadow: 0 2px 10px rgba(0,0,0,0.30);
    }

    .feedSubtitle {
      margin-top: 4px;
      color: rgba(255,255,255,0.92);
      font-size: 11px;
      line-height: 1.4;
      text-shadow: 0 2px 8px rgba(0,0,0,0.28);
    }

    .feedBottom {
      display: grid;
      gap: 14px;
    }

    .feedContentMeta {
      display: grid;
      gap: 8px;
      width: min(100%, 410px);
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      backdrop-filter: none;
      box-shadow: none;
    }

    .feedCaption {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.98);
      text-shadow: 0 2px 10px rgba(0,0,0,0.30);
      white-space: pre-wrap;
    }

    .feedStats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .feedTapHint,
    .feedLoopHint {
      align-self: flex-start;
      padding: 0;
      border-radius: 0;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255,255,255,0.94);
      background: transparent;
      border: 0;
      backdrop-filter: none;
    }

    .feedLoopHint {
      font-weight: 700;
      color: #fff2e7;
      text-shadow: 0 2px 8px rgba(0,0,0,0.24);
    }

    .arrowBtn {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      font-size: 22px;
      color: #4f3525;
      background: linear-gradient(180deg, rgba(255,250,246,0.92), rgba(243,229,216,0.80));
      border: 1px solid rgba(124,88,58,0.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(72,50,33,0.12);
    }

    .likeBtn {
      background: rgba(8,7,11,0.34);
      color: rgba(255,255,255,0.96);
      border: 1px solid rgba(255,255,255,0.12);
    }


    .feedSideArrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
    }

    .feedSideArrow.leftSide {
      left: 14px;
    }

    .feedSideArrow.rightSide {
      right: 14px;
    }

    .feedBackUpBtn {
      position: absolute;
      right: 18px;
      bottom: calc(var(--safe-bottom) + 206px);
      z-index: 6;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,248,242,0.70);
      color: #5c3f2c;
      border: 1px solid rgba(120,84,53,0.16);
      box-shadow: 0 10px 22px rgba(72,50,33,0.10);
      backdrop-filter: blur(8px);
      font-size: 15px;
      font-weight: 900;
    }

    .feedVideoControlsInline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 16px;
      background: rgba(255,248,242,0.56);
      border: 1px solid rgba(120,84,53,0.12);
      backdrop-filter: blur(8px);
    }

    .feedVideoInlineBtn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(111,84,62,0.96);
      color: #fff8f2;
      border: 1px solid rgba(111,84,62,0.96);
      font-size: 14px;
      font-weight: 900;
    }

    .feedVideoInlineBtn.ghost {
      background: rgba(255,255,255,0.82);
      color: #5f4330;

<body>
  <div class="appShell">
    <section class="screen active" id="homeScreen"></section>
  </div>
  <script>

const API_BASE = window.location.origin;
const LOGIN_STORAGE_KEY = "socialPrototypeActiveUserId";
const LOGIN_NAME_STORAGE_KEY = "socialPrototypeActiveUserName";
const REMEMBER_LOGIN_STORAGE_KEY = "socialPrototypeRememberLogin";
const MONTHLY_LIKES_STORAGE_KEY = "socialPrototypeMonthlyLikes";
const MONTHLY_LIKES_LIMIT = 100;
const DONATION_STORAGE_KEY = "socialPrototypeBudgetModule";

const SPECIAL_AUDIO_USER = {
  id: "muziek",
  handle: "@muziek",
  displayName: "Muziek"
};
const SPECIAL_AUDIO_STREAM = "https://stream.qmusic.nl/qmusic/mp3";
const SPECIAL_AUDIO_VOLUME_KEY = "socialPrototypeSpecialAudioVolume";
const SPECIAL_AUDIO_MUTED_KEY = "socialPrototypeSpecialAudioMuted";

const state = {
  activeUserId: localStorage.getItem(LOGIN_STORAGE_KEY) || "",
  users: [],
  feedItems: [],
  ownFrontpage: null,
  incomingFriendRequests: [],
  outgoingFriendRequests: [],
  friendsList: [],
  specialAudioActive: false,
  specialAudioPlaying: false,
  specialAudioMuted: localStorage.getItem(SPECIAL_AUDIO_MUTED_KEY) === "true",
  specialAudioVolume: Number(localStorage.getItem(SPECIAL_AUDIO_VOLUME_KEY) || 0.3),
  specialAudioMounted: false,
  heroTitleTapCount: 0,
  heroTitleLastTapAt: 0,
  quickPostTheme: "calm",
  quickPostFont: "clean"
};


function isSpecialAudioUser(user) {
  if (!user) return false;
  return String(user.id || "") === SPECIAL_AUDIO_USER.id
    || String(user.handle || "").toLowerCase() === SPECIAL_AUDIO_USER.handle.toLowerCase()
    || String(user.displayName || "").toLowerCase() === SPECIAL_AUDIO_USER.displayName.toLowerCase();
}

function getSpecialAudioElement() {
  return $("specialHomepageAudio");
}

function saveSpecialAudioPrefs() {
  localStorage.setItem(SPECIAL_AUDIO_MUTED_KEY, String(!!state.specialAudioMuted));
  localStorage.setItem(SPECIAL_AUDIO_VOLUME_KEY, String(Number(state.specialAudioVolume || 0.3)));
}

function syncSpecialAudioUi() {
  const audio = getSpecialAudioElement();
  const playBtn = $("specialAudioPlayBtn");
  const muteBtn = $("specialAudioMuteBtn");
  const status = $("specialAudioStatus");
  const viz = $("specialAudioVisualizer");
  const volume = $("specialAudioVolume");
  const volumeValue = $("specialAudioVolumeValue");
  const isPlaying = !!(audio && !audio.paused && !audio.ended);
  state.specialAudioPlaying = isPlaying;

  if (playBtn) playBtn.textContent = isPlaying ? "❚❚" : "▶";
  if (muteBtn) muteBtn.textContent = state.specialAudioMuted ? "🔇" : "🔊";
  if (volume) volume.value = String(Math.round((state.specialAudioVolume || 0.3) * 100));
  if (volumeValue) volumeValue.textContent = `${Math.round((state.specialAudioVolume || 0.3) * 100)}%`;

  if (status) {
    if (!state.specialAudioActive) {
      status.textContent = "Deze gebruiker heeft geen partner-audio actief.";
    } else if (isPlaying && state.specialAudioMuted) {
      status.textContent = "Qmusic speelt op de achtergrond, maar staat nu gedempt.";
    } else if (isPlaying) {
      status.textContent = "Qmusic speelt passief op de achtergrond.";
    } else {
      status.textContent = "Qmusic probeert direct te starten op 30%. Druk op play als je browser dat blokkeert.";
    }
  }

  if (viz) viz.classList.toggle("playing", isPlaying);
}

function mountSpecialAudioIfNeeded() {
  const audio = getSpecialAudioElement();
  if (!audio || state.specialAudioMounted) return;
  state.specialAudioMounted = true;
  audio.src = SPECIAL_AUDIO_STREAM;
  audio.volume = Number(state.specialAudioVolume || 0.3);
  audio.muted = !!state.specialAudioMuted;
  audio.addEventListener("play", syncSpecialAudioUi);
  audio.addEventListener("pause", syncSpecialAudioUi);
  audio.addEventListener("error", syncSpecialAudioUi);
  window.addEventListener("beforeunload", () => {
    try { audio.pause(); } catch (_e) {}
  });
  syncSpecialAudioUi();
}

async function ensureSpecialAudioAutoplay() {
  const audio = getSpecialAudioElement();
  if (!audio || !state.specialAudioActive) return;
  audio.volume = Number(state.specialAudioVolume || 0.3);
  audio.muted = !!state.specialAudioMuted;
  try {
    await audio.play();
  } catch (_e) {}
  syncSpecialAudioUi();
}

async function toggleSpecialHomepageAudio() {
  const audio = getSpecialAudioElement();
  if (!audio || !state.specialAudioActive) return;
  try {
    if (audio.paused) {
      audio.volume = Number(state.specialAudioVolume || 0.3);
      audio.muted = !!state.specialAudioMuted;
      await audio.play();
    } else {
      audio.pause();
    }
  } catch (_e) {}
  syncSpecialAudioUi();
}

function toggleSpecialHomepageMute() {
  const audio = getSpecialAudioElement();
  state.specialAudioMuted = !state.specialAudioMuted;
  if (audio) audio.muted = state.specialAudioMuted;
  saveSpecialAudioPrefs();
  syncSpecialAudioUi();
}

function setSpecialHomepageVolume(value) {
  const audio = getSpecialAudioElement();
  const normalized = Math.max(0, Math.min(1, Number(value) / 100));
  state.specialAudioVolume = normalized;
  if (audio) audio.volume = normalized;
  saveSpecialAudioPrefs();
  syncSpecialAudioUi();
}


function getDonationStorageKey() {
  return `${DONATION_STORAGE_KEY}_${state.activeUserId || "guest"}`;
}

function getDonationModuleState() {
  try {
    const saved = JSON.parse(localStorage.getItem(getDonationStorageKey()) || "{}");
    return {
      promotionBudget: Number(saved.promotionBudget || 0),
      tipPoints: Number(saved.tipPoints || 0),
      givenPoints: Number(saved.givenPoints || 0),
      receivedPoints: Number(saved.receivedPoints || 0),
      donations: Array.isArray(saved.donations) ? saved.donations : [],
      receivedByMaker: saved.receivedByMaker && typeof saved.receivedByMaker === "object" ? saved.receivedByMaker : {}
    };
  } catch (_e) {
    return {
      promotionBudget: 0,
      tipPoints: 0,
      givenPoints: 0,
      receivedPoints: 0,
      donations: [],
      receivedByMaker: {}
    };
  }
}

function getCurrentLikeMonthKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
}

function getMonthlyLikesState() {
  try {
    const saved = JSON.parse(localStorage.getItem(MONTHLY_LIKES_STORAGE_KEY) || "{}");
    const monthKey = getCurrentLikeMonthKey();
    if (saved.monthKey !== monthKey) {
      return { monthKey, remainingLikes: MONTHLY_LIKES_LIMIT, likesByPost: {}, homepageLikesByUser: {} };
    }
    return {
      monthKey,
      remainingLikes: Number(saved.remainingLikes ?? MONTHLY_LIKES_LIMIT),
      likesByPost: saved.likesByPost && typeof saved.likesByPost === "object" ? saved.likesByPost : {},
      homepageLikesByUser: saved.homepageLikesByUser && typeof saved.homepageLikesByUser === "object" ? saved.homepageLikesByUser : {}
    };
  } catch (_e) {
    return { monthKey: getCurrentLikeMonthKey(), remainingLikes: MONTHLY_LIKES_LIMIT, likesByPost: {}, homepageLikesByUser: {} };
  }

const $ = (id) => document.getElementById(id);

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function fetchJson(url, options = {}) {
  const response = await fetch(url, options);
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.message || "Request mislukt.");
  return data;
}

function getInitials(name = "?") {
  return String(name).trim().split(/\s+/).filter(Boolean).map((part) => part[0]).join("").slice(0, 2).toUpperCase() || "?";

function getUserById(userId) {

function getPageBackgroundValue(user) {

function getAvatarHtml(user, className = "avatar") {
  if (user?.avatarUrl) {
    return `<div class="${className}" style="background:${escapeHtml(user.avatarColor || '#c8a97e')};"><img src="${escapeHtml(user.avatarUrl)}" alt="${escapeHtml(user.displayName || 'avatar')}" /></div>`;
  }
  return `<div class="${className}" style="background:linear-gradient(135deg, ${escapeHtml(user?.avatarColor || '#c8a97e')}, #6f543e);">${escapeHtml(getInitials(user?.displayName || '?'))}</div>`;
}

function timeAgo(timestamp) {
  const diff = Math.max(0, Date.now() - Number(timestamp || 0));
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "zojuist";
  if (mins < 60) return `${mins} min geleden`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} uur geleden`;
  const days = Math.floor(hours / 24);
  return `${days} d geleden`;
}

async function saveProfile() {
  const displayName = $("profileDisplayName")?.value.trim() || "";
  const handleRaw = $("profileHandle")?.value.trim() || "";
  const bio = $("profileBio")?.value.trim() || "";
  const password = $("profilePassword")?.value || "";

  if (!displayName) {
    setStatusLine("profileStatus", "Naam mag niet leeg zijn.", "error");
    return;
  }
  if (!handleRaw) {
    setStatusLine("profileStatus", "Handle mag niet leeg zijn.", "error");
    return;
  }

  const payload = { displayName, handle: handleRaw.startsWith("@") ? handleRaw : `@${handleRaw}`, bio };
  if (password.length > 0) payload.password = password;

  setStatusLine("profileStatus", "Profiel wordt opgeslagen...", "");
  try {
    const result = await fetchJson(`${API_BASE}/users/${encodeURIComponent(state.activeUserId)}/profile`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (result?.user?.displayName) localStorage.setItem(LOGIN_NAME_STORAGE_KEY, result.user.displayName);
    if ($("profilePassword")) $("profilePassword").value = "";
    await refreshAll();
    setStatusLine("profileStatus", "Profiel opgeslagen.", "ok");
  } catch (error) {
    setStatusLine("profileStatus", error.message || "Profiel opslaan mislukt.", "error");
  }
}

async function uploadProfileBackground() {
  const file = $("profileBackgroundFile")?.files?.[0] || null;
  if (!file) {
    setStatusLine("backgroundStatus", "Kies eerst een achtergrondfoto.", "error");
    return;
  }
  setStatusLine("backgroundStatus", "Achtergrond wordt geüpload...", "");
  try {
    const formData = new FormData();
    formData.append("background", file);
    const response = await fetch(`${API_BASE}/users/${encodeURIComponent(state.activeUserId)}/profile-media`, {
      method: "POST",
      body: formData
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(result.message || "Upload mislukt.");
    if ($("profileBackgroundFile")) $("profileBackgroundFile").value = "";
    await refreshAll();
    setStatusLine("backgroundStatus", "Achtergrond opgeslagen.", "ok");
  } catch (error) {
    setStatusLine("backgroundStatus", error.message || "Upload mislukt.", "error");
  }
}

  const currentUser = state.ownFrontpage?.user || {};
  const currentBio = currentUser.bio || "";

  const nextBio = window.prompt("Pas de tekst in de hero aan", currentBio);
  if (nextBio == null) return;
  const cleanedBio = String(nextBio).trim();

  setStatusLine("profileStatus", "Hero-tekst wordt opgeslagen...", "");
  fetchJson(`${API_BASE}/users/${encodeURIComponent(state.activeUserId)}/profile`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      displayName: currentUser.displayName || "",
      handle: currentUser.handle || "",
      bio: cleanedBio
    })
  }).then(async () => {
    await refreshAll();
    setStatusLine("profileStatus", "Hero-tekst opgeslagen.", "ok");

                <div id="quickPostPreviewCard" class="quickPostPreviewCard quickPreviewTheme-${state.quickPostTheme} quickPreviewFont-${state.quickPostFont}${state.quickPostTheme === 'heroBlur' ? ' hasHeroBlur' : ''}" style="--quick-post-hero-bg:${user?.backgroundUrl ? `url('${encodeURI(user.backgroundUrl)}')` : 'none'};">
                  <div class="quickPostPreviewBackdrop" aria-hidden="true"></div>
                  <div id="quickPostPreviewText" class="quickPostPreviewText">Zo ziet je tekstpost eruit voordat je hem plaatst.</div>
                </div>
              </div>

              <div class="actionRow">
                <div id="homePostStatus" class="statusLine"></div>
                <button class="solidBtn" onclick="publishQuickTextPost()">Plaatsen</button>
              </div>
            </div>
          </div>
        </section>
        `}


        <section class="card">
          <div class="cardBody stack">
            <div class="sectionHeader">
              <div>
                <h3 class="sectionTitle">Jouw wallet</h3>
                <div class="sectionText">Snel overzicht van promotiebudget, donatiepunten en ontvangen donaties.</div>
              </div>
              <div class="buttonGroup">
                <button class="ghostBtn" onclick="goToDonationsPage()">Open wallet</button>
              </div>
            </div>
            <div class="smallNote">Actieve wallet: <strong>${escapeHtml(state.activeUserId || "guest")}</strong></div>
            <div class="walletGrid">
            </div>
            <div class="walletGrid">
              <div class="walletStat">
                <div class="walletStatValue">€${Number(wallet.promotionBudget || 0)}</div>
                <div class="walletStatLabel">Overgebleven euro’s</div>
              </div>
              <div class="walletStat">
                <div class="walletStatValue">${Number(wallet.tipPoints || 0)}</div>
                <div class="walletStatLabel">Donatiepunten</div>
              </div>
              <div class="walletStat">
                <div class="walletStatValue">${Number(wallet.receivedPoints || 0)}</div>
                <div class="walletStatLabel">Ontvangen donaties</div>
              </div>
            </div>
            <div class="actionRow">
              <div class="smallNote">Open hier het volledige donatie- en budgetoverzicht.</div>
              <button class="ghostBtn" onclick="goToDonationsPage()">Donaties</button>
            </div>
          </div>
        </section>
        <section class="card">
          <div class="cardBody stack">
            <div class="sectionHeader">
              <div>
                <h3 class="sectionTitle">Reacties</h3>
                <div class="sectionText">Publieke berichten voor jouw homepage.</div>
              </div>
            </div>
            <textarea id="homeReactionInput" class="textarea" placeholder="Schrijf iets voor je eigen homepage..."></textarea>
            <div class="actionRow">
              <div class="smallNote">Nieuwe berichten komen eerst in pending.</div>
              <button class="ghostBtn" onclick="sendFrontpageReaction('${user.id}')">Versturen</button>
            </div>
            ${renderReactionList(acceptedReactions, false)}
          </div>
        </section>

        <section class="card">
          <div class="cardBody stack">
            <div class="sectionHeader">
              <div>
                <h3 class="sectionTitle">Pending ${homeLamps.pending ? '<span class="tinyLamp" style="position:static; display:inline-block; margin-left:8px; vertical-align:middle;"></span>' : ''}</h3>
                <div class="sectionText">Keuren, afwijzen of blokkeren.</div>
              </div>
            </div>
            ${renderReactionList(pendingReactions, true)}
          </div>
        </section>

        <section class="card">
          <div class="cardBody stack">
            <div class="sectionHeader">
              <div>
                <h3 class="sectionTitle">Jouw content</h3>
                <div class="sectionText">Compact overzicht van je laatste posts.</div>
              </div>
              <div class="buttonGroup">
                <button class="ghostBtn" onclick="openFeedFromOwnContent()">Open in feed</button>
              </div>
            </div>
            ${renderCompactOwnPosts(posts)}
          </div>
        </section>

        <section aria-hidden="true" style="position:absolute !important; left:-9999px !important; top:auto !important; width:1px !important; height:1px !important; overflow:hidden !important; opacity:0 !important; pointer-events:none !important;">
          <input id="profileDisplayName" value="${escapeHtml(user.displayName || '')}" tabindex="-1" />
          <input id="profileHandle" value="${escapeHtml(user.handle || '')}" tabindex="-1" />
          <textarea id="profileBio" tabindex="-1">${escapeHtml(user.bio || '')}</textarea>
          <input id="profilePassword" type="password" value="" tabindex="-1" />
          <div id="backgroundStatus" class="statusLine"></div>
          <div id="profileStatus" class="statusLine"></div>
        </section>
      </div>
    </div>
  `;

  if (hasSpecialAudio) {
    state.specialAudioMounted = false;
    mountSpecialAudioIfNeeded();
    ensureSpecialAudioAutoplay();
  } else {
    state.specialAudioMounted = false;
    bindQuickPostPreview();
  }
  syncSpecialAudioUi();
}

function openTesterUitleg() {
  window.location.href = "testers-uitleg.html";
}

async function refreshAll() {
  await loadUsers();
  await loadFeed();
  await loadOwnFrontpage();
  await loadFriendsData();
  renderHomeScreen();
}

async function startApp() {
  try {
    if (!state.activeUserId) {
      window.location.href = "index.html";
      return;
    }
    await refreshAll();
  } catch (error) {
    console.error(error);
    alert(error.message || "Kon de mobiele homepage niet laden.");
  }
}

startApp();

  </script>
</body>
</html>
