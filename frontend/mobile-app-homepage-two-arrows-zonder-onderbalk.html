<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Social Prototype Mobile - Homepage</title>
  <style>

    :root {
      --bg: #0f0a19;
      --bg-2: #1a1230;
      --bg-3: #24183f;
      --panel: rgba(28, 20, 48, 0.88);
      --panel-2: rgba(39, 28, 65, 0.96);
      --panel-3: rgba(54, 39, 87, 0.98);
      --glass: rgba(255,255,255,0.07);
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.16);
      --text: #f7f3ff;
      --text-soft: #cdc3e6;
      --text-dim: #9b91b8;
      --accent: #9b5cff;
      --accent-2: #c9a5ff;
      --accent-3: #6d35d8;
      --accent-deep: #5126a6;
      --ok: #8ff0bc;
      --danger: #ffb6c1;
      --shadow: 0 24px 60px rgba(0,0,0,0.36);
      --shadow-soft: 0 16px 36px rgba(0,0,0,0.22);
      --radius: 26px;
      --radius-sm: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(155,92,255,0.18), transparent 28%),
        radial-gradient(circle at top left, rgba(201,165,255,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .appShell {
      min-height: 100dvh;
      max-width: 460px;
      margin: 0 auto;
      position: relative;
      background:
        linear-gradient(180deg, rgba(8,7,11,0.58), rgba(18,15,25,0.58)),
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 34%);
      backdrop-filter: blur(20px);
    }

    .screen {
      display: none;
      min-height: 100dvh;
    }

    .screen.active {
      display: block;
    }

    .page {
      padding: calc(var(--safe-top) + 18px) 16px calc(var(--safe-bottom) + 28px);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)),
        linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0)),
        radial-gradient(circle at top right, rgba(201,165,255,0.12), transparent 28%);
      pointer-events: none;
    }

    .cardBody {
      position: relative;
      z-index: 1;
      padding: 16px;
    }

    .topRow,
    .sectionHeader,
    .feedOverlayRow,
    .statRow,
    .actionRow,
    .composerActions,
    .miniRow,
    .bottomActionRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .topRow,
    .sectionHeader {
      align-items: flex-start;
    }

    .pageTitle {
      margin: 0;
      font-size: 30px;
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .pageIntro {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
      max-width: 34ch;
    }

    .buttonGroup {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .navBtnWrap {
      position: relative;
      display: inline-flex;
    }

    .tinyLamp {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ffcf5a;
      box-shadow: 0 0 0 2px rgba(9,7,15,0.92), 0 0 14px rgba(255,207,90,0.55);
      pointer-events: none;
    }


    .pill,
    .ghostBtn,
    .solidBtn,
    .dangerBtn {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: transform .15s ease, opacity .15s ease, background .2s ease, border-color .2s ease;
    }

    .pill:active,
    .ghostBtn:active,
    .solidBtn:active,
    .dangerBtn:active,
    .arrowBtn:active,
    .feedTapHint:active {
      transform: scale(0.985);
    }

    .pill,
    .ghostBtn {
      color: var(--text);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .solidBtn {
      color: #18130f;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 14px 32px rgba(200,169,126,0.22);
    }

    .dangerBtn {
      color: #ffe4e4;
      background: rgba(240,169,169,0.10);
      border: 1px solid rgba(240,169,169,0.18);
    }

    .hero {
      position: relative;
      padding: 18px;
      min-height: 228px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background:
        radial-gradient(circle at top right, rgba(201,165,255,0.18), transparent 30%),
        linear-gradient(135deg, rgba(96,43,194,0.92), rgba(20,15,31,0.96));
    }

    .heroMedia {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      z-index: 0;
      pointer-events: none;
    }

    .heroMedia img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 18px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(8,7,11,0.64)),
        radial-gradient(circle at top right, rgba(201,165,255,0.14), transparent 30%),
        radial-gradient(circle at top left, rgba(155,92,255,0.10), transparent 28%);
    }

    .hero > * { position: relative; z-index: 1; }

    .heroLikeWrap {
      position: absolute !important;
      top: 16px;
      right: 16px;
      z-index: 2 !important;
    }

    .likeQuotaStack {
      position: absolute;
      top: calc(var(--safe-top) + 14px);
      right: 16px;
      z-index: 7;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .likeIconBtn {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(8,7,11,0.34);
      color: rgba(255,255,255,0.98);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 22px rgba(0,0,0,0.14);
      backdrop-filter: blur(10px);
      font-size: 18px;
      font-weight: 900;
      position: relative;
    }

    .likeIconCount {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,248,242,0.96);
      color: #4f3525;
      border: 1px solid rgba(124,88,58,0.18);
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .likeCountStack {
      position: absolute;
      top: -18px;
      right: -8px;
      display: grid;
      gap: 8px;
      justify-items: end;
      pointer-events: none;
    }

    .likeCountStack .likeIconCount {
      position: relative;
      top: auto;
      right: auto;
      min-width: 22px;
      height: 22px;
      font-size: 10px;
    }

    .heroLikeWrap .likeQuotaStack {
      position: relative;
      top: auto;
      right: auto;
      z-index: auto;
      display: inline-flex;
    }

    .heroLikeWrap .likeCountStack {
      top: -18px;
      right: -8px;
    }

    .avatarRow {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #fff;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 10px 24px rgba(0,0,0,0.20);
      flex: 0 0 auto;
    }

    .avatar img,
    .ownerMiniAvatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .identityName {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .identityHandle {
      margin-top: 4px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
    }

    .identityBio {
      margin: 12px 0 0;
      max-width: 92%;
      color: rgba(255,255,255,0.90);
      font-size: 14px;
      line-height: 1.56;
    }

    .gridStats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: var(--shadow-soft);
    }

    .statValue {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .statLabel {
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .sectionTitle {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .sectionText,
    .smallNote,
    .muted {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.56;
    }

    .muted strong { color: var(--text); }

    .field,
    .textarea,
    .fileInput,
    .select {
      width: 100%;
      padding: 14px;
      border-radius: 18px;
      color: var(--text);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.11);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .field::placeholder,
    .textarea::placeholder {
      color: var(--text-dim);
    }

    .textarea {
      min-height: 112px;
      resize: vertical;
    }

    .uploadBox {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(200,169,126,0.12), rgba(255,255,255,0.03));
      border: 1px dashed rgba(200,169,126,0.26);
    }

    .statusLine {
      min-height: 20px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .statusLine.error { color: #ffd1d1; }
    .statusLine.ok { color: #d1ffdf; }

    .postList,
    .creatorSimpleList,
    .reactionList {
      display: grid;
      gap: 12px;
    }

    .postCard {
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .postMedia {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(200,169,126,0.18), transparent 30%),
        linear-gradient(135deg, rgba(33,27,39,0.96), rgba(17,14,22,0.98));
    }

    .postMedia img,
    .postMedia video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .postTextOnly {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      text-align: center;
      font-size: 25px;
      line-height: 1.42;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(241,223,200,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(200,169,126,0.14), transparent 30%),
        linear-gradient(135deg, rgba(86,67,49,0.95), rgba(22,18,28,0.98));
    }

    .kindBadge,
    .makerBadge,
    .feedModeBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: rgba(255,255,255,0.95);
      background: rgba(10,9,13,0.44);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }

    .postMeta {
      padding: 12px 12px 14px;
      display: grid;
      gap: 10px;
    }

    .ownerMini {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ownerMiniAvatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      flex: 0 0 auto;
    }

    .ownerMiniName {
      font-size: 14px;
      font-weight: 800;
    }

    .ownerMiniHandle {
      margin-top: 2px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .caption {
      font-size: 14px;
      line-height: 1.56;
      white-space: pre-wrap;
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--text-soft);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .reactionItem,
    .simpleItem {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .reactionAuthor {
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 800;
    }

    .reactionText {
      font-size: 13px;
      line-height: 1.56;
      color: var(--text-soft);
      white-space: pre-wrap;
    }

    .emptyState {
      padding: 18px;
      border-radius: 20px;
      border: 1px dashed rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
      color: var(--text-soft);
      text-align: center;
      font-size: 14px;
      line-height: 1.55;
    }

    .feedScreen {
      position: relative;
      height: 100dvh;
      overflow: hidden;
      background: #09070f;
      touch-action: pan-y;
    }

    .feedCanvas {
      position: absolute;
      inset: 0;
    }

    .feedSlide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      background: #110d15;
    }

    .feedMediaWrap {
      position: absolute;
      inset: 0;
      background: #110d15;
    }

    .feedMediaWrap img,
    .feedMediaWrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .feedTextFill {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
      text-align: center;
      font-size: 32px;
      line-height: 1.34;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(241,223,200,0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(200,169,126,0.16), transparent 32%),
        linear-gradient(135deg, rgba(89,69,50,0.96), rgba(14,12,18,0.98));
    }

    .feedShade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.14) 0%, rgba(0,0,0,0.05) 28%, rgba(0,0,0,0.34) 100%),
        radial-gradient(circle at top right, rgba(255,244,232,0.08), transparent 28%);
    }

    .feedOverlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 16px calc(var(--safe-bottom) + 18px);
      pointer-events: none;
    }

    .feedOverlay * { pointer-events: auto; }

    .feedInfo {
      max-width: calc(100% - 132px);
      padding: 8px 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      backdrop-filter: none;
      box-shadow: none;
    }

    .feedTitle {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.03em;
      font-weight: 900;
      color: #fffaf6;
      text-shadow: 0 2px 10px rgba(0,0,0,0.30);
    }

    .feedSubtitle {
      margin-top: 4px;
      color: rgba(255,255,255,0.92);
      font-size: 11px;
      line-height: 1.4;
      text-shadow: 0 2px 8px rgba(0,0,0,0.28);
    }

    .feedBottom {
      display: grid;
      gap: 14px;
    }

    .feedContentMeta {
      display: grid;
      gap: 8px;
      width: min(100%, 410px);
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      backdrop-filter: none;
      box-shadow: none;
    }

    .feedCaption {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.98);
      text-shadow: 0 2px 10px rgba(0,0,0,0.30);
      white-space: pre-wrap;
    }

    .feedStats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .feedTapHint,
    .feedLoopHint {
      align-self: flex-start;
      padding: 0;
      border-radius: 0;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255,255,255,0.94);
      background: transparent;
      border: 0;
      backdrop-filter: none;
    }

    .feedLoopHint {
      font-weight: 700;
      color: #fff2e7;
      text-shadow: 0 2px 8px rgba(0,0,0,0.24);
    }

    .arrowBtn {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      font-size: 22px;
      color: #4f3525;
      background: linear-gradient(180deg, rgba(255,250,246,0.92), rgba(243,229,216,0.80));
      border: 1px solid rgba(124,88,58,0.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(72,50,33,0.12);
    }

    .likeBtn {
      background: rgba(8,7,11,0.34);
      color: rgba(255,255,255,0.96);
      border: 1px solid rgba(255,255,255,0.12);
    }


    .feedSideArrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
    }

    .feedSideArrow.leftSide {
      left: 14px;
    }

    .feedSideArrow.rightSide {
      right: 14px;
    }

    .feedBackUpBtn {
      position: absolute;
      right: 18px;
      bottom: calc(var(--safe-bottom) + 206px);
      z-index: 6;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,248,242,0.70);
      color: #5c3f2c;
      border: 1px solid rgba(120,84,53,0.16);
      box-shadow: 0 10px 22px rgba(72,50,33,0.10);
      backdrop-filter: blur(8px);
      font-size: 15px;
      font-weight: 900;
    }

    .feedVideoControlsInline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 16px;
      background: rgba(255,248,242,0.56);
      border: 1px solid rgba(120,84,53,0.12);
      backdrop-filter: blur(8px);
    }

    .feedVideoInlineBtn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(111,84,62,0.96);
      color: #fff8f2;
      border: 1px solid rgba(111,84,62,0.96);
      font-size: 14px;
      font-weight: 900;
    }

    .feedVideoInlineBtn.ghost {
      background: rgba(255,255,255,0.82);
      color: #5f4330;
      border: 1px solid rgba(120,84,53,0.14);
    }

    .hidden { display: none !important; }

    @media (min-width: 461px) {
      .appShell {
        border-left: 1px solid rgba(255,255,255,0.04);
        border-right: 1px solid rgba(255,255,255,0.04);
      }
    }
  


    .pageWithUserBg {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .pageWithUserBg::before {
      content: "";
      position: absolute;
      inset: 0;

<body>
  <div class="appShell">
    <section class="screen active" id="homeScreen"></section>
  </div>
  <script>

const API_BASE = window.location.origin;
const LOGIN_STORAGE_KEY = "socialPrototypeActiveUserId";
const LOGIN_NAME_STORAGE_KEY = "socialPrototypeActiveUserName";
const REMEMBER_LOGIN_STORAGE_KEY = "socialPrototypeRememberLogin";
const MONTHLY_LIKES_STORAGE_KEY = "socialPrototypeMonthlyLikes";
const MONTHLY_LIKES_LIMIT = 100;
const DONATION_STORAGE_KEY = "socialPrototypeBudgetModule";

const state = {
  activeUserId: localStorage.getItem(LOGIN_STORAGE_KEY) || "",
  users: [],
  feedItems: [],
  ownFrontpage: null,
  incomingFriendRequests: [],
  outgoingFriendRequests: [],
  friendsList: [],
  radio: null
};

const RADIO_STORAGE_KEY = "socialPrototypeHomepageRadio";
const RADIO_PRESETS = [
  {
    id: "qmusic",
    name: "Qmusic",
    streamUrl: "https://stream.qmusic.nl/qmusic/mp3",
    pageUrl: "https://qmusic.nl/hier-vind-je-alle-stream-urls-van-qmusic"
  },
  {
    id: "radio538",
    name: "Radio 538",
    streamUrl: "",
    pageUrl: "https://www.538.nl/radio/luisteren"
  },
  {
    id: "100pnl",
    name: "100% NL",
    streamUrl: "",
    pageUrl: "https://www.100p.nl/"
  },
  {
    id: "skyradio",
    name: "Sky Radio",
    streamUrl: "",
    pageUrl: "https://www.skyradio.nl/online-radio"
  },
  {
    id: "radionl",
    name: "RADIONL",
    streamUrl: "",
    pageUrl: "https://radionl.fm/luisteren/"
  }
];

function getSavedRadioState() {
  try {
    const saved = JSON.parse(localStorage.getItem(RADIO_STORAGE_KEY) || "{}");
    return {
      stationId: typeof saved.stationId === "string" ? saved.stationId : RADIO_PRESETS[0].id,
      isPlaying: Boolean(saved.isPlaying),
      muted: Boolean(saved.muted)
    };
  } catch (_error) {
    return { stationId: RADIO_PRESETS[0].id, isPlaying: false, muted: false };
  }
}

function saveRadioState() {
  localStorage.setItem(RADIO_STORAGE_KEY, JSON.stringify({
    stationId: state.radio.stationId,
    isPlaying: state.radio.isPlaying,
    muted: state.radio.muted
  }));
}

state.radio = {
  stationId: getSavedRadioState().stationId,
  isPlaying: getSavedRadioState().isPlaying,
  muted: getSavedRadioState().muted,
  stations: RADIO_PRESETS.map((station) => ({ ...station })),
  ready: false,
  currentUrl: "",
  initialized: false,
  menuOpen: false
};

function getSelectedRadioStation() {
  return state.radio.stations.find((station) => station.id === state.radio.stationId) || state.radio.stations[0];
}

async function resolveRadioStations() {
  const unresolved = state.radio.stations.filter((station) => !station.streamUrl);
  if (!unresolved.length) {
    state.radio.ready = true;
    return;
  }

  await Promise.all(unresolved.map(async (station) => {
    try {
      const endpoint = `https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(station.name)}&countrycode=NL&hidebroken=true&limit=10&order=votes&reverse=true`;
      const results = await fetch(endpoint).then((response) => response.json());
      const match = Array.isArray(results)
        ? results.find((item) => {
            const name = String(item.name || "").toLowerCase();
            const homepage = String(item.homepage || "").toLowerCase();
            return name.includes(station.name.toLowerCase().replace(/\s+/g, "")) ||
              homepage.includes(station.name.toLowerCase().replace(/\s+/g, ""));
          }) || results[0]
        : null;

      if (match?.url_resolved) {
        station.streamUrl = match.url_resolved;
      }
    } catch (_error) {
      // laat leeg; gebruiker kan dan een andere zender kiezen
    }
  }));

  state.radio.ready = true;
}

function getRadioAudioElement() {
  return $("homepageRadioAudio");
}

function syncRadioUi() {
  const playBtn = $("radioPlayBtn");
  const muteBtn = $("radioMuteBtn");
  const status = $("radioStatus");
  const now = $("radioNow");
  const pickerLabel = $("radioPickerLabel");
  const visualizer = $("radioVisualizer");
  const menu = $("radioStationMenu");
  const station = getSelectedRadioStation();
  if (playBtn) playBtn.textContent = state.radio.isPlaying ? "❚❚" : "▶";
  if (muteBtn) muteBtn.textContent = state.radio.muted ? "🔇" : "🔊";
  if (status) {
    if (!station?.streamUrl) {
      status.textContent = "Voor deze zender is nog geen directe stream gevonden. Kies een andere om te testen.";
    } else if (state.radio.isPlaying) {
      status.textContent = "Speelt op je homepage en modules, niet in de feed.";
    } else {
      status.textContent = "Tik op play om te starten.";
    }
  }
  if (now) now.textContent = station?.name || "Radio";
  if (pickerLabel) pickerLabel.textContent = station?.name || "Kies zender";
  if (visualizer) visualizer.classList.toggle("isPlaying", !!state.radio.isPlaying);
  if (menu) {
    menu.classList.toggle("show", !!state.radio.menuOpen);
    menu.querySelectorAll(".radioStationItem").forEach((button) => {
      button.classList.toggle("active", button.dataset.stationId === state.radio.stationId);
    });
  }
}

function toggleRadioMenu() {
  state.radio.menuOpen = !state.radio.menuOpen;
  syncRadioUi();
}

function closeRadioMenu() {
  if (!state.radio.menuOpen) return;
  state.radio.menuOpen = false;
  syncRadioUi();
}

async function applyRadioSource(autoplay = false) {
  const station = getSelectedRadioStation();
  const audio = getRadioAudioElement();
  if (!audio || !station) return;
  if (!station.streamUrl) {
    state.radio.isPlaying = false;
    state.radio.currentUrl = "";
    audio.removeAttribute("src");
    audio.load();
    syncRadioUi();
    saveRadioState();
    return;
  }
  if (state.radio.currentUrl !== station.streamUrl) {
    audio.src = station.streamUrl;
    state.radio.currentUrl = station.streamUrl;
  }
  audio.muted = !!state.radio.muted;
  syncRadioUi();
  if (autoplay && state.radio.isPlaying) {
    try {
      await audio.play();
      state.radio.isPlaying = true;
    } catch (_error) {
      state.radio.isPlaying = false;
    }
    syncRadioUi();
    saveRadioState();
  }
}

async function toggleHomepageRadio() {
  const station = getSelectedRadioStation();
  const audio = getRadioAudioElement();
  if (!audio) return;
  if (!station?.streamUrl) {
    syncRadioUi();
    return;
  }
  try {
    if (state.radio.isPlaying) {
      audio.pause();
      state.radio.isPlaying = false;
    } else {
      audio.muted = !!state.radio.muted;
      await audio.play();
      state.radio.isPlaying = true;
    }
  } catch (_error) {
    state.radio.isPlaying = false;
  }
  syncRadioUi();
  saveRadioState();
}

function toggleHomepageRadioMute() {
  const audio = getRadioAudioElement();
  state.radio.muted = !state.radio.muted;
  if (audio) audio.muted = state.radio.muted;
  syncRadioUi();
  saveRadioState();
}

async function selectHomepageRadioStation(value) {
  state.radio.stationId = String(value || RADIO_PRESETS[0].id);
  state.radio.menuOpen = false;
  saveRadioState();
  await applyRadioSource(true);
}

function mountHomepageRadioEvents() {
  const audio = getRadioAudioElement();
  if (!audio || state.radio.initialized) return;
  state.radio.initialized = true;
  audio.addEventListener("pause", () => {
    if (state.radio.isPlaying) {
      state.radio.isPlaying = false;
      syncRadioUi();
      saveRadioState();
    }
  });
  audio.addEventListener("play", () => {
    if (!state.radio.isPlaying) {
      state.radio.isPlaying = true;
      syncRadioUi();
      saveRadioState();
    }
  });
  audio.addEventListener("error", () => {
    state.radio.isPlaying = false;
    syncRadioUi();
    saveRadioState();
  });
  document.addEventListener("click", (event) => {
    const shell = $("radioShell");
    if (!shell) return;
    if (!shell.contains(event.target)) closeRadioMenu();
  });
}

function getDonationModuleState() {
  try {
    const saved = JSON.parse(localStorage.getItem(DONATION_STORAGE_KEY) || "{}");
    return {
      promotionBudget: Number(saved.promotionBudget || 0),
      tipPoints: Number(saved.tipPoints || 0),
      givenPoints: Number(saved.givenPoints || 0),
      receivedPoints: Number(saved.receivedPoints || 0),
      donations: Array.isArray(saved.donations) ? saved.donations : [],
      receivedByMaker: saved.receivedByMaker && typeof saved.receivedByMaker === "object" ? saved.receivedByMaker : {}
    };
  } catch (_e) {
    return {
      promotionBudget: 0,
      tipPoints: 0,
      givenPoints: 0,
      receivedPoints: 0,
      donations: [],
      receivedByMaker: {}
    };
  }
}

function getCurrentLikeMonthKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
}

function getMonthlyLikesState() {
  try {
    const saved = JSON.parse(localStorage.getItem(MONTHLY_LIKES_STORAGE_KEY) || "{}");
    const monthKey = getCurrentLikeMonthKey();
    if (saved.monthKey !== monthKey) {
      return { monthKey, remainingLikes: MONTHLY_LIKES_LIMIT, likesByPost: {}, homepageLikesByUser: {} };
    }
    return {
      monthKey,
      remainingLikes: Number(saved.remainingLikes ?? MONTHLY_LIKES_LIMIT),
      likesByPost: saved.likesByPost && typeof saved.likesByPost === "object" ? saved.likesByPost : {},
      homepageLikesByUser: saved.homepageLikesByUser && typeof saved.homepageLikesByUser === "object" ? saved.homepageLikesByUser : {}
    };
  } catch (_e) {
    return { monthKey: getCurrentLikeMonthKey(), remainingLikes: MONTHLY_LIKES_LIMIT, likesByPost: {}, homepageLikesByUser: {} };
  }
}

function saveMonthlyLikesState(data) {
  localStorage.setItem(MONTHLY_LIKES_STORAGE_KEY, JSON.stringify(data));
}

function getRemainingLikesThisMonth() {
  const likeState = getMonthlyLikesState();
  return Number(likeState.remainingLikes || 0);
}

function getHomepageLikesGivenForUser(userId) {
  const likeState = getMonthlyLikesState();
  return Number(likeState.homepageLikesByUser?.[userId] || 0);
}

const $ = (id) => document.getElementById(id);

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function fetchJson(url, options = {}) {
  const response = await fetch(url, options);
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.message || "Request mislukt.");
  return data;
}

function getInitials(name = "?") {
  return String(name).trim().split(/\s+/).filter(Boolean).map((part) => part[0]).join("").slice(0, 2).toUpperCase() || "?";
}

function getUserById(userId) {
  return state.users.find((user) => user.id === userId) || null;
}

function getHeroMediaHtml(user) {
  if (!user?.backgroundUrl) return "";
  return `<div class="heroMedia"><img src="${escapeHtml(user.backgroundUrl)}" alt="Homepage achtergrond" /></div>`;
}

function getPageBackgroundValue(user) {
  return user?.backgroundUrl ? `url('${encodeURI(user.backgroundUrl)}')` : 'none';
}

function getAvatarHtml(user, className = "avatar") {
  if (user?.avatarUrl) {
    return `<div class="${className}" style="background:${escapeHtml(user.avatarColor || '#c8a97e')};"><img src="${escapeHtml(user.avatarUrl)}" alt="${escapeHtml(user.displayName || 'avatar')}" /></div>`;
  }
  return `<div class="${className}" style="background:linear-gradient(135deg, ${escapeHtml(user?.avatarColor || '#c8a97e')}, #6f543e);">${escapeHtml(getInitials(user?.displayName || '?'))}</div>`;
}

function timeAgo(timestamp) {
  const diff = Math.max(0, Date.now() - Number(timestamp || 0));
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "zojuist";
  if (mins < 60) return `${mins} min geleden`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} uur geleden`;
  const days = Math.floor(hours / 24);
  return `${days} d geleden`;
}

function setStatusLine(id, message = "", kind = "") {
  const element = $(id);
  if (!element) return;
  element.textContent = message;
  element.className = `statusLine${kind ? ` ${kind}` : ""}`;
}

function switchAccount() {
  localStorage.removeItem(LOGIN_STORAGE_KEY);
  localStorage.removeItem(LOGIN_NAME_STORAGE_KEY);
  localStorage.removeItem(REMEMBER_LOGIN_STORAGE_KEY);
  window.location.href = "index.html";
}

async function loadUsers() {
  state.users = await fetchJson(`${API_BASE}/users`);
}

async function loadFeed() {
  const result = await fetchJson(`${API_BASE}/feed?userId=${encodeURIComponent(state.activeUserId)}`);
  state.feedItems = Array.isArray(result.items) ? result.items : [];
}

async function loadOwnFrontpage() {
  state.ownFrontpage = await fetchJson(`${API_BASE}/frontpage/${encodeURIComponent(state.activeUserId)}?viewerUserId=${encodeURIComponent(state.activeUserId)}`);
}

async function loadFriendsData() {
  const [listResult, requestsResult] = await Promise.all([
    fetchJson(`${API_BASE}/friends/list?userId=${encodeURIComponent(state.activeUserId)}`),
    fetchJson(`${API_BASE}/friends/requests?userId=${encodeURIComponent(state.activeUserId)}`)
  ]);
  state.friendsList = Array.isArray(listResult.items) ? listResult.items : [];
  state.incomingFriendRequests = Array.isArray(requestsResult.incoming) ? requestsResult.incoming : [];
  state.outgoingFriendRequests = Array.isArray(requestsResult.outgoing) ? requestsResult.outgoing : [];
}

function homepageHasUpdates() {
  const incomingCount = Array.isArray(state.incomingFriendRequests) ? state.incomingFriendRequests.length : 0;
  const pendingCount = Array.isArray(state.ownFrontpage?.pendingReactions) ? state.ownFrontpage.pendingReactions.length : 0;
  return {
    friends: incomingCount > 0,
    pending: pendingCount > 0,
    feed: incomingCount > 0 || pendingCount > 0
  };
}

async function publishQuickTextPost() {
  const textarea = $("homePostInput");
  if (!textarea) return;
  const caption = textarea.value.trim();
  if (!caption) return;

  setStatusLine("homePostStatus", "Bericht wordt geplaatst...", "");
  try {
    await fetchJson(`${API_BASE}/posts`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ownerUserId: state.activeUserId,
        caption,
        imageUrl: "",
        videoUrl: "",
        hashtags: [],
        feedKind: "normal"
      })
    });
    textarea.value = "";
    await refreshAll();
    setStatusLine("homePostStatus", "Bericht geplaatst.", "ok");
  } catch (error) {
    setStatusLine("homePostStatus", error.message || "Plaatsen mislukt.", "error");
  }
}

async function sendFrontpageReaction(targetUserId) {
  const textarea = $("homeReactionInput");
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) return;

  try {
    await fetchJson(`${API_BASE}/frontpage/${targetUserId}/react`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fromUserId: state.activeUserId, text })
    });
    textarea.value = "";
    alert("Bericht is naar pending moderatie gestuurd.");
    await loadOwnFrontpage();
    renderHomeScreen();
  } catch (error) {
    alert(error.message || "Versturen mislukt.");
  }
}

async function moderateReaction(reactionId, action) {
  try {
    await fetchJson(`${API_BASE}/frontpage/${state.activeUserId}/reactions/${reactionId}/${action}`, { method: "POST" });
    await loadOwnFrontpage();
    renderHomeScreen();
  } catch (error) {
    alert(error.message || "Moderatie mislukt.");
  }
}

async function deletePost(postId) {
  if (!confirm("Weet je zeker dat je dit bericht wilt verwijderen?")) return;
  try {
    await fetchJson(`${API_BASE}/posts/${postId}/delete`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ownerUserId: state.activeUserId })
    });
    await refreshAll();
  } catch (error) {
    alert(error.message || "Verwijderen mislukt.");
  }
}

function renderReactionList(reactions, showModeration = false) {
  if (!Array.isArray(reactions) || !reactions.length) {
    return `<div class="emptyState">Nog geen berichten op deze voorpagina.</div>`;
  }
  return `
    <div class="reactionList">
      ${reactions.map((reaction) => {
        const fromUser = reaction.fromUser || getUserById(reaction.fromUserId) || {};
        return `
          <div class="reactionItem">
            <div class="reactionAuthor">${escapeHtml(fromUser.displayName || "Gebruiker")} · ${escapeHtml(fromUser.handle || "")}</div>
            <div class="reactionText">${escapeHtml(reaction.text || "")}</div>
            <div class="miniRow" style="margin-top:10px;">
              <div class="smallNote">${escapeHtml(timeAgo(reaction.createdAt))}</div>
              ${showModeration ? `
                <div class="buttonGroup">
                  <button class="ghostBtn" onclick="moderateReaction(${Number(reaction.id)}, 'approve')">Approve</button>
                  <button class="ghostBtn" onclick="moderateReaction(${Number(reaction.id)}, 'reject')">Reject</button>
                  <button class="dangerBtn" onclick="moderateReaction(${Number(reaction.id)}, 'block')">Block</button>
                </div>
              ` : ""}
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderCompactOwnPosts(posts) {
  if (!Array.isArray(posts) || !posts.length) {
    return `<div class="emptyState">Nog geen posts op je homepage.</div>`;
  }
  return `
    <div class="compactChatList">
      ${posts.map((item) => {
        const thumb = item.postType === "image" && item.imageUrl
          ? `<div class="compactChatThumb"><img src="${escapeHtml(item.imageUrl)}" alt="post" /></div>`
          : item.postType === "video" && item.videoUrl
          ? `<div class="compactChatThumb"><video src="${escapeHtml(item.videoUrl)}" muted playsinline preload="metadata"></video></div>`
          : `<div class="compactChatThumb">tekst</div>`;
        const metaBits = [item.postType === "text" ? "chat" : item.postType, timeAgo(item.createdAt)].filter(Boolean).join(" · ");
        return `
          <div class="compactChatItem">
            ${thumb}
            <div class="compactChatBody">
              <div class="compactChatMeta">${escapeHtml(metaBits)}</div>
              <div class="compactChatText">${escapeHtml(item.caption || "")}</div>
            </div>
            <button class="dangerBtn" onclick="deletePost(${Number(item.id)})">×</button>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

async function saveProfile() {
  const displayName = $("profileDisplayName")?.value.trim() || "";
  const handleRaw = $("profileHandle")?.value.trim() || "";
  const bio = $("profileBio")?.value.trim() || "";
  const password = $("profilePassword")?.value || "";

  if (!displayName) {
    setStatusLine("profileStatus", "Naam mag niet leeg zijn.", "error");
    return;
  }
  if (!handleRaw) {
    setStatusLine("profileStatus", "Handle mag niet leeg zijn.", "error");
    return;
  }

  const payload = { displayName, handle: handleRaw.startsWith("@") ? handleRaw : `@${handleRaw}`, bio };
  if (password.length > 0) payload.password = password;

  setStatusLine("profileStatus", "Profiel wordt opgeslagen...", "");
  try {
    const result = await fetchJson(`${API_BASE}/users/${encodeURIComponent(state.activeUserId)}/profile`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (result?.user?.displayName) localStorage.setItem(LOGIN_NAME_STORAGE_KEY, result.user.displayName);
    if ($("profilePassword")) $("profilePassword").value = "";
    await refreshAll();
    setStatusLine("profileStatus", "Profiel opgeslagen.", "ok");
  } catch (error) {
    setStatusLine("profileStatus", error.message || "Profiel opslaan mislukt.", "error");
  }
}

async function uploadProfileBackground() {
  const file = $("profileBackgroundFile")?.files?.[0] || null;
  if (!file) {
    setStatusLine("backgroundStatus", "Kies eerst een achtergrondfoto.", "error");
    return;
  }
  setStatusLine("backgroundStatus", "Achtergrond wordt geüpload...", "");
  try {
    const formData = new FormData();
    formData.append("background", file);
    const response = await fetch(`${API_BASE}/users/${encodeURIComponent(state.activeUserId)}/profile-media`, {
      method: "POST",
      body: formData
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(result.message || "Upload mislukt.");
    if ($("profileBackgroundFile")) $("profileBackgroundFile").value = "";
    await refreshAll();
    setStatusLine("backgroundStatus", "Achtergrond opgeslagen.", "ok");
  } catch (error) {
    setStatusLine("backgroundStatus", error.message || "Upload mislukt.", "error");
  }
}

async function refreshAll() {
  await loadUsers();
  await loadFeed();
  await loadOwnFrontpage();
  await loadFriendsData();
  renderHomeScreen();
}

async function startApp() {
  try {
    if (!state.activeUserId) {
      window.location.href = "index.html";
      return;
    }
    await resolveRadioStations();
    await refreshAll();
    mountHomepageRadioEvents();
    await applyRadioSource(true);
    syncRadioUi();
  } catch (error) {
    console.error(error);
    alert(error.message || "Kon de mobiele homepage niet laden.");
  }
}

startApp();
