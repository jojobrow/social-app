<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Social Prototype Mobile</title>
  <style>
    :root {
      --bg: #0a0820;
      --bg-2: #120d2f;
      --panel: rgba(20, 17, 42, 0.82);
      --panel-2: rgba(27, 23, 56, 0.90);
      --panel-3: rgba(35, 31, 73, 0.96);
      --glass: rgba(255,255,255,0.08);
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.18);
      --text: #f7f6ff;
      --text-soft: #d7d2ff;
      --text-dim: #a9a1d9;
      --accent: #7c5cff;
      --accent-2: #16d7ff;
      --accent-3: #ff6ec7;
      --accent-warm: #ffb86b;
      --danger: #ff8e9f;
      --ok: #8cf0ba;
      --radius: 24px;
      --radius-sm: 18px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 10%, rgba(124, 92, 255, 0.28), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(22, 215, 255, 0.20), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 110, 199, 0.16), transparent 32%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overscroll-behavior: none;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .appShell {
      min-height: 100dvh;
      max-width: 460px;
      margin: 0 auto;
      position: relative;
      background: linear-gradient(180deg, rgba(10,8,32,0.56), rgba(18,13,47,0.46));
      backdrop-filter: blur(18px);
    }

    .screen {
      display: none;
      min-height: 100dvh;
    }

    .screen.active {
      display: block;
    }

    .page {
      padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 26px);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
      pointer-events: none;
    }

    .cardBody {
      position: relative;
      z-index: 1;
      padding: 15px;
    }

    .topRow,
    .sectionHeader,
    .feedOverlayRow,
    .statRow,
    .actionRow,
    .composerActions,
    .miniRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .topRow,
    .sectionHeader {
      align-items: flex-start;
    }

    .pageTitle {
      font-size: 29px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin: 0;
    }

    .pageIntro {
      margin: 7px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.55;
      max-width: 32ch;
    }

    .pill,
    .ghostBtn,
    .solidBtn,
    .dangerBtn {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .pill:active,
    .ghostBtn:active,
    .solidBtn:active,
    .dangerBtn:active,
    .arrowBtn:active,
    .feedTapHint:active,
    .feedScrollZone:active {
      transform: scale(0.98);
    }

    .pill,
    .ghostBtn {
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .solidBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(80, 90, 255, 0.32);
    }

    .dangerBtn {
      background: rgba(255, 142, 159, 0.12);
      color: #ffd2da;
      border: 1px solid rgba(255, 142, 159, 0.20);
    }

    .buttonGroup {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hero {
      position: relative;
      padding: 18px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background-size: cover;
      background-position: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(7,5,20,0.82)),
        radial-gradient(circle at top right, rgba(22,215,255,0.18), transparent 32%),
        radial-gradient(circle at top left, rgba(255,110,199,0.18), transparent 28%);
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .avatarRow {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: white;
      border: 1px solid rgba(255,255,255,0.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 10px 24px rgba(0,0,0,0.24);
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent-3), var(--accent));
      flex: 0 0 auto;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .identityBlock {
      min-width: 0;
    }

    .identityName {
      margin: 0;
      font-size: 23px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .identityHandle {
      margin: 4px 0 0;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
    }

    .identityBio {
      margin: 12px 0 0;
      color: rgba(255,255,255,0.90);
      font-size: 14px;
      line-height: 1.55;
      max-width: 92%;
    }

    .gridStats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.10);
    }

    .statValue {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .statLabel {
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .sectionTitle {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .sectionText,
    .muted,
    .smallNote {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.5;
    }

    .muted strong {
      color: var(--text);
    }

    .field,
    .textarea,
    .fileInput,
    .select {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      padding: 14px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .field::placeholder,
    .textarea::placeholder {
      color: var(--text-dim);
    }

    .textarea {
      min-height: 112px;
      resize: vertical;
    }

    .uploadBox {
      display: grid;
      gap: 10px;
      border-radius: 20px;
      border: 1px dashed rgba(22, 215, 255, 0.34);
      background: linear-gradient(135deg, rgba(124,92,255,0.12), rgba(22,215,255,0.08));
      padding: 14px;
    }

    .statusLine {
      min-height: 20px;
      color: var(--text-soft);
      font-size: 12px;
    }

    .statusLine.error { color: #ffc0cb; }
    .statusLine.ok { color: #b8ffd9; }

    .postList,
    .creatorSimpleList,
    .reactionList {
      display: grid;
      gap: 12px;
    }

    .postCard {
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .postMedia {
      position: relative;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, rgba(124,92,255,0.42), rgba(22,215,255,0.18), rgba(20,17,42,0.94));
      overflow: hidden;
    }

    .postMedia img,
    .postMedia video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .postTextOnly {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      text-align: center;
      font-size: 24px;
      line-height: 1.4;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(255,110,199,0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(22,215,255,0.24), transparent 30%),
        linear-gradient(135deg, rgba(124,92,255,0.92), rgba(35,31,73,0.96));
    }

    .kindBadge,
    .makerBadge,
    .feedModeBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(13, 10, 31, 0.48);
      color: rgba(255,255,255,0.94);
      backdrop-filter: blur(12px);
    }

    .postMeta {
      padding: 12px 12px 14px;
      display: grid;
      gap: 10px;
    }

    .ownerMini {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ownerMiniAvatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent-3));
    }

    .ownerMiniAvatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ownerMiniName {
      font-size: 14px;
      font-weight: 800;
    }

    .ownerMiniHandle {
      color: var(--text-soft);
      font-size: 12px;
      margin-top: 2px;
    }

    .caption {
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--text-soft);
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
    }

    .reactionItem,
    .simpleItem {
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
    }

    .reactionAuthor {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .reactionText {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-soft);
      white-space: pre-wrap;
    }

    .emptyState {
      padding: 18px;
      border-radius: 20px;
      border: 1px dashed rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: var(--text-soft);
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
    }

    .feedScreen {
      position: relative;
      height: 100dvh;
      overflow: hidden;
      background: #09071b;
      touch-action: pan-y;
    }

    .feedCanvas {
      position: absolute;
      inset: 0;
    }

    .feedSlide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: #110d25;
      overflow: hidden;
    }

    .feedMediaWrap {
      position: absolute;
      inset: 0;
      background: #110d25;
    }

    .feedMediaWrap img,
    .feedMediaWrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .feedTextFill {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
      font-size: 31px;
      line-height: 1.32;
      text-align: center;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(255,110,199,0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(22,215,255,0.26), transparent 30%),
        linear-gradient(135deg, rgba(124,92,255,0.92), rgba(17,13,37,0.98));
    }

    .feedShade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.24) 0%, rgba(0,0,0,0.06) 28%, rgba(0,0,0,0.52) 100%),
        radial-gradient(circle at top right, rgba(22,215,255,0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(255,110,199,0.12), transparent 30%);
    }

    .feedOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 14px) 16px calc(var(--safe-bottom) + 18px);
      z-index: 3;
      pointer-events: none;
    }

    .feedOverlay * {
      pointer-events: auto;
    }

    .feedOverlayRow {
      align-items: center;
    }

    .feedInfo {
      max-width: calc(100% - 124px);
      padding: 10px 12px;
      border-radius: 20px;
      background: rgba(13,10,31,0.34);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
    }

    .feedTitle {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0;
    }

    .feedSubtitle {
      margin-top: 5px;
      color: rgba(255,255,255,0.82);
      font-size: 12px;
      line-height: 1.45;
    }

    .feedBottom {
      display: grid;
      gap: 14px;
    }

    .feedContentMeta {
      display: grid;
      gap: 10px;
      width: min(100%, 420px);
      padding: 14px;
      border-radius: 24px;
      background: rgba(13,10,31,0.40);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
    }

    .feedCaption {
      font-size: 15px;
      line-height: 1.55;
      color: rgba(255,255,255,0.98);
      text-shadow: 0 2px 10px rgba(0,0,0,0.20);
      white-space: pre-wrap;
    }

    .feedStats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .feedTapHint,
    .feedScrollZone {
      align-self: flex-start;
      border-radius: 18px;
      padding: 10px 12px;
      background: rgba(13,10,31,0.42);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(14px);
    }

    .feedScrollZone {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: #e7e3ff;
    }

    .arrowBtn {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(13,10,31,0.42);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.98);
      font-size: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.20);
    }

    .bottomActionRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .likeBtn {
      background: rgba(13,10,31,0.38);
      color: rgba(255,255,255,0.96);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .separator {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 6px 0;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 461px) {
      .appShell {
        border-left: 1px solid rgba(255,255,255,0.04);
        border-right: 1px solid rgba(255,255,255,0.04);
      }
    }
  </style>
</head>
<body>
  <div class="appShell">
    <section class="screen active" id="homeScreen"></section>
    <section class="screen" id="feedScreen"></section>
    <section class="screen" id="creatorScreen"></section>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const LOGIN_STORAGE_KEY = "socialPrototypeActiveUserId";

    const state = {
      activeUserId: localStorage.getItem(LOGIN_STORAGE_KEY) || "",
      users: [],
      feedItems: [],
      activeScreen: "home",
      currentFeedIndex: 0,
      currentFeedScopeUserId: "",
      feedMode: "global",
      makerModeUserId: "",
      makerModeReturnPostId: null,
      viewedCreatorUserId: "",
      ownFrontpage: null,
      creatorFrontpage: null,
      publishBusy: false,
      lastTapAt: 0,
      tapBurstCount: 0,
      tapBurstOwnerId: "",
      wheelLockUntil: 0,
      touchStartY: null,
      touchActive: false
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || "Request mislukt.");
      return data;
    }

    function getInitials(name = "?") {
      return String(name)
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map((part) => part[0])
        .join("")
        .slice(0, 2)
        .toUpperCase() || "?";
    }

    function getUserById(userId) {
      return state.users.find((user) => user.id === userId) || null;
    }

    function getUserBackground(user) {
      if (user?.backgroundUrl) return `url('${encodeURI(user.backgroundUrl)}')`;
      const heroColor = user?.heroColor || "#362a86";
      return `linear-gradient(180deg, rgba(0,0,0,0.08), rgba(9,6,23,0.72)), radial-gradient(circle at top right, rgba(22,215,255,0.22), transparent 30%), radial-gradient(circle at top left, rgba(255,110,199,0.22), transparent 26%), linear-gradient(135deg, ${heroColor}, #17122f)`;
    }

    function getAvatarHtml(user, className = "avatar") {
      if (user?.avatarUrl) {
        return `<div class="${className}" style="background:${escapeHtml(user.avatarColor || '#7c5cff')};"><img src="${escapeHtml(user.avatarUrl)}" alt="${escapeHtml(user.displayName || 'avatar')}" /></div>`;
      }
      return `<div class="${className}" style="background:linear-gradient(135deg, ${escapeHtml(user?.avatarColor || '#7c5cff')}, #ff6ec7);">${escapeHtml(getInitials(user?.displayName || '?'))}</div>`;
    }

    function getKindLabel(kind) {
      if (kind === "promoted") return "Promoted";
      if (kind === "recommended") return "Recommended";
      return "Normal";
    }

    function timeAgo(timestamp) {
      const diff = Math.max(0, Date.now() - Number(timestamp || 0));
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "zojuist";
      if (mins < 60) return `${mins} min geleden`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} uur geleden`;
      const days = Math.floor(hours / 24);
      return `${days} d geleden`;
    }

    function vibrateTick(pattern = [18, 45, 18]) {
      if (navigator.vibrate) {
        try { navigator.vibrate(pattern); } catch (_e) {}
      }
    }

    function setStatusLine(id, message = "", kind = "") {
      const element = $(id);
      if (!element) return;
      element.textContent = message;
      element.className = `statusLine${kind ? ` ${kind}` : ""}`;
    }

    function setActiveScreen(screen) {
      state.activeScreen = screen;
      ["homeScreen", "feedScreen", "creatorScreen"].forEach((id) => {
        $(id).classList.toggle("active", id === `${screen}Screen`);
      });
    }

    async function loadUsers() {
      state.users = await fetchJson(`${API_BASE}/users`);
    }

    async function loadFeed() {
      const result = await fetchJson(`${API_BASE}/feed?userId=${encodeURIComponent(state.activeUserId)}`);
      state.feedItems = Array.isArray(result.items) ? result.items : [];
    }

    async function loadOwnFrontpage() {
      state.ownFrontpage = await fetchJson(
        `${API_BASE}/frontpage/${encodeURIComponent(state.activeUserId)}?viewerUserId=${encodeURIComponent(state.activeUserId)}`
      );
    }

    async function loadCreatorFrontpage(userId) {
      state.creatorFrontpage = await fetchJson(
        `${API_BASE}/frontpage/${encodeURIComponent(userId)}?viewerUserId=${encodeURIComponent(state.activeUserId)}`
      );
      state.viewedCreatorUserId = userId;
    }

    function getCurrentFeedItems() {
      if (state.feedMode === "creator" && state.makerModeUserId) {
        return state.feedItems.filter((item) => item.owner?.id === state.makerModeUserId);
      }
      if (state.currentFeedScopeUserId) {
        const scoped = state.feedItems.filter((item) => item.owner?.id === state.currentFeedScopeUserId);
        return scoped.length ? scoped : state.feedItems;
      }
      return state.feedItems;
    }

    function getCurrentFeedItem() {
      const items = getCurrentFeedItems();
      if (!items.length) return null;
      const safeIndex = Math.min(Math.max(state.currentFeedIndex, 0), items.length - 1);
      state.currentFeedIndex = safeIndex;
      return items[safeIndex] || null;
    }

    function moveFeed(step) {
      const items = getCurrentFeedItems();
      if (!items.length) return;
      const next = state.currentFeedIndex + step;
      if (next < 0 || next >= items.length) return;
      state.currentFeedIndex = next;
      renderFeedScreen();
    }

    function scrollFeedByIntent(direction) {
      const now = Date.now();
      if (now < state.wheelLockUntil) return;
      state.wheelLockUntil = now + 280;
      if (direction > 0) moveFeed(1);
      if (direction < 0) moveFeed(-1);
    }

    function onFeedWheel(event) {
      if (state.activeScreen !== "feed") return;
      if (Math.abs(event.deltaY) < 12) return;
      event.preventDefault();
      scrollFeedByIntent(event.deltaY > 0 ? 1 : -1);
    }

    function onFeedTouchStart(event) {
      if (state.activeScreen !== "feed") return;
      state.touchActive = true;
      state.touchStartY = event.touches?.[0]?.clientY ?? null;
    }

    function onFeedTouchMove(event) {
      if (state.activeScreen !== "feed") return;
      if (!state.touchActive || state.touchStartY == null) return;
      const currentY = event.touches?.[0]?.clientY ?? state.touchStartY;
      const delta = state.touchStartY - currentY;
      if (Math.abs(delta) < 42) return;
      event.preventDefault();
      scrollFeedByIntent(delta > 0 ? 1 : -1);
      state.touchStartY = currentY;
    }

    function onFeedTouchEnd() {
      state.touchActive = false;
      state.touchStartY = null;
    }

    function bindFeedGestures() {
      window.addEventListener("wheel", onFeedWheel, { passive: false });
      window.addEventListener("touchstart", onFeedTouchStart, { passive: true });
      window.addEventListener("touchmove", onFeedTouchMove, { passive: false });
      window.addEventListener("touchend", onFeedTouchEnd, { passive: true });
      window.addEventListener("touchcancel", onFeedTouchEnd, { passive: true });
    }

    function normalizeHashtags(input) {
      return String(input || "")
        .split(/[\s,]+/)
        .map((part) => part.trim())
        .filter(Boolean)
        .map((part) => (part.startsWith("#") ? part : `#${part}`))
        .slice(0, 8);
    }

    async function uploadMedia(file) {
      const formData = new FormData();
      formData.append("ownerUserId", state.activeUserId);
      formData.append("media", file);
      return fetchJson(`${API_BASE}/upload-media`, { method: "POST", body: formData });
    }

    async function publishPost() {
      if (state.publishBusy) return;

      const caption = $("composeCaption")?.value.trim() || "";
      const hashtags = normalizeHashtags($("composeHashtags")?.value || "");
      const file = $("composeMedia")?.files?.[0] || null;
      const publishKind = $("composeFeedKind")?.value || "normal";

      if (!caption && !file) {
        setStatusLine("composeStatus", "Voeg eerst tekst of media toe.", "error");
        return;
      }

      state.publishBusy = true;
      setStatusLine("composeStatus", "Bezig met plaatsen...", "");

      try {
        let imageUrl = "";
        let videoUrl = "";

        if (file) {
          const upload = await uploadMedia(file);
          if (upload.postType === "video") videoUrl = upload.url;
          else imageUrl = upload.url;
        }

        await fetchJson(`${API_BASE}/posts`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ownerUserId: state.activeUserId,
            caption,
            imageUrl,
            videoUrl,
            hashtags,
            feedKind: publishKind
          })
        });

        if ($("composeCaption")) $("composeCaption").value = "";
        if ($("composeHashtags")) $("composeHashtags").value = "";
        if ($("composeMedia")) $("composeMedia").value = "";
        if ($("composeFeedKind")) $("composeFeedKind").value = "normal";

        await refreshAll({ keepScreen: "home" });
        setStatusLine("composeStatus", "Bericht geplaatst.", "ok");
      } catch (error) {
        setStatusLine("composeStatus", error.message || "Plaatsen mislukt.", "error");
      } finally {
        state.publishBusy = false;
      }
    }

    async function likePost(postId) {
      try {
        await fetchJson(`${API_BASE}/posts/${postId}/like`, { method: "POST" });
        await loadFeed();
        if (state.activeScreen === "feed") renderFeedScreen();
        if (state.activeScreen === "home") {
          await loadOwnFrontpage();
          renderHomeScreen();
        }
        if (state.activeScreen === "creator" && state.viewedCreatorUserId) {
          await loadCreatorFrontpage(state.viewedCreatorUserId);
          renderCreatorScreen();
        }
      } catch (error) {
        alert(error.message || "Liken mislukt.");
      }
    }

    async function sendFrontpageReaction(targetUserId) {
      const inputId = targetUserId === state.activeUserId ? "homeReactionInput" : "creatorReactionInput";
      const textarea = $(inputId);
      if (!textarea) return;
      const text = textarea.value.trim();
      if (!text) return;

      try {
        await fetchJson(`${API_BASE}/frontpage/${targetUserId}/react`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fromUserId: state.activeUserId, text })
        });
        textarea.value = "";
        alert("Bericht is naar pending moderatie gestuurd.");
        if (targetUserId === state.activeUserId) {
          await loadOwnFrontpage();
          renderHomeScreen();
        } else {

          renderCreatorScreen();

      } catch (error) {

      if (postId == null) return 0;
      const items = state.feedItems;
      const index = items.findIndex((item) => item.id === postId);

      state.makerModeReturnPostId = current?.id ?? null;
      state.feedMode = "creator";

      const returnPostId = state.makerModeReturnPostId;
      state.feedMode = "global";
      state.makerModeUserId = "";

      vibrateTick([14, 30, 14]);
      renderFeedScreen();

    function handlePostTap(ownerUserId) {
      const now = Date.now();
      if (now - state.lastTapAt > 650 || state.tapBurstOwnerId !== ownerUserId) {
        state.tapBurstCount = 0;
      }
      state.lastTapAt = now;
      state.tapBurstOwnerId = ownerUserId;
      state.tapBurstCount += 1;

      if (state.tapBurstCount >= 3) {
        state.tapBurstCount = 0;
        if (state.feedMode === "creator") {
          exitMakerModeToFeed();
        } else {
          enterMakerMode(ownerUserId);
        }
      }
    }

        ? `<div class="feedMediaWrap"><video src="${escapeHtml(item.videoUrl)}" autoplay muted loop playsinline controls></video></div>`
        : `<div class="feedTextFill">${escapeHtml(item.caption || 'Tekstpost')}</div>`;

      const scopeLabel = state.feedMode === "creator"
        ? `maker-contentmodus · ${escapeHtml(owner.displayName || 'maker')}`
        : state.currentFeedScopeUserId
        ? `eigen contentlaag · ${escapeHtml(owner.displayName || 'jij')}`
        : `gewone feed · ${state.currentFeedIndex + 1}/${items.length}`;

      $("feedScreen").innerHTML = `
        <div class="feedScreen">
          <div class="feedCanvas">
            <article class="feedSlide" onclick="handlePostTap('${owner.id || ''}')">
              ${mediaHtml}
              <div class="feedShade"></div>
              <div class="feedOverlay">
                <div class="feedOverlayRow">
                  <button class="arrowBtn" onclick="event.stopPropagation(); handleFeedLeftArrow();">←</button>
                  <div class="feedInfo">
                    <h2 class="feedTitle">${escapeHtml(owner.displayName || 'Maker')}</h2>
                    <div class="feedSubtitle">${escapeHtml(owner.handle || '')} · ${escapeHtml(scopeLabel)}</div>
                  </div>
                  <button class="arrowBtn" onclick="event.stopPropagation(); openCurrentCreatorHomepage();">→</button>
                </div>

                <div class="feedBottom">
                  <div class="feedContentMeta">
                    <div class="feedStats">
                      <span class="feedModeBadge">${escapeHtml(getKindLabel(item.feedKind || 'normal'))}</span>
                      <span class="feedModeBadge">♥ ${Number(item.likes || 0)}</span>
                      <span class="feedModeBadge">${escapeHtml(timeAgo(item.createdAt))}</span>
                    </div>
                    <div class="feedCaption">${escapeHtml(item.caption || '')}</div>
                    ${Array.isArray(item.hashtags) && item.hashtags.length ? `<div class="feedStats">${item.hashtags.map((tag) => `<span class="feedModeBadge">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
                  </div>

                  <div class="bottomActionRow">
                    <div class="buttonGroup">
                      <button class="pill likeBtn" onclick="event.stopPropagation(); likePost(${Number(item.id)})">Like</button>
                      <button class="pill likeBtn" onclick="event.stopPropagation(); dislikePost(${Number(item.id)})">Verberg</button>
                    </div>
                    <div class="feedScrollZone" onclick="event.stopPropagation();">
                      Scroll of swipe ↑↓
                    </div>
                  </div>

                  <div class="feedTapHint" onclick="event.stopPropagation(); handlePostTap('${owner.id || ''}')">
                    3x tik op content = alleen content van deze maker. Nog eens 3x = terug naar de gewone feed, verder waar je was.
                  </div>
                </div>
              </div>
            </article>
          </div>
        </div>
      `;
    }

    function openCreatorContentFeed(userId) {
      if (!userId) return;
      state.feedMode = "creator";
      state.makerModeUserId = userId;
      state.makerModeReturnPostId = getCurrentFeedItem()?.id || null;
      state.currentFeedScopeUserId = "";
      state.currentFeedIndex = 0;
      setActiveScreen("feed");
      renderFeedScreen();
    }

    async function refreshAll(options = {}) {
      const keepScreen = options.keepScreen || state.activeScreen;
      await loadUsers();
      await loadFeed();
      await loadOwnFrontpage();
      if (state.viewedCreatorUserId) {
        await loadCreatorFrontpage(state.viewedCreatorUserId);
      }

      if (keepScreen === "feed") {
        setActiveScreen("feed");
        renderFeedScreen();
      } else if (keepScreen === "creator" && state.viewedCreatorUserId) {
        setActiveScreen("creator");
        renderCreatorScreen();
      } else {
        setActiveScreen("home");
        renderHomeScreen();
      }
    }

    function bindGlobalKeys() {
      window.addEventListener("keydown", (event) => {
        if (state.activeScreen !== "feed") return;
        if (event.key === "ArrowDown") moveFeed(1);
        if (event.key === "ArrowUp") moveFeed(-1);
      });
    }

    async function startApp() {
      try {
        if (!state.activeUserId) {
          window.location.href = "index.html";
          return;
        }
        await refreshAll({ keepScreen: "home" });
        bindGlobalKeys();
        bindFeedGestures();
      } catch (error) {
        console.error(error);
        alert(error.message || "Kon de mobiele app niet laden.");
      }
    }

    startApp();
  </script>
</body>
</html>
