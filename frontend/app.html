<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Frontpage Prototype</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0f0a19;
      --bg-2: #1a1230;
      --bg-3: #24183f;
      --line-soft: rgba(255,255,255,0.10);
      --text: #f7f3ff;
      --muted: #cdc3e6;
      --text-dim: #9b91b8;
      --accent: #9b5cff;
      --accent-2: #c9a5ff;
      --accent-deep: #6d35d8;
      --shadow: 0 22px 48px rgba(0,0,0,0.24);
      --content-h: 100vh;
      --radius-xl: 38px;
      --radius-lg: 28px;
      --radius-sm: 16px;
      --media-ratio: 4 / 3;
    }

    html, body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at top right, rgba(155,92,255,0.18), transparent 28%),
        radial-gradient(circle at top left, rgba(201,165,255,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .select,
    .field,
    .textarea {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(170,142,120,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      backdrop-filter: blur(8px);
    }

    .select:focus,
    .field:focus,
    .textarea:focus {
      border-color: rgba(170,142,120,0.22);
      background: rgba(255,255,255,0.80);
    }

    .field::placeholder,
    .textarea::placeholder {
      color: var(--text-dim);
    }

    .textarea {
      min-height: 104px;
      resize: vertical;
    }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(170,142,120,0.12);
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      backdrop-filter: blur(8px);
    }

    .badge.normal { background: rgba(255,255,255,0.08); }
    .badge.recommended {
      color: #ffe08a;
      background: rgba(255,207,90,0.20);
      border-color: rgba(205, 177, 154, 0.20);
    }
    .badge.promoted {
      color: #e1c6ff;
      background: rgba(155,92,255,0.20);
      border-color: rgba(205, 177, 154, 0.20);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      line-height: 1;
      transition: 0.18s ease;
    }

    button:hover { transform: translateY(-1px); }

    .btnPrimary {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #140d24;
      border: 1px solid rgba(197,169,145,0.22);
    }

    .btnSoft {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(190,162,138,0.14);
      backdrop-filter: blur(8px);
    }

    .btnDanger {
      background: rgba(255,182,193,0.10);
      color: #ffe7ec;
      border: 1px solid rgba(220, 38, 38, 0.15);
    }

    .btnSuccess {
      background: rgba(143,240,188,0.10);
      color: #cffff0;
      border: 1px solid rgba(22, 163, 74, 0.14);
    }

    .composePanel {
      position: fixed;
      top: 14px;
      left: 14px;
      width: min(520px, calc(100vw - 28px));
      z-index: 40;
      padding: 16px;
      background: rgba(28,20,48,0.72);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .composePanel.inline {
      position: static;
      width: 100%;
      max-width: 100%;
      left: auto;
      top: auto;
      z-index: 1;
      margin-top: 12px;
      background: rgba(255,255,255,0.06);
      box-shadow: none;
      backdrop-filter: blur(14px);
    }

    .creatorControlCard {
      padding: 16px;
      border-radius: 22px;
      color: #5a463a;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(201,165,255,0.08));
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .creatorControlTop {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .creatorControlText {
      min-width: 0;
      flex: 1;
    }

    .creatorControlLabel {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(113, 88, 72, 0.58);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .composeTitle {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .composeGrid {
      display: grid;
      gap: 9px;
    }

    .uploadStatus {
      font-size: 12px;
      color: var(--muted);
    }

    .hidden { display: none !important; }

    .viewportShell {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .modeViewport {
      width: 100%;
      height: 100%;
    }

    .feedViewport {
      overflow: hidden;
      scroll-behavior: auto;
    }

    .feedViewport::-webkit-scrollbar,
    .homeViewport::-webkit-scrollbar,
    .frontContentWrap::-webkit-scrollbar,
    .homeContentWrap::-webkit-scrollbar {
      width: 10px;
    }

    .feedViewport::-webkit-scrollbar-thumb,
    .homeViewport::-webkit-scrollbar-thumb,
    .frontContentWrap::-webkit-scrollbar-thumb,
    .homeContentWrap::-webkit-scrollbar-thumb {
      background: rgba(170,142,120,0.18);
      border-radius: 999px;
    }

    .feedStream {
      height: 100%;
      display: block;
    }

    .pairRow {
      height: var(--content-h);
      min-height: var(--content-h);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 18px 70px;
      align-items: stretch;
    }

    .pairRow.focusedPair .postCard {
      border-color: rgba(197,169,145,0.24);
      box-shadow: 0 0 0 1px rgba(205,177,154,0.10), var(--shadow);
    }

    .panelCard {
      background: rgba(255, 255, 255, 0.24);
      border: 1px solid rgba(182, 154, 132, 0.12);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
    }

    .postCard {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 248, 242, 0.82), rgba(250, 241, 234, 0.68)),
        rgba(255,255,255,0.38);
      overflow: hidden;
    }

    .frontHeader,
    .homeHeader {
      padding: 16px 18px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line-soft);
      flex: 0 0 auto;
      background: rgba(255,255,255,0.10);
    }

    .userLine {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #5e493c;
      font-weight: 800;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 6px 16px rgba(180,150,126,0.10);
    }

    .avatar.large {
      width: 56px;
      height: 56px;
      font-size: 20px;
    }

    .avatar.small {
      width: 34px;
      height: 34px;
      font-size: 13px;
    }

    .userName {
      font-size: 16px;
      font-weight: 800;
    }

    .userHandle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .postMediaShell {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: 0;
      overflow: hidden;
      background: rgba(255,255,255,0.4);
    }

    .postMedia {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #f2ece6;
    }

    .postMedia img,
    .postMedia video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #f2ece6;
    }

    .postTextFill {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background: linear-gradient(135deg, rgba(244,230,220,0.95), rgba(250,241,236,0.88));
      color: var(--text);
      font-size: 28px;
      line-height: 1.35;
      font-weight: 800;
      text-align: center;
    }

    .postGradientTop,
    .postGradientBottom {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 2;
      pointer-events: none;
    }

    .postGradientTop {
      top: 0;
      height: 34%;
      background: linear-gradient(180deg, rgba(35, 24, 16, 0.42) 0%, rgba(35, 24, 16, 0.18) 46%, rgba(35, 24, 16, 0) 100%);
    }

    .postGradientBottom {
      bottom: 0;
      height: 42%;
      background: linear-gradient(180deg, rgba(35, 24, 16, 0) 0%, rgba(35, 24, 16, 0.14) 34%, rgba(35, 24, 16, 0.44) 100%);
    }

    .postOverlayTop,
    .postOverlayBottom {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 18px;
      color: #fffaf6;
    }

    .postOverlayTop {
      top: 0;
    }

    .postOverlayBottom {
      bottom: 60px;
    }

    .postOverlayCard {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: min(100%, 420px);
      padding: 10px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
    }

    .postOverlayMeta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .postOverlayName {
      font-size: 15px;
      font-weight: 800;
      color: #fffaf6;
    }

    .postOverlayHandle {
      font-size: 12px;
      color: rgba(255,250,245,0.82);
      margin-top: 2px;
    }

    .overlayBadgeRow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .overlayBadge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: #fffaf6;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
    }

    .postBottomPanel {
      width: min(100%, 96%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .feedKindStripe {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      z-index: 4;
      pointer-events: none;
    }

    .feedKindStripe.recommended { background: #ffcf5a; }
    .feedKindStripe.promoted { background: #9b5cff; }

    .walletGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .walletStat {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .walletStatValue {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .walletStatLabel {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .likeQuotaDesktop {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .likeIconDesktopBtn {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(8,7,11,0.34);
      color: rgba(255,255,255,0.98);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 22px rgba(0,0,0,0.14);
      backdrop-filter: blur(10px);
      font-size: 18px;
      font-weight: 900;
      position: relative;
    }

    .likeDesktopCountStack {
      position: absolute;
      top: -18px;
      right: -8px;
      display: grid;
      gap: 8px;
      justify-items: end;
      pointer-events: none;
    }

    .likeDesktopCount {
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,248,242,0.96);
      color: #4f3525;
      border: 1px solid rgba(124,88,58,0.18);
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .donationDesktopStack {
      display: grid;
      gap: 8px;
      justify-items: end;
      align-items: end;
    }

    .donationDesktopInfo,
    .donationDesktopBtn {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
    }

    .donationDesktopInfo {
      background: rgba(8,7,11,0.44);
      color: rgba(255,255,255,0.96);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .donationDesktopBtn {
      background: linear-gradient(135deg, rgba(201,165,255,0.96), rgba(155,92,255,0.96));
      color: #140d24;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 26px rgba(155,92,255,0.26);
    }

    .postCaptionOverlay {
      display: inline-block;
      max-width: min(100%, 640px);
      padding: 12px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
      color: #fffaf6;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .postHashtagsOverlay,
    .postActionOverlay {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .overlayTag {
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fffaf6;
      font-size: 11px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .overlayButton {
      background: rgba(255,255,255,0.16);
      color: #fffaf6;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
    }

    .frontBio,
    .reactionText,
    .miniPostText,
    .homeBio,
    .modeHint {
      white-space: pre-wrap;
      line-height: 1.58;
    }

    .frontPageBg,
    .homePageBg {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        radial-gradient(circle at top left, rgba(255,248,242,0.18), transparent 30%),
        linear-gradient(135deg, rgba(255,248,242,0.06), rgba(255,248,242,0.01));
    }

    .frontPageBg::before,
    .homePageBg::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--user-bg, none);
      background-size: cover;
      background-position: center;
      opacity: 0.40;
      transform: scale(1.02);
      pointer-events: none;
    }

    .frontPageBg::after,
    .homePageBg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,250,245,0.03), rgba(247,239,231,0.05)),
        radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 60%);
      pointer-events: none;
    }

    .frontContentWrap,
    .homeContentWrap {
      position: relative;
      z-index: 1;
      height: 100%;
      overflow-y: auto;
      padding: 18px;
    }

    .splitFrontContentWrap {
      overflow: hidden;
    }

    .splitFrontContentWrap .homeSection,
    .splitFrontContentWrap .miniPost,
    .splitFrontContentWrap .reactionItem {
      overflow: hidden;
    }

    .splitFrontContentWrap .miniList,
    .splitFrontContentWrap .reactionList {
      max-height: 100%;
      overflow: hidden;
    }

    .frontContentWrap {
      width: 100%;
      max-width: 100%;
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas:
        "hero stats"
        "react recent"
        "approved approved";
      gap: 12px;
      align-content: stretch;
    }

    .homeContentWrap {
      width: 100%;
      max-width: 100%;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas:
        "hero stats"
        "react recent"
        "approved pending";
      gap: 14px;
      padding: 20px;
      align-content: stretch;
    }

    .area-hero { grid-area: hero; }
    .area-stats { grid-area: stats; }
    .area-react { grid-area: react; }
    .area-recent { grid-area: recent; }
    .area-approved { grid-area: approved; }
    .area-pending { grid-area: pending; }

    .frontHero,
    .homeHero {
      padding: 14px;
      border-radius: 22px;
      color: #5a463a;
      background: linear-gradient(135deg, rgba(255,255,255,0.58), rgba(248,236,227,0.50));
      border: 1px solid rgba(197, 169, 145, 0.16);
      backdrop-filter: blur(10px);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .frontHeroName,
    .homeHeroName {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 3px;
      letter-spacing: -0.02em;
    }

    .frontBio,
    .homeBio,
    .modeHint {
      font-size: 12px;
      color: rgba(90, 70, 58, 0.72);
      margin-top: 7px;
    }

    .metaRow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .metaChip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,250,245,0.44);
      border: 1px solid rgba(198,170,148,0.14);
      backdrop-filter: blur(8px);
    }

    .metaChipLabel {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      font-weight: 700;
      color: rgba(113, 88, 72, 0.58);
    }

    .metaChipValue {
      font-size: 12px;
      font-weight: 800;
      color: #6a5243;
    }

    .sectionTitle {
      font-size: 14px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .miniList,
    .reactionList {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .miniPost,
    .reactionItem,
    .homeSection {
      border: 1px solid rgba(190, 162, 138, 0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.18);
      padding: 11px;
      backdrop-filter: blur(12px);
      height: 100%;
      overflow: auto;
    }

    .miniPost {
      cursor: pointer;
      transition: 0.18s ease;
    }

    .miniPost:hover {
      border-color: rgba(197,169,145,0.22);
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    .miniPost.activeLinkedContent {
      border-color: rgba(205,177,154,0.30);
      background: rgba(255,250,245,0.62);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10), 0 0 0 1px rgba(214, 190, 170, 0.14);
    }

    .miniPostType,
    .pendingMeta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .miniPostText {
      font-size: 13px;
      color: var(--text);
    }

    .reactionHead {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
    }

    .reactionName {
      font-size: 13px;
      font-weight: 800;
    }

    .reactionText {
      font-size: 13px;
      color: var(--text);
    }

    .pendingCard {
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(190,162,138,0.12);
      background: rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pendingCard .reactionText { margin-top: 2px; }

    .moderationNote {
      font-size: 12px;
      color: rgba(90, 70, 58, 0.72);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .floatingModeButtons {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 12;
    }

    .modeButton {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 84px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #7a6354;
      display: grid;

<body>
  <div class="page">
    <div class="viewportShell">
      <div class="floatingModeButtons">
        <button class="modeButton left" onclick="toggleScreenMode()" title="Wissel tussen home en split">‹</button>
        <button class="modeButton right" onclick="toggleScreenMode()" title="Wissel tussen home en split">›</button>
      </div>

      <div class="modeViewport feedViewport hidden" id="splitViewport">
        <div class="feedStream" id="feedStream"></div>
      </div>

      <div class="modeViewport homeViewport hidden" id="homeViewport">
        <div class="homeShell" id="homeShell"></div>
      </div>
    </div>
  </div>

  <script src="./moderation-bot.js"></script>
  <script>
    const API_BASE = window.location.origin;
    const DONATION_STORAGE_KEY = "socialPrototypeBudgetModule";
    const MONTHLY_LIKES_STORAGE_KEY = "socialPrototypeMonthlyLikes";
    const MONTHLY_LIKES_LIMIT = 100;
    const PER_FEED_LIKE_LIMIT = 10;

    let users = [];
    let feedItems = [];
    let activeUserId = localStorage.getItem("socialPrototypeActiveUserId") || "";
    let currentScreenIndex = 0;
    let currentFocusedPostId = null;
    let screenMode = "home";
    let viewportObserver = null;
    let feedMode = "global";
    let makerModeUserId = "";
    let makerModeReturnPostId = null;
    let homeEntryPostId = null;
    let lastTapAt = 0;
    let tapBurstCount = 0;
    let tapBurstOwnerId = "";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || "Request mislukt.");
      return data;
    }

    function getInitials(name = "?") {
      return name.split(" ").map(part => part[0]).join("").slice(0, 2).toUpperCase();
    }

    function getKindLabel(kind) {
      if (kind === "promoted") return "Promoted";
      if (kind === "recommended") return "Recommended";
      return "Normal";
    }

    function cssUrl(url) {
      return url ? `url('${String(url).replace(/'/g, "\'")}')` : "none";
    }

    function getDonationModuleState() {
      try {
        const saved = JSON.parse(localStorage.getItem(DONATION_STORAGE_KEY) || "{}");
        return {
          promotionBudget: Number(saved.promotionBudget || 0),
          tipPoints: Number(saved.tipPoints || 0),
          givenPoints: Number(saved.givenPoints || 0),
          receivedPoints: Number(saved.receivedPoints || 0),
          donations: Array.isArray(saved.donations) ? saved.donations : [],
          receivedByMaker: saved.receivedByMaker && typeof saved.receivedByMaker === "object" ? saved.receivedByMaker : {}
        };
      } catch (_e) {
        return {
          promotionBudget: 0,
          tipPoints: 0,
          givenPoints: 0,
          receivedPoints: 0,
          donations: [],
          receivedByMaker: {}
        };
      }
    }

    function saveDonationModuleState(nextState) {
      localStorage.setItem(DONATION_STORAGE_KEY, JSON.stringify(nextState));
    }

    function getCurrentLikeMonthKey() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
    }

    function getMonthlyLikesState() {
      try {
        const saved = JSON.parse(localStorage.getItem(MONTHLY_LIKES_STORAGE_KEY) || "{}");
        const monthKey = getCurrentLikeMonthKey();
        if (saved.monthKey !== monthKey) {
          return { monthKey, remainingLikes: MONTHLY_LIKES_LIMIT, likesByTarget: {} };
        }
        return {
          monthKey,
          remainingLikes: Number(saved.remainingLikes ?? MONTHLY_LIKES_LIMIT),
          likesByTarget: saved.likesByTarget && typeof saved.likesByTarget === "object" ? saved.likesByTarget : {}
        };
      } catch (_e) {
        return { monthKey: getCurrentLikeMonthKey(), remainingLikes: MONTHLY_LIKES_LIMIT, likesByTarget: {} };
      }
    }

    function saveMonthlyLikesState(data) {
      localStorage.setItem(MONTHLY_LIKES_STORAGE_KEY, JSON.stringify(data));
    }

    function getLikesGivenForTarget(targetKey) {
      const likeState = getMonthlyLikesState();
      return Number(likeState.likesByTarget?.[targetKey] || 0);
    }

    function getLikesGivenForPost(postId) {
      return getLikesGivenForTarget(`post:${postId}`);
    }

    function getLikesGivenForHomepage(userId) {
      return getLikesGivenForTarget(`home:${userId}`);
    }

    function getRemainingLikesThisMonth() {
      return Number(getMonthlyLikesState().remainingLikes || 0);
    }

    async function giveLimitedLikeToPost(postId) {
      const targetKey = `post:${postId}`;
      const likeState = getMonthlyLikesState();
      const alreadyGiven = Number(likeState.likesByTarget?.[targetKey] || 0);

      if (likeState.remainingLikes <= 0) {
        alert("Je maandelijkse likes zijn op.");
        return;
      }
      if (alreadyGiven >= PER_FEED_LIKE_LIMIT) {
        alert("Je hebt het maximum van 10 likes op deze post bereikt.");
        return;
      }

      likeState.remainingLikes -= 1;
      likeState.likesByTarget[targetKey] = alreadyGiven + 1;
      saveMonthlyLikesState(likeState);

      try {
        await fetchJson(`${API_BASE}/posts/${postId}/like`, { method: "POST" });
        await refreshAll();
      } catch (error) {
        likeState.remainingLikes += 1;
        likeState.likesByTarget[targetKey] = alreadyGiven;
        if (likeState.likesByTarget[targetKey] <= 0) delete likeState.likesByTarget[targetKey];
        saveMonthlyLikesState(likeState);
        alert(error.message || "Liken mislukt.");
      }
    }

    async function giveLimitedLikeToHomepage(userId) {
      const targetKey = `home:${userId}`;
      const likeState = getMonthlyLikesState();
      const alreadyGiven = Number(likeState.likesByTarget?.[targetKey] || 0);

      if (likeState.remainingLikes <= 0) {
        alert("Je maandelijkse likes zijn op.");
        return;
      }
      if (alreadyGiven >= PER_FEED_LIKE_LIMIT) {
        alert("Je hebt het maximum van 10 likes op deze homepage bereikt.");
        return;
      }

      likeState.remainingLikes -= 1;
      likeState.likesByTarget[targetKey] = alreadyGiven + 1;
      saveMonthlyLikesState(likeState);

      try {
        await fetchJson(`${API_BASE}/frontpage/${userId}/like`, { method: "POST" });
        await refreshAll();
      } catch (error) {
        likeState.remainingLikes += 1;
        likeState.likesByTarget[targetKey] = alreadyGiven;
        if (likeState.likesByTarget[targetKey] <= 0) delete likeState.likesByTarget[targetKey];
        saveMonthlyLikesState(likeState);
        alert(error.message || "Homepage-like mislukt.");
      }
    }

    function getAvailableTipPoints() {
      return Number(getDonationModuleState().tipPoints || 0);
    }

    function getGivenPointsForMaker(makerUserId) {
      const donationState = getDonationModuleState();
      return Number((donationState.receivedByMaker && donationState.receivedByMaker[makerUserId]) || 0);
    }

    async function donatePointToMaker(maker) {
      if (!maker?.id) return;

      const donationState = getDonationModuleState();
      if ((donationState.tipPoints || 0) < 1) {
        alert("Je hebt geen donatiepunten meer.");
        return;
      }

      donationState.tipPoints = Number(donationState.tipPoints || 0) - 1;
      donationState.givenPoints = Number(donationState.givenPoints || 0) + 1;
      donationState.receivedPoints = Number(donationState.receivedPoints || 0) + 1;
      if (!donationState.receivedByMaker || typeof donationState.receivedByMaker !== "object") {
        donationState.receivedByMaker = {};
      }
      donationState.receivedByMaker[maker.id] = Number(donationState.receivedByMaker[maker.id] || 0) + 1;
      if (!Array.isArray(donationState.donations)) donationState.donations = [];
      donationState.donations.unshift({
        euros: 0,
        points: 1,
        makerId: maker.id,
        makerName: maker.displayName || "Maker",
        text: "Donatiepunt via desktop feed",
        createdAt: Date.now()
      });

      saveDonationModuleState(donationState);
      await refreshAll();
    }

    function buildSequencedFeed(items) {
      const sorted = [...items].sort((a, b) => Number(b?.createdAt || 0) - Number(a?.createdAt || 0));
      const normalQueue = sorted.filter((item) => item.feedKind !== "recommended" && item.feedKind !== "promoted");
      const recommendedQueue = sorted.filter((item) => item.feedKind === "recommended");
      const promotedQueue = sorted.filter((item) => item.feedKind === "promoted");
      const pattern = ["normal", "recommended", "normal", "promoted"];
      const result = [];

      function take(kind) {
        if (kind === "recommended" && recommendedQueue.length) return recommendedQueue.shift();
        if (kind === "promoted" && promotedQueue.length) return promotedQueue.shift();
        if (kind === "normal" && normalQueue.length) return normalQueue.shift();
        return null;
      }

      while (normalQueue.length || recommendedQueue.length || promotedQueue.length) {
        let added = false;
        for (const kind of pattern) {
          const item = take(kind);
          if (item) {
            result.push(item);
            added = true;
          }
        }
        if (!added) break;
      }

      return result;
    }

    function chargePromotionViewIfNeeded(item) {
      if (!item || item.feedKind !== "promoted") return;

      const chargeKey = `desktopPromotedCharge:${activeUserId}:${item.id}`;
      if (sessionStorage.getItem(chargeKey)) return;

      const wallet = getDonationModuleState();
      if (Number(wallet.promotionBudget || 0) <= 0) {
        item.feedKind = "normal";
        return;
      }

      wallet.promotionBudget = Math.max(0, Number(wallet.promotionBudget || 0) - 1);
      saveDonationModuleState(wallet);
      sessionStorage.setItem(chargeKey, "1");

      if (Number(wallet.promotionBudget || 0) <= 0) {
        item.feedKind = "normal";
      }
    }

    function shuffleArray(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getUserBackground(user) {
      if (user?.backgroundUrl) return cssUrl(user.backgroundUrl);
      const hero = user?.heroColor || "#f4e5d8";
      return `linear-gradient(135deg, ${hero}, rgba(255,255,255,0.12))`;
    }

    function isFriendWithActiveUser(ownerId) {
      if (!ownerId || ownerId === activeUserId) return true;
      const me = users.find((user) => user.id === activeUserId);
      if (!me) return false;
      const friendIds = Array.isArray(me.friendIds) ? me.friendIds.map(String) : [];
      return friendIds.includes(String(ownerId));
    }

    function getFeedBucket(item) {
      if (!item) return "friends";
      if (item.feedKind === "promoted") return "promoted";
      if (item.feedKind === "recommended") return "everyone";
      return isFriendWithActiveUser(item.owner?.id) ? "friends" : "everyone";
    }

    function getFeedBucketLabel(item) {
      const bucket = getFeedBucket(item);
      if (bucket === "promoted") return "Betaald";
      if (bucket === "everyone") return "Iedereen";
      return "Vrienden";
    }

    function buildFeedLogicSequence(items) {
      const sorted = [...items].sort((a, b) => Number(b?.createdAt || 0) - Number(a?.createdAt || 0));

      const friendsQueue = sorted.filter((item) => getFeedBucket(item) === "friends");
      const everyoneQueue = sorted.filter((item) => getFeedBucket(item) === "everyone");
      const promotedQueue = sorted.filter((item) => getFeedBucket(item) === "promoted");

      const sequence = [];
      const firstOwn = sorted.find((item) => item.owner?.id === activeUserId);
      if (firstOwn) {
        sequence.push(firstOwn);
        const removeById = (queue) => {
          const idx = queue.findIndex((item) => Number(item.id) === Number(firstOwn.id));
          if (idx >= 0) queue.splice(idx, 1);
        };
        removeById(friendsQueue);
        removeById(everyoneQueue);
        removeById(promotedQueue);
      }

      const pattern = ["friends", "everyone", "friends", "promoted"];

      function take(kind) {
        if (kind === "friends" && friendsQueue.length) return friendsQueue.shift();
        if (kind === "everyone" && everyoneQueue.length) return everyoneQueue.shift();
        if (kind === "promoted" && promotedQueue.length) return promotedQueue.shift();

        if (kind === "everyone" && friendsQueue.length) return friendsQueue.shift();
        if (kind === "promoted") {
          if (friendsQueue.length) return friendsQueue.shift();
          if (everyoneQueue.length) return everyoneQueue.shift();
        }
        if (kind === "friends" && everyoneQueue.length) return everyoneQueue.shift();
        return null;
      }

      while (friendsQueue.length || everyoneQueue.length || promotedQueue.length) {
        let added = false;
        for (const kind of pattern) {
          const nextItem = take(kind);
          if (nextItem) {
            sequence.push(nextItem);
            added = true;
          }
        }
        if (!added) break;
      }

      return sequence;
    }

    function getFrontendModeration(text) {
      if (!window.ModerationBot || typeof window.ModerationBot.analyzeText !== "function") {
        return {
          status: "approved",
          matchedTriggers: [],
          reason: "ModerationBot niet geladen."
        };
      }
      return window.ModerationBot.analyzeText(text);
    }

    function bindReactionEnterToSubmit(textarea, submitFn) {
      if (!textarea || textarea.dataset.enterBound === "true") return;

      textarea.addEventListener("keydown", async (event) => {
        if (event.key !== "Enter" || event.shiftKey) return;
        event.preventDefault();
        await submitFn();
      });

      textarea.dataset.enterBound = "true";
    }

    function bindDynamicReactionInputs() {
      document.querySelectorAll('textarea[id^="reactionInput-"]').forEach((textarea) => {
        const parts = textarea.id.split("-");
        const userId = parts[1];
        bindReactionEnterToSubmit(textarea, async () => {
          await submitFrontpageReaction(userId, textarea.id);
        });
      });
    }

    async function loadUsers() {
      users = await fetchJson(`${API_BASE}/users`);
      if (!users.find(user => user.id === activeUserId)) {
        activeUserId = "";
        localStorage.removeItem("socialPrototypeActiveUserId");
      }
    }

    function pauseAllVideos(exceptPostId = null) {
      document.querySelectorAll(".pairRow video").forEach(video => {
        const pair = video.closest(".pairRow");
        const postId = pair ? Number(pair.dataset.postId) : null;
        if (!exceptPostId || postId !== exceptPostId) video.pause();
      });
    }

    function syncActiveLinkedContent() {
      document.querySelectorAll(".miniPost[data-link-post-id]").forEach(card => {
        const linkedId = Number(card.dataset.linkPostId);
        card.classList.toggle("activeLinkedContent", linkedId === currentFocusedPostId);
      });

      document.querySelectorAll(".pairRow").forEach(section => {
        const sectionPostId = Number(section.dataset.postId);
        section.classList.toggle("focusedPair", sectionPostId === currentFocusedPostId);
      });
    }

    function getFeedItemsForCurrentMode() {
      const sorted = [...feedItems];
      if (feedMode === "creator" && makerModeUserId) {
        return sorted.filter((item) => item.owner?.id === makerModeUserId);
      }

      return sorted;
    }

    function getCurrentFeedItem() {
      const items = getFeedItemsForCurrentMode();
      if (!items.length) return null;
      const safeIndex = Math.max(0, Math.min(currentScreenIndex, items.length - 1));
      currentScreenIndex = safeIndex;
      return items[safeIndex] || null;
    }

    function findCurrentModeIndexByPostId(postId) {
      const items = getFeedItemsForCurrentMode();
      const idx = items.findIndex((item) => Number(item.id) === Number(postId));
      return idx >= 0 ? idx : 0;
    }

    function enterMakerMode(userId) {
      if (!userId) return;
      const current = getCurrentFeedItem();
      makerModeReturnPostId = current?.id ?? null;
      feedMode = "creator";
      makerModeUserId = userId;
      currentScreenIndex = 0;
      renderFeedStream();
    }

    function exitMakerModeToFeed() {
      const returnPostId = makerModeReturnPostId;
      feedMode = "global";
      makerModeUserId = "";
      currentScreenIndex = findCurrentModeIndexByPostId(returnPostId);
      renderFeedStream();
    }

    function handleFeedContentTap(ownerUserId) {
      const now = Date.now();
      if (now - lastTapAt > 650 || tapBurstOwnerId !== ownerUserId) tapBurstCount = 0;
      lastTapAt = now;
      tapBurstOwnerId = ownerUserId;
      tapBurstCount += 1;

      if (tapBurstCount >= 3) {
        tapBurstCount = 0;
        if (feedMode === "creator") exitMakerModeToFeed();
        else enterMakerMode(ownerUserId);
      }
    }

    function bindFeedTapZone(ownerUserId) {
      const zone = document.querySelector(".postMediaShell");
      if (!zone || zone.dataset.tapBound === "true") return;
      zone.addEventListener("click", (event) => {
        if (event.target.closest("button, textarea, input, select, a")) return;
        handleFeedContentTap(ownerUserId);
      });
      zone.dataset.tapBound = "true";
    }

    function goToSplitContent(postId) {
      const index = findCurrentModeIndexByPostId(postId);
      screenMode = "split";
      updateModeUI();
      scrollToScreen(index);
    }

          <div class="composeTitle">Nieuwe post</div>

            <input id="hashtagsInput" class="field" placeholder="#homepage, #creator, #concept" />

    async function uploadHomepageBackground(file) {
      const statusEl = document.getElementById("backgroundUploadStatus");

      try {
        const validTypes = ["image/jpeg", "image/png", "image/webp"];
        if (!validTypes.includes(file.type)) {
          throw new Error("Alleen jpg, jpeg, png en webp zijn toegestaan.");
        }

        if (file.size > 8 * 1024 * 1024) {
          throw new Error("Afbeelding is te groot. Maximaal 8 MB.");
        }

        statusEl.textContent = "Achtergrond uploaden...";

        const formData = new FormData();
        formData.append("background", file);

        const response = await fetch(`${API_BASE}/users/${encodeURIComponent(activeUserId)}/profile-media`, {
          method: "POST",
          body: formData
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || "Upload mislukt.");
        }

        statusEl.textContent = "Achtergrond opgeslagen.";
        await refreshAll();
      } catch (error) {
        statusEl.textContent = error.message || "Upload mislukt.";
        alert(error.message || "Upload mislukt.");
      }
    }

    async function loadFeed() {
      if (!activeUserId) {
        feedItems = [];
        return;
      }

      const data = await fetchJson(`${API_BASE}/feed?userId=${encodeURIComponent(activeUserId)}`);
      const incoming = data.items || data || [];
      const previousFocusedPostId = currentFocusedPostId;

      feedItems = buildFeedLogicSequence(incoming);

      const ownLatest = [...incoming]
        .filter((item) => item.owner?.id === activeUserId)
        .sort((a, b) => Number(b?.createdAt || 0) - Number(a?.createdAt || 0))[0] || null;
      homeEntryPostId = ownLatest ? ownLatest.id : null;

      if (!feedItems.length) {
        currentScreenIndex = 0;
        currentFocusedPostId = null;
        return;
      }

      if (previousFocusedPostId != null) {
        const preservedIndex = feedItems.findIndex((item) => item.id === previousFocusedPostId);
        if (preservedIndex >= 0) {
          currentScreenIndex = preservedIndex;
          currentFocusedPostId = previousFocusedPostId;
          return;
        }
      }

      currentScreenIndex = 0;
      currentFocusedPostId = feedItems[0].id;
    }

    function scrollToScreen(index, smooth = true) {
      const currentItems = getFeedItemsForCurrentMode();
      if (screenMode !== "split" || !currentItems.length) return;
      currentScreenIndex = Math.max(0, Math.min(index, currentItems.length - 1));
      currentFocusedPostId = currentItems[currentScreenIndex].id;
      renderFeedStream();

    function scrollToNext() {
      const currentItems = getFeedItemsForCurrentMode();
      if (screenMode !== "split" || !currentItems.length) return;
      const nextIndex = (currentScreenIndex + 1) % currentItems.length;
      scrollToScreen(nextIndex);
    }

    function scrollToPrevious() {
      const currentItems = getFeedItemsForCurrentMode();
      if (screenMode !== "split" || !currentItems.length) return;
      const previousIndex = (currentScreenIndex - 1 + currentItems.length) % currentItems.length;
      scrollToScreen(previousIndex);
    }

    async function submitFrontpageReaction(userId, inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;

      const text = input.value.trim();
      const result = getFrontendModeration(text);

      if (result.status === "empty") {
        alert(window.ModerationBot ? window.ModerationBot.buildUserMessage(result) : "Typ eerst een reactie.");
        return;
      }

      if (result.status === "blocked") {
        alert(window.ModerationBot ? window.ModerationBot.buildUserMessage(result) : "Reactie is tegengehouden.");
        return;
      }

      if (result.status === "review") {
        const confirmed = confirm(
          window.ModerationBot
            ? window.ModerationBot.buildUserMessage(result)
            : "Deze reactie is gemarkeerd voor handmatige check. Toch verzenden?"
        );
        if (!confirmed) return;
      }

      await fetchJson(`${API_BASE}/frontpage/${userId}/react`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fromUserId: activeUserId, text })
      });

      input.value = "";

      if (result.status === "review") {
        alert("Reactie is verzonden en gemarkeerd als twijfelgeval.");
      } else {
        alert("Reactie is verzonden.");
      }

      await refreshAll();
    }

    async function publishPost() {
      const caption = document.getElementById("captionInput").value.trim();
      const hashtagsInput = document.getElementById("hashtagsInput").value.trim();
      const feedKind = document.getElementById("feedKindSelect").value;
      const fileInput = document.getElementById("mediaFileInput");
      const uploadStatus = document.getElementById("uploadStatus");
      const hashtags = hashtagsInput ? hashtagsInput.split(",").map(tag => tag.trim()).filter(Boolean) : [];
      let imageUrl = "";
      let videoUrl = "";

      try {
        const file = fileInput.files[0];
        if (file) {
          const isImage = ["image/jpeg", "image/png", "image/webp"].includes(file.type);
          const isVideo = ["video/mp4", "video/webm"].includes(file.type);
          if (!isImage && !isVideo) throw new Error("Alleen jpg, jpeg, png, webp, mp4 en webm zijn toegestaan.");
          if (isImage && file.size > 8 * 1024 * 1024) throw new Error("Afbeelding is te groot. Maximaal 8 MB.");
          if (isVideo && file.size > 25 * 1024 * 1024) throw new Error("Video is te groot. Maximaal 25 MB.");
          if (isVideo) uploadStatus.textContent = "Video gekozen. Doel: maximaal 1,5 minuut.";
          const uploadResult = await uploadMediaFile(file);
          if (uploadResult.postType === "image") imageUrl = uploadResult.url;
          else if (uploadResult.postType === "video") videoUrl = uploadResult.url;
        }

        await fetchJson(`${API_BASE}/posts`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ownerUserId: activeUserId, caption, imageUrl, videoUrl, hashtags, feedKind })
        });

        document.getElementById("captionInput").value = "";
        document.getElementById("hashtagsInput").value = "";
        document.getElementById("feedKindSelect").value = "normal";
        fileInput.value = "";
        uploadStatus.textContent = "Upload foto of video. Beeld wordt als 4:3 getoond. Video-doel: maximaal 1,5 minuut.";
        const composePanel = document.getElementById("composePanel");
        if (composePanel) composePanel.classList.add("hidden");
        await refreshAll();
      } catch (error) {
        uploadStatus.textContent = error.message;
        alert(error.message);
      }
    }

    function bindComposeInputListeners() {
      const mediaInput = document.getElementById("mediaFileInput");
      if (!mediaInput || mediaInput.dataset.bound === "true") return;
      mediaInput.addEventListener("change", (event) => {
        const file = event.target.files[0];
        const uploadStatus = document.getElementById("uploadStatus");
        if (!uploadStatus) return;
        if (!file) {
          uploadStatus.textContent = "Upload foto of video. Beeld wordt als 4:3 getoond. Video-doel: maximaal 1,5 minuut.";
          return;
        }
        const isVideo = ["video/mp4", "video/webm"].includes(file.type);
        const isImage = ["image/jpeg", "image/png", "image/webp"].includes(file.type);
        if (isImage) uploadStatus.textContent = `Afbeelding gekozen: ${file.name}`;
        else if (isVideo) uploadStatus.textContent = `Video gekozen: ${file.name}. Doel: maximaal 1,5 minuut.`;
        else uploadStatus.textContent = "Ongeldig bestandstype.";
      });
      mediaInput.dataset.bound = "true";
    }

    function toggleCompose() {
      if (screenMode !== "home") {
        screenMode = "home";
        updateModeUI();
        renderOwnHomeScreen().then(() => {
          const panel = document.getElementById("composePanel");
          if (panel) panel.classList.remove("hidden");
        });
        return;
      }

      const panel = document.getElementById("composePanel");
      if (panel) panel.classList.toggle("hidden");
    }

    // Scroll/wheel in split mode is intentionally bound only to the content panel.

    async function startApp() {
      try {
        await loadUsers();

        if (!activeUserId) {
          window.location.href = "index.html";
          return;
        }

        await loadFeed();
        await renderFeedStream();
        updateModeUI();

        if (screenMode === "home") {
          await renderOwnHomeScreen();
        }

        if (feedItems.length && currentFocusedPostId == null) {
          currentFocusedPostId = feedItems[0].id;
          syncActiveLinkedContent();
        }
      } catch (error) {
        console.error(error);
        alert("Kon de desktop-app niet laden.");
      }
    }

    startApp();
  </script>
</body>
</html>
